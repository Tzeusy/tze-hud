[package]
name = "dashboard_tile_agent"
description = "Exemplar dashboard tile agent — raw tile API reference for tze_hud"
version.workspace = true
edition.workspace = true

[[bin]]
name = "dashboard_tile_agent"
path = "src/main.rs"

[features]
headless = ["tze_hud_runtime/headless"]
## Enable dev-mode to allow `config_toml: None` (unrestricted capability grants).
## TEST/DEV ONLY — never use in production deployments.
dev-mode = ["tze_hud_runtime/dev-mode"]

[dependencies]
tze_hud_scene = { path = "../../crates/tze_hud_scene" }
tze_hud_runtime = { path = "../../crates/tze_hud_runtime", features = ["dev-mode"] }
tze_hud_protocol = { path = "../../crates/tze_hud_protocol" }
tokio = { workspace = true }
tonic = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
