# Vertical Slice — Production Configuration
#
# This is the canonical runtime config for the vertical_slice example.
# It enforces capability governance: only the registered agent
# ("vertical-slice-agent") may connect and only with the capability
# set listed below.  Unknown agents receive guest policy (no capabilities).
#
# Usage (headless, production path — no feature flags needed):
#   cargo run -p vertical_slice -- --headless
#
# Usage (headless, dev mode — unrestricted caps, test/dev only):
#   cargo run -p vertical_slice --features dev-mode -- --headless --dev

[runtime]
profile = "headless"

[[tabs]]
name = "Main"
default_tab = true

[agents.registered.vertical-slice-agent]
# Canonical v1 capability vocabulary (configuration/spec.md §Capability Vocabulary).
# Only these capabilities are granted to this agent; all others are denied.
capabilities = [
    "create_tiles",
    "modify_own_tiles",
    "access_input_events",
    "read_scene_topology",
    "publish_zone:status-bar",
]

# Component profile bundle directories scanned at startup.
# Each path is resolved relative to this config file's parent directory
# (examples/vertical_slice/config/). The runtime scans subdirectories of each
# listed path for profile.toml files.
#
# profiles/ is the monorepo-root profiles directory:
#   examples/vertical_slice/config/ → ../../../profiles/
[component_profile_bundles]
paths = ["../../../profiles"]

# Active component profile selection.
# Maps component type → profile name. Only profiles discovered via
# [component_profile_bundles].paths can be referenced here.
# Unknown profiles are logged and skipped (non-fatal).
[component_profiles]
subtitle      = "exemplar-subtitle"
alert-banner  = "exemplar-alert-banner"
notification  = "notification-stack-exemplar"

# Widget bundle directories scanned at startup.
# Paths are resolved relative to this config file's parent directory
# (examples/vertical_slice/config/).
#
# Two roots cover all production widget bundles:
#   assets/widget_bundles/ — progress-bar, status-indicator
#   assets/widgets/        — gauge
[widget_bundles]
paths = [
    "../../../assets/widget_bundles",
    "../../../assets/widgets",
]

# Widget instances declared on the Main tab.
#
# Instance names used by user-test fixtures (see .claude/skills/user-test/):
#   main-progress  → progress-bar widget
#   main-status    → status-indicator widget
#
# IMPORTANT: widget_name in publish_to_widget refers to instance_id (not widget_type).

# Progress bar: horizontal progress bar in a clearly visible lower-left position.
# MCP widget_name: "main-progress"
[[tabs.widgets]]
widget_type = "progress-bar"
instance_id  = "main-progress"

[tabs.widgets.geometry]
x_pct      = 0.421875
y_pct      = 0.9074074
width_pct  = 0.15625
height_pct = 0.0185185

# Status indicator: small status circle at top-right corner.
# MCP widget_name: "main-status"
[[tabs.widgets]]
widget_type = "status-indicator"
instance_id  = "main-status"

[tabs.widgets.geometry]
x      = 1860
y      = 10
width  = 48
height = 56
