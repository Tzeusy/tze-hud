<?xml version="1.0" encoding="UTF-8"?>
<!-- Background layer (ultra-minimal, single-track). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 240" width="100" height="240">
  <!-- Single track only: no outer wrapper, no ladder ticks. -->
  <rect
    id="track"
    data-role="backdrop"
    x="31" y="10"
    width="38" height="200"
    rx="{{token.border.radius.large}}"
    ry="{{token.border.radius.large}}"
    fill="{{token.color.backdrop.default}}"
    fill-opacity="0.30"
    stroke="{{token.color.border.default}}"
    stroke-opacity="0.70"
    stroke-width="{{token.stroke.border.width}}"/>
</svg>
