<?xml version="1.0" encoding="UTF-8"?>
<!-- Fill layer (modern clean, ultra-minimal). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 240" width="100" height="240">
  <defs>
    <clipPath id="track-clip">
      <rect x="31" y="10" width="38" height="200" rx="{{token.border.radius.large}}" ry="{{token.border.radius.large}}"/>
    </clipPath>
  </defs>

  <!-- Bound fill element -->
  <rect
    id="bar"
    x="32" y="210"
    width="36" height="0"
    rx="{{token.border.radius.medium}}"
    ry="{{token.border.radius.medium}}"
    fill="{{token.color.text.accent}}"
    clip-path="url(#track-clip)"/>

  <!-- Bound severity indicator -->
  <circle
    id="indicator"
    cx="90" cy="18"
    r="3.5"
    fill="{{token.color.severity.info}}"
    stroke="{{token.color.outline.default}}"
    stroke-opacity="0.22"
    stroke-width="{{token.stroke.border.width}}"/>

  <!-- Hover tooltip (driven by tooltip_visible + label/readout bindings). -->
  <g id="tooltip-group" opacity="0">
    <rect
      id="tooltip-panel"
      x="6" y="6"
      width="82" height="34"
      rx="{{token.border.radius.medium}}"
      ry="{{token.border.radius.medium}}"
      fill="{{token.color.backdrop.default}}"
      fill-opacity="0.92"
      stroke="{{token.color.border.default}}"
      stroke-opacity="0.75"
      stroke-width="{{token.stroke.border.width}}"/>
    <text
      id="label-text"
      data-role="text"
      x="47"
      y="18"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="system-ui, sans-serif"
      font-size="9.2"
      letter-spacing="0.25"
      fill="{{token.color.text.primary}}"></text>
    <text
      id="tooltip-readout"
      data-role="text"
      x="47"
      y="29"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="system-ui, sans-serif"
      font-size="8.2"
      letter-spacing="0.2"
      fill="{{token.color.text.secondary}}"></text>
  </g>
</svg>
