friendly = "#3F6B50"

[[layers.bindings]]
param            = "theme"
target_element   = "tooltip-theme"
target_attribute = "text-content"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "Minimal"
system   = "System Ops"
friendly = "Friendly"

[[layers.bindings]]
param            = "theme"
target_element   = "tooltip-theme"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "#94A3B8"
system   = "#93C5FD"
friendly = "#86EFAC"

[[layers.bindings]]
param            = "theme"
target_element   = "tooltip-footer"
target_attribute = "text-content"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "Quiet glance"
system   = "Operational detail"
friendly = "Assistant tone"

[[layers.bindings]]
param            = "tooltip_visible"
target_element   = "tooltip-group"
target_attribute = "opacity"
mapping          = "linear"
attr_min         = 0.0
attr_max         = 1.0

[[layers.bindings]]
param            = "label"
target_element   = "label-text"
target_attribute = "text-content"
mapping          = "direct"

[[layers.bindings]]
param            = "label"
target_element   = "tooltip-label"
target_attribute = "text-content"
mapping          = "direct"

[[layers.bindings]]
param            = "reason"
target_element   = "tooltip-reason"
target_attribute = "text-content"
mapping          = "direct"
