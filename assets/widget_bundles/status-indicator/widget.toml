away    = "#5B21B6"
busy    = "#FFFFFF"
offline = "#0F172A"

[[layers.bindings]]
param            = "theme"
target_element   = "minimal-group"
target_attribute = "opacity"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "0.8"
system   = "0"
friendly = "0"

[[layers.bindings]]
param            = "theme"
target_element   = "system-group"
target_attribute = "opacity"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "0"
system   = "0.82"
friendly = "0"

[[layers.bindings]]
param            = "theme"
target_element   = "friendly-group"
target_attribute = "opacity"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "0"
system   = "0"
friendly = "0.82"

[[layers.bindings]]
param            = "theme"
target_element   = "tooltip-panel"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
minimal  = "#0B0E14"
system   = "#101826"
friendly = "#122018"

[[layers.bindings]]
param            = "theme"
target_element   = "tooltip-panel"
target_attribute = "stroke"
mapping          = "discrete"

[layers.bindings.value_map]
