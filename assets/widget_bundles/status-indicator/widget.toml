# Production status-indicator widget bundle.
#
# Visual contract:
# - Compact top-right badge (icon-first; no always-visible label text)
# - Tooltip panel appears only when runtime drives `tooltip_visible` to 1.0
# - Tooltip content binds to `label` and `reason`
#
# Registered as "status-indicator" in the WidgetRegistry when loaded from:
# assets/widget_bundles/status-indicator/.

name        = "status-indicator"
version     = "1.0.0"
description = "Compact icon status indicator with selectable visual themes and delayed-hover tooltip"
default_contention_policy = "LatestWins"

[[parameter_schema]]
name    = "status"
type    = "enum"
default = "offline"

[parameter_schema.constraints]
enum_allowed_values = ["online", "away", "busy", "offline"]

[[parameter_schema]]
name    = "theme"
type    = "enum"
default = "system"

[parameter_schema.constraints]
enum_allowed_values = ["minimal", "system", "friendly"]

[[parameter_schema]]
name    = "label"
type    = "string"
default = ""

[parameter_schema.constraints]
string_max_bytes = 16

[[parameter_schema]]
name    = "reason"
type    = "string"
default = ""

[parameter_schema.constraints]
string_max_bytes = 160

[[parameter_schema]]
name    = "tooltip_visible"
type    = "f32"
default = 0.0

[parameter_schema.constraints]
f32_min = 0.0
f32_max = 1.0

[hover_behavior]
delay_ms = 1500
visibility_param = "tooltip_visible"
hidden_value = 0.0
visible_value = 1.0

[hover_behavior.trigger_rect]
x_pct = 0.88
y_pct = 0.06
width_pct = 0.08
height_pct = 0.22

[[layers]]
svg_file = "indicator.svg"

[[layers.bindings]]
param            = "status"
target_element   = "minimal-fill"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "#22C55E"
away    = "#A3A3A3"
busy    = "#F59E0B"
offline = "#6B7280"

[[layers.bindings]]
param            = "status"
target_element   = "minimal-glyph"
target_attribute = "text-content"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "●"
away    = "◐"
busy    = "▲"
offline = "×"

[[layers.bindings]]
param            = "status"
target_element   = "system-fill"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "#4FB543"
away    = "#D97706"
busy    = "#DC2626"
offline = "#6B7280"

[[layers.bindings]]
param            = "status"
target_element   = "system-glyph"
target_attribute = "text-content"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "✓"
away    = "…"
busy    = "!"
offline = "×"

[[layers.bindings]]
param            = "status"
target_element   = "friendly-fill"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "#7DD3A7"
away    = "#C4B5FD"
busy    = "#EA580C"
offline = "#94A3B8"

[[layers.bindings]]
param            = "status"
target_element   = "friendly-glyph"
target_attribute = "text-content"
mapping          = "discrete"

[layers.bindings.value_map]
online  = "☺"
away    = "☕"
busy    = "⚡"
offline = "☾"

[[layers.bindings]]
param            = "status"
target_element   = "friendly-glyph"
target_attribute = "fill"
mapping          = "discrete"

[layers.bindings.value_map]
