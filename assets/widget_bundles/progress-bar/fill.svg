<?xml version="1.0" encoding="UTF-8"?>
<!-- Fill layer for the production progress-bar widget exemplar.
     Contains two bound elements: fill bar rect and centered label text.

     viewBox="0 0 300 20" matches the default 300x20 geometry.

     Element IDs referenced by widget.toml bindings:
       "fill-bar"   — fill rect; width (linear 0→296) and fill (direct) are bound
       "label-text" — SVG text element; text-content is bound to "label" param

     Token placeholders ({{...}}) are resolved at bundle load time.
     Zero hardcoded hex colors — all colors use token placeholder form.

     The fill bar sits 2px inset from the track edges (x=2, y=2, height=16)
     so it renders visually inside the track bounds. Maximum width is 296px
     (300 - 2*2 = 296) at progress=1.0. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 20" width="300" height="20">
  <!-- Fill bar: grows rightward from x=2 as "progress" increases.
       2px inset from track edges (x=2, y=2, height=16).
       width is driven by "progress" binding (linear: 0.0 → 296px).
       fill is driven by "fill_color" binding (direct).
       rx=8 gives proportional rounded end-caps matching the bar height. -->
  <rect
    id="fill-bar"
    x="2" y="2"
    width="0" height="16"
    rx="8" ry="8"
    fill="{{token.color.text.accent}}"/>

  <!-- Label text: centered horizontally and vertically on the bar.
       x=150, y=10 positions at the viewport center.
       font-size="11" is readable at the 300x20 geometry.
       fill is token-driven primary text color. -->
  <text
    id="label-text"
    x="150" y="10"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="sans-serif"
    font-size="11"
    fill="{{token.color.text.primary}}"></text>
</svg>
