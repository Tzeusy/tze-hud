# tze_hud Production Configuration
#
# This is the canonical production config for the tze_hud_app windowed binary.
# Deploy alongside the compiled binary as tze_hud.toml in the same directory
# (the runtime's CWD auto-resolution picks up ./tze_hud.toml first).
#
# On Windows, copy both tze_hud.exe and this file as tze_hud.toml to C:\tze_hud\.
# The asset directories (widget_bundles/ and profiles/) must also be deployed there:
#
#   C:\tze_hud\
#     tze_hud.exe
#     tze_hud.toml          (this file, renamed)
#     widget_bundles\
#       gauge\
#       progress-bar\
#       status-indicator\
#     profiles\
#       notification-stack-exemplar\
#
# Usage:
#   tze_hud --window-mode overlay
#   tze_hud --config /path/to/tze_hud.toml --window-mode overlay
#
# Widget instance names (for MCP publish_to_widget):
#   widget_name: "main-gauge"      → gauge widget (level, label, fill_color, severity)
#   widget_name: "main-progress"   → progress-bar widget (progress, label, fill_color)
#   widget_name: "main-status"     → status-indicator widget (status, label, reason)
#
# See publish_to_widget semantics in .claude/skills/user-test/SKILL.md:
# widget_name addresses a widget *instance* (not a type). The instance name is
# the instance_id declared below — not the widget_type name.

# Runtime profile selection (required by loader schema).
# Keep this aligned with crates/tze_hud_config::loader validation:
# config MUST include [runtime] with profile and at least one [[tabs]] entry.
[runtime]
profile = "full-display"

# Widget bundle directories scanned at startup.
# Paths are resolved relative to this config file's parent directory.
# Each path is a root whose immediate subdirectories are scanned for widget.toml.
#
# When deploying to Windows, copy all three bundle directories alongside the exe:
#   widget_bundles/gauge/
#   widget_bundles/progress-bar/
#   widget_bundles/status-indicator/
[widget_bundles]
paths = ["widget_bundles"]

# Component profile bundle directories scanned at startup.
# The notification profile is isolated here so notification styling can evolve
# without changing global token defaults for other zones.
[component_profile_bundles]
paths = ["profiles"]

# Active component profile selection.
# Only notification is selected for this app config.
[component_profiles]
notification = "notification-stack-exemplar"

# Main display tab — hosts all widget instances.
[[tabs]]
name        = "Main"
default_tab = true

# ── Gauge widget instance ─────────────────────────────────────────────────────
# MCP widget_name: "main-gauge"
# Parameters: level (f32 0–1), label (string), fill_color (color), severity (enum)
# Position: left edge, vertically centered; narrow vertical meter clear of subtitles.
[[tabs.widgets]]
widget_type = "gauge"
instance_id  = "main-gauge"

[tabs.widgets.geometry]
x      = 40
y      = 420
width  = 100
height = 240

# ── Progress-bar widget instance ──────────────────────────────────────────────
# MCP widget_name: "main-progress"
# Parameters: progress (f32 0–1), label (string), fill_color (color)
# Position: lower-left, lifted for clear manual visibility.
[[tabs.widgets]]
widget_type = "progress-bar"
instance_id  = "main-progress"

[tabs.widgets.geometry]
x_pct      = 0.421875
y_pct      = 0.9074074
width_pct  = 0.15625
height_pct = 0.0185185

# ── Status-indicator widget instance ─────────────────────────────────────────
# MCP widget_name: "main-status"
# Parameters: status (enum), label (string), reason (string)
# Position: top-right corner; icon is small, tooltip expands leftward inside widget bounds.
[[tabs.widgets]]
widget_type = "status-indicator"
instance_id  = "main-status"

[tabs.widgets.geometry]
x      = 1660
y      = 40
width  = 252
height = 96

# ── Registered agents ─────────────────────────────────────────────────────────
# Capability governance is fail-closed under production config: only agents listed
# in [agents.registered] may connect, and only with the capabilities enumerated
# here. Unknown agents receive guest policy (no capabilities). See
# configuration/spec.md §Capability Vocabulary for the canonical vocabulary.

# Resident gRPC portal bridge (hud-x2e2v / hud-osy3m).
# The bridge is default-OFF: it only connects when enabled via
# TZE_HUD_RESIDENT_GRPC_PORTAL=1 or a [resident_grpc_portal] settings block. When
# enabled against this runtime's own loopback gRPC server, it presents the agent
# identity `resident-grpc-portal` (DEFAULT_RESIDENT_GRPC_AGENT_ID) and authenticates
# with the hosting runtime's own PSK (ResidentGrpcCredentialSource::RuntimePsk —
# no separate auth_psk_env is required for the loopback self-target).
#
# Without this entry the bridge connects but fails handshake with
# CapabilityNotGranted, because the runtime is the final authorizer. The bridge
# requires exactly PORTAL_CAPABILITIES (crates/tze_hud_runtime resident_grpc_bridge):
# it creates one portal tile and mutates only that tile. Grant the least-privilege
# set — nothing more.
[agents.registered.resident-grpc-portal]
capabilities = [
    "create_tiles",
    "modify_own_tiles",
]
