# tze_hud Windows Media Ingress Configuration
#
# Explicit opt-in config for the one-stream Windows media ingress exemplar.
# Production remains default-off unless this config is selected deliberately.

[runtime]
profile = "full-display"

[widget_bundles]
paths = ["widget_bundles"]

[component_profile_bundles]
paths = ["profiles"]

[component_profiles]
notification = "notification-stack-exemplar"

[[tabs]]
name = "Main"
default_tab = true

[media_ingress]
enabled = true
approved_zone = "media-pip"
max_active_streams = 1
default_classification = "household"
operator_disabled = false

[media_ingress.geometry]
x = 1440
y = 756
width = 420
height = 236

[agents.registered.windows-local-media-producer]
capabilities = [
    "media_ingress",
    "publish_zone:media-pip",
    "read_telemetry",
]

[agents.registered.windows-youtube-frame-bridge]
capabilities = [
    "media_ingress",
    "publish_zone:media-pip",
    "read_telemetry",
]
