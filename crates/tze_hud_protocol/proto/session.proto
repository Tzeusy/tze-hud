syntax = "proto3";

package tze_hud.protocol.v1.session;

import "types.proto";
import "events.proto";
import "events_legacy.proto";  // DEPRECATED legacy messages used by SceneDelta

// ─── Session Protocol ─────────────────────────────────────────────────────────
//
// Bidirectional streaming session protocol for resident agent <-> runtime
// communication. Implements RFC 0005 (Session/Protocol).
//
// This replaces the unary-RPC model in SceneService with a single
// multiplexed bidirectional stream per agent.
//
// ID convention: All scene-object IDs use `bytes` (16-byte UUIDv7).
// Future: import from common/ids.proto once SceneId message is extracted.

// ─── gRPC service ─────────────────────────────────────────────────────────────

service HudSession {
  // Primary bidirectional session stream.
  // All session traffic (handshake, mutations, events, heartbeats,
  // lease management, subscriptions) flows over this single stream.
  rpc Session(stream ClientMessage) returns (stream ServerMessage);
}

// ─── Client -> Server envelope ────────────────────────────────────────────────

message ClientMessage {
  uint64 sequence         = 1;  // Per-direction monotonically increasing, starts at 1
  uint64 timestamp_wall_us = 2; // Sender wall-clock (UTC us since epoch); advisory only

  oneof payload {
    // Session lifecycle
    SessionInit       session_init       = 10;
    SessionResume     session_resume     = 11;
    SessionClose      session_close      = 12;

    // Scene mutations
    MutationBatch     mutation_batch     = 20;

    // Lease management (RFC 0008)
    LeaseRequest      lease_request      = 21;
    LeaseRenew        lease_renew        = 22;
    LeaseRelease      lease_release      = 23;

    // Subscriptions
    SubscriptionChange subscription_change = 24;

    // Zone publishing (RFC 0005 §3.1, §8.6)
    // Durable-zone publishes receive ZonePublishResult; ephemeral are fire-and-forget.
    ZonePublish       zone_publish        = 25;

    // Telemetry (RFC 0005 §3.8: field 26)
    TelemetryFrame    telemetry_frame    = 26;

    // Input control (RFC 0004 §8.3.1, RFC 0005 §3.8)
    InputFocusRequest    input_focus_request    = 27;
    InputCaptureRequest  input_capture_request  = 28;
    InputCaptureRelease  input_capture_release  = 29;
    SetImePosition       set_ime_position       = 30;

    // Keepalive (moved from field 25 to field 31 to align with spec §3.8; field 25 reallocated to zone_publish)
    // NOTE: This is a deliberate wire-breaking change from the pre-spec layout.
    // Any client built against the old field assignment (heartbeat=25) is incompatible.
    // Both the name "heartbeat" and the number 25 are being actively reused, so no
    // proto `reserved` declaration is possible here. Document in changelog instead.
    Heartbeat         heartbeat          = 31;

    // Capability management (RFC 0005 §5.3)
    // At most one CapabilityRequest SHOULD be in flight per session at a time.
    CapabilityRequest capability_request = 32;

    // Agent scene event emission (scene-events/spec.md §5.1, §5.2).
    // Requires emit_scene_event:<event_name> capability.
    EmitSceneEvent emit_scene_event = 33;

    // Widget asset registration/upload (session-protocol spec §Requirement: Widget Asset Registration via Session Stream).
    // Two-stage flow: metadata preflight + optional payload upload.
    // Requires register_widget_asset capability.
    WidgetAssetRegister widget_asset_register = 34;

    // Widget publishing (widget-system spec §Requirement: Widget Publishing via gRPC).
    // Durable-widget publishes receive WidgetPublishResult; ephemeral are fire-and-forget.
    // Requires publish_widget:<widget_name> capability.
    WidgetPublish widget_publish = 35;
  }
}

// ─── Server -> Client envelope ────────────────────────────────────────────────

message ServerMessage {
  uint64 sequence         = 1;  // Per-direction monotonically increasing, starts at 1
  uint64 timestamp_wall_us = 2; // Sender wall-clock (UTC us since epoch); advisory only

  oneof payload {
    // Session lifecycle
    SessionEstablished    session_established    = 10;
    SessionError          session_error          = 11;

    // Server response to SessionResume (RFC 0005 §6.3)
    SessionResumeResult   session_resume_result  = 12;

    // Safe-mode lifecycle notifications (RFC 0005 §3.7)
    // Both are transactional (never dropped).
    SessionSuspended      session_suspended      = 13;
    SessionResumed        session_resumed        = 14;

    // Structured runtime error (RFC 0005 §3.5)
    // Sent in response to any operation that fails with a well-known error condition.
    RuntimeError          runtime_error          = 15;

    // Mutation responses
    MutationResult        mutation_result        = 20;

    // Lease lifecycle (RFC 0008)
    LeaseResponse         lease_response         = 21;
    LeaseStateChange      lease_state_change     = 23;

    // Capability grant/revocation notice (RFC 0005 §5.3)
    CapabilityNotice      capability_notice      = 25;

    // Scene state
    SceneSnapshot         scene_snapshot         = 30;
    SceneDelta            scene_delta            = 31;

    // Keepalive
    Heartbeat             heartbeat              = 33;

    // Event batch (defined in events.proto; RFC 0004 §8.3, §8.4, RFC 0005 §3.1)
    // Carries per-frame InputEnvelope variants (pointer, keyboard, focus, capture, gesture,
    // IME, scroll, command events). Variants are filtered per RFC 0005 §7.1 before delivery.
    tze_hud.protocol.v1.EventBatch event_batch   = 34;

    // Backpressure
    BackpressureSignal    backpressure_signal    = 35;

    // Runtime telemetry delivered to agents subscribed to TELEMETRY_FRAMES (RFC 0005 §9).
    // State-stream class: coalesced under backpressure; requires read_telemetry capability.
    RuntimeTelemetryFrame runtime_telemetry     = 36;

    // Subscription acknowledgement (RFC 0005 §7.3)
    SubscriptionChangeResult subscription_change_result = 39;

    // Zone publish result (RFC 0005 §3.1): sent only for durable-zone publishes.
    // Ephemeral-zone publishes are fire-and-forget; no ZonePublishResult is sent.
    ZonePublishResult     zone_publish_result    = 40;

    // Input control responses (RFC 0004 §8.3.1, RFC 0005 §3.8)
    InputFocusResponse    input_focus_response    = 43;
    InputCaptureResponse  input_capture_response  = 44;

    // Agent scene event emission result (scene-events/spec.md §5.1).
    EmitSceneEventResult  emit_scene_event_result = 45;

    // Degradation notice (RFC 0005 §3.4, §7.1).
    // Transactional — never dropped. Delivered to ALL active sessions unconditionally
    // on degradation level change, regardless of subscription configuration.
    DegradationNotice     degradation_notice      = 46;

    // Widget publish result (widget-system spec §Requirement: Widget Publish Result).
    // Sent only for durable-widget publishes. Ephemeral-widget publishes are
    // fire-and-forget; no WidgetPublishResult is sent.
    WidgetPublishResult   widget_publish_result   = 47;

    // Widget asset register result (session-protocol spec §Requirement: Widget Asset Registration via Session Stream).
    // Sent for every WidgetAssetRegister request (transactional).
    WidgetAssetRegisterResult widget_asset_register_result = 48;
  }

  // Field 22 (lease_denial) was removed in the v1 vocabulary rename.
  // Reserved to prevent accidental reuse and wire-format incompatibilities.
  reserved 22;
  reserved "lease_denial";

  // Field 32 (subscription_ack) was renamed to subscription_change_result (field 39)
  // to align with the spec. Reserved to prevent accidental reuse.
  reserved 32;
  reserved "subscription_ack";
}

// ─── Authentication credentials (RFC 0005 §1.4) ──────────────────────────────

// Pre-shared key credential (v1 primary auth mechanism).
message PreSharedKeyCredential {
  string key = 1;  // The pre-shared key value
}

// Local socket credential — valid only when client connects via Unix domain socket.
// V1 implementation: accepted unconditionally on loopback connections.
message LocalSocketCredential {
  string socket_path = 1;  // Socket path used by the client (for audit logging)
  string pid_hint    = 2;  // Caller PID hint (advisory, for logging only)
}

// OAuth 2.0 bearer token credential.
// V1 schema defined; implementation deferred to post-v1.
message OauthTokenCredential {
  string bearer_token = 1;  // OAuth 2.0 bearer token
  string token_type   = 2;  // e.g. "Bearer"
}

// Mutual TLS credential.
// V1 schema defined; implementation deferred to post-v1.
message MtlsCredential {
  bytes  client_certificate_der = 1;  // DER-encoded client certificate
  string expected_san           = 2;  // Expected Subject Alternative Name for verification
}

// Authentication credential oneof (RFC 0005 §1.4, DR-SP6).
// V1 ships pre-shared key and local socket implementations only.
// OauthToken and Mtls are schema-defined but implementation is v1-reserved.
message AuthCredential {
  oneof credential {
    PreSharedKeyCredential  pre_shared_key    = 1;
    LocalSocketCredential   local_socket      = 2;
    OauthTokenCredential    oauth_token       = 3;  // v1-reserved: schema only
    MtlsCredential          mtls              = 4;  // v1-reserved: schema only
  }
}

// ─── Session lifecycle messages ───────────────────────────────────────────────

// First message from client on a new connection.
// Must arrive within handshake_timeout (default 5000ms) or stream is closed.
message SessionInit {
  string agent_id               = 1;  // Stable agent identifier (e.g. "weather-agent")
  string agent_display_name     = 2;  // Human-readable label

  // Authentication credential (RFC 0005 §1.4).
  // V1 supports: PreSharedKeyCredential, LocalSocketCredential.
  // Field 3 (pre_shared_key string) was replaced by auth_credential at field 13.
  // Kept for backward-compat but auth_credential takes precedence if set.
  string pre_shared_key         = 3;  // Deprecated: use auth_credential instead

  // Capabilities requested by the agent
  repeated string requested_capabilities = 4;

  // Initial event subscriptions
  repeated string initial_subscriptions  = 5;

  // Optional resume token from a previous session
  bytes  resume_token           = 6;  // Empty = new session; non-empty = resume attempt

  // Agent's wall-clock at handshake time (UTC us since epoch)
  // Used for initial clock-skew estimation (RFC 0003 SS1.3)
  // Clock domain: wall-clock. See RFC 0005 SS2.4.
  uint64 agent_timestamp_wall_us = 7;

  // Protocol version negotiation (RFC 0005 §4.1).
  // version = major * 1000 + minor (e.g. 1000 = v1.0, 1001 = v1.1).
  // Runtime picks highest mutually supported version; sends UNSUPPORTED_PROTOCOL_VERSION
  // if no intersection exists.
  uint32 min_protocol_version   = 8;  // Minimum version agent can speak (0 = unset → treated as 1000)
  uint32 max_protocol_version   = 9;  // Maximum version agent can speak (0 = unset → treated as 1000)

  // Structured auth credential (RFC 0005 §1.4).
  // Takes precedence over pre_shared_key (field 3) if set.
  AuthCredential auth_credential = 13;
}

// First message from client for reconnection within grace period.
// Alternative to SessionInit when agent has a valid resume token.
message SessionResume {
  string agent_id                   = 1;
  bytes  resume_token               = 2;  // Token from previous SessionEstablished
  uint64 last_seen_server_sequence  = 3;  // Last server sequence the client processed
  string pre_shared_key             = 4;  // Re-authenticate on resume (deprecated: use auth_credential)

  // Structured auth credential for re-authentication (RFC 0005 §6.2).
  // Takes precedence over pre_shared_key if set.
  AuthCredential auth_credential    = 5;
}

// Graceful disconnect from client.
message SessionClose {
  string reason        = 1;  // Optional human-readable reason
  bool   expect_resume = 2;  // Hint: agent intends to reconnect shortly
}

// Server response: session established (handshake accepted).
// Followed immediately by a SceneSnapshot.
message SessionEstablished {
  bytes  session_id               = 1;  // Opaque session identifier (UUIDv7)
  string namespace                = 2;  // Agent's namespace in the scene (RFC 0001 SS1.2)
  repeated string granted_capabilities = 3;  // Capabilities actually granted
  bytes  resume_token             = 4;  // Token for future reconnect within grace period
  uint64 heartbeat_interval_ms    = 5;  // How often client must send Heartbeat (default 5000)
  uint64 server_sequence          = 6;  // Starting server-side sequence number

  // Clock sync (RFC 0003 SS1.3)
  // Clock domain: wall-clock (UTC us since epoch). See RFC 0005 SS2.4.
  uint64 compositor_timestamp_wall_us = 7;
  int64  estimated_skew_us            = 8;  // agent_ts - compositor_ts (signed)

  // Subscription confirmation
  repeated string active_subscriptions = 9;
  repeated string denied_subscriptions = 10;

  // Negotiated protocol version (RFC 0005 §4.1).
  // Highest mutually supported version: major * 1000 + minor.
  // 0 = field not set (old server); treat as 1000 (v1.0).
  uint32 negotiated_protocol_version = 11;
}

// Server response: session error (auth failure, version mismatch, protocol violation, etc.)
message SessionError {
  string code    = 1;  // Error code (e.g. "AUTH_FAILED", "DUPLICATE_AGENT_ID")
  string message = 2;  // Human-readable explanation
  string hint    = 3;  // Machine-readable correction suggestion
}

// Server response to a valid SessionResume (RFC 0005 §6.3).
// Followed immediately by a SceneSnapshot (full snapshot; no delta replay in v1).
// Agents MUST use the subscription state from this message rather than assuming
// their pre-disconnect subscription set is intact.
message SessionResumeResult {
  bool   accepted                        = 1;   // true = resume accepted; false = rejected
  bytes  new_session_token               = 2;   // New token for this resumed session (opaque bytes, e.g. UUIDv7)
  uint64 new_server_sequence             = 3;   // Current server-side sequence
  uint32 negotiated_protocol_version     = 4;   // Protocol version in use
  repeated string granted_capabilities   = 5;   // Capabilities confirmed for resumed session
  string error                           = 6;   // Human-readable rejection reason (if accepted=false)
  // Confirmed subscription state after resume. Agents MUST use these values.
  repeated string active_subscriptions   = 7;   // Confirmed active subscription set
  repeated string denied_subscriptions   = 8;   // Denied (missing capability)
}

// ─── Safe-mode lifecycle messages (RFC 0005 §3.7) ─────────────────────────────

// Runtime notifies all active sessions that safe mode has been entered.
// After delivery, all MutationBatch messages from suspended sessions SHALL be
// rejected with RuntimeError(error_code="SAFE_MODE_ACTIVE"). The session remains
// open and Heartbeat keepalives continue. Transactional — never dropped.
message SessionSuspended {
  string reason          = 1;  // Human-readable reason (e.g. "safe_mode_entered")
  uint64 timestamp_wall_us = 2; // Wall-clock time of suspension (UTC us since epoch)
}

// Runtime notifies all previously suspended sessions that safe mode has exited.
// After delivery, mutation submission is permitted again. Transactional — never dropped.
message SessionResumed {
  uint64 timestamp_wall_us = 1; // Wall-clock time of resumption (UTC us since epoch)
}

// ─── Runtime error messages (RFC 0005 §3.5) ───────────────────────────────────

// Typed error codes for well-known runtime error conditions (RFC 0005 §3.5, DR-SP5).
// Sent as RuntimeError.error_code_enum alongside the string error_code.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED         = 0;
  ERROR_CODE_UNKNOWN             = 1;  // Code not in this enum version; inspect string error_code
  LEASE_EXPIRED                  = 2;
  LEASE_NOT_FOUND                = 3;
  ZONE_TYPE_MISMATCH             = 4;
  ZONE_NOT_FOUND                 = 5;
  BUDGET_EXCEEDED                = 6;
  MUTATION_REJECTED              = 7;
  PERMISSION_DENIED              = 8;
  RATE_LIMITED                   = 9;
  INVALID_ARGUMENT               = 10;
  SESSION_EXPIRED                = 11;
  CLOCK_SKEW_HIGH                = 12;
  CLOCK_SKEW_EXCESSIVE           = 13;
  SAFE_MODE_ACTIVE               = 14;
  TIMESTAMP_TOO_OLD              = 15;
  TIMESTAMP_TOO_FUTURE           = 16;
  TIMESTAMP_EXPIRY_BEFORE_PRESENT = 17;
  // Agent event emission errors (scene-events/spec.md §5)
  AGENT_EVENT_RATE_EXCEEDED      = 18;  // Sliding-window rate limit exceeded (spec line 133)
  AGENT_EVENT_PAYLOAD_TOO_LARGE  = 19;  // Payload exceeds 4 KB limit (spec line 122)
  AGENT_EVENT_CAPABILITY_MISSING = 20;  // emit_scene_event:<name> capability not granted (spec line 113)
  AGENT_EVENT_INVALID_NAME       = 21;  // Bare name failed regex validation
  AGENT_EVENT_RESERVED_PREFIX    = 22;  // Bare name starts with "system." or "scene."
}

// Structured error response following the common error model (RFC 0005 §3.5).
// Sent in response to any operation that fails with a well-known error condition.
// Also used as the error shape for MCP JSON-RPC error.data (RFC 0005 §8.5).
message RuntimeError {
  string    error_code      = 1;  // Canonical, stable string code (e.g. "LEASE_EXPIRED")
  string    message         = 2;  // Human-readable explanation
  string    context         = 3;  // Invalid field/value context (e.g. "lease_id=<id>")
  string    hint            = 4;  // Machine-readable correction suggestion as JSON
  ErrorCode error_code_enum = 5;  // Typed enum for well-known codes; ERROR_CODE_UNKNOWN if not in enum
}

// ─── Capability management messages (RFC 0005 §5.3) ───────────────────────────

// Client requests additional capabilities mid-session.
// At most one CapabilityRequest SHOULD be in flight per session at a time.
// Re-uses retransmit semantics (sequence as correlation key) per RFC 0005 §5.3.
message CapabilityRequest {
  repeated string capabilities = 1;  // Capabilities being requested
  string          reason       = 2;  // Human-readable rationale for audit/logging
}

// Server response to a CapabilityRequest (RFC 0005 §5.3).
// Also sent spontaneously when the runtime revokes capabilities.
// On full denial the runtime sends RuntimeError(PERMISSION_DENIED) instead of this message.
message CapabilityNotice {
  repeated string granted               = 1;  // Capabilities newly granted (RFC 0005 §5.3, §9)
  repeated string revoked               = 2;  // Capabilities being revoked (spontaneous notice)
  string          reason                = 3;  // Human-readable reason
  uint64          effective_at_server_seq = 4; // Server sequence at which change takes effect
}

// ─── Mutation messages ────────────────────────────────────────────────────────

// Optional timing semantics for a MutationBatch (RFC 0003 §3.5, §4.5).
// Clock domain: wall-clock (UTC µs since Unix epoch).
// 0 in either field means "no constraint" (present immediately / no expiry).
message TimingHints {
  // Wall-clock time at which mutations should be presented (UTC µs since epoch).
  // 0 = present immediately.
  // Rejected if < session_open_at_wall_us - 60_000_000 µs (TIMESTAMP_TOO_OLD).
  // Rejected if > current_wall_us + max_future_schedule_us (TIMESTAMP_TOO_FUTURE).
  uint64 present_at_wall_us = 1;

  // Wall-clock expiry for the mutations (UTC µs since epoch).
  // 0 = no expiry.
  // Rejected if > 0 and <= present_at_wall_us (TIMESTAMP_EXPIRY_BEFORE_PRESENT).
  uint64 expires_at_wall_us = 2;
}

// Atomic batch of scene mutations (RFC 0001 SS4).
message MutationBatch {
  bytes  batch_id  = 1;  // UUIDv7; deduplication key (RFC 0005 SS5.2)
  bytes  lease_id  = 2;  // Lease under which mutations execute
  repeated tze_hud.protocol.v1.MutationProto mutations = 3;  // Ordered; applied atomically
  TimingHints timing = 4;  // Optional timing semantics (RFC 0003 §3.5)
}

// Server response to MutationBatch.
message MutationResult {
  bytes  batch_id       = 1;  // Echo of request batch_id
  bool   accepted       = 2;
  repeated bytes created_ids = 3;  // SceneIds assigned to CreateTile/CreateNode
  string error_code     = 4;  // Populated if accepted = false
  string error_message  = 5;
}

// ─── Lease messages (RFC 0008) ────────────────────────────────────────────────

// Client requests a new lease.
message LeaseRequest {
  uint64 ttl_ms                  = 1;  // Requested TTL; 0 = server default
  repeated string capabilities   = 2;  // Requested capability scope
  uint32 lease_priority          = 3;  // Requested priority [0-4]; 2 = default
}

// Client renews an existing lease.
message LeaseRenew {
  bytes  lease_id   = 1;  // Lease to renew
  uint64 new_ttl_ms = 2;  // New TTL; 0 = same as original
}

// Client voluntarily releases a lease.
message LeaseRelease {
  bytes lease_id = 1;  // Lease to release
}

// Server response to a lease operation (request, renew, or release).
// Unified grant/denial response per v1 vocabulary.
message LeaseResponse {
  // Whether the lease was granted or denied.
  bool   granted              = 1;

  // Populated when granted = true.
  bytes  lease_id             = 2;  // Granted lease ID (UUIDv7)
  uint64 granted_ttl_ms       = 3;  // Actual TTL granted
  uint32 granted_priority     = 4;
  repeated string granted_capabilities = 5;

  // Populated when granted = false.
  string deny_reason          = 6;  // Human-readable denial reason
  string deny_code            = 7;  // Machine-readable denial code
}

// Server notifies of lease state change (revocation, expiry, suspension, etc.)
message LeaseStateChange {
  bytes  lease_id       = 1;  // Affected lease
  string previous_state = 2;  // e.g. "ACTIVE"
  string new_state      = 3;  // e.g. "REVOKED", "EXPIRED", "SUSPENDED"
  string reason         = 4;  // Human-readable reason
  uint64 timestamp_wall_us = 5; // When the transition occurred (UTC us)
}

// ─── Subscription messages ────────────────────────────────────────────────────

// A subscription request pairing a category with an optional finer-grained
// event type prefix filter (RFC 0010 §7.2, spec line 179).
//
// When filter_prefix is non-empty, only events whose type starts with that
// prefix are delivered (e.g., "scene.zone." within SCENE_TOPOLOGY).
// When empty, the category's default prefix applies.
message SubscriptionEntry {
  string category      = 1;  // Category name (SHOUTY_SNAKE_CASE)
  string filter_prefix = 2;  // Optional finer-grained prefix; empty = use category default
}

// Client changes event subscriptions.
message SubscriptionChange {
  repeated string            subscribe        = 1;  // Categories to add (no filter; use category default)
  repeated string            unsubscribe      = 2;  // Categories to remove
  repeated SubscriptionEntry subscribe_filter = 3;  // Categories to add with explicit prefix filter
}

// Server acknowledges subscription change (RFC 0005 §7.3).
// Echoes the full active subscription set after the change.
// Denied additions (missing capability) appear in denied_subscriptions.
// SHALL NOT reuse MutationResult; this is a dedicated ack type.
message SubscriptionChangeResult {
  repeated string active_subscriptions = 1;  // Full active set after change
  repeated string denied_subscriptions = 2;  // Requested but denied (missing capability)
}

// ─── Zone publishing messages ──────────────────────────────────────────────────

// Client publishes content to a named zone (RFC 0005 §3.1, §8.6).
// Distinct from mutation-based PublishToZoneMutation path.
// Durable-zone publishes receive ZonePublishResult; ephemeral are fire-and-forget.
message ZonePublish {
  string                         zone_name   = 1;  // Name of the target zone
  tze_hud.protocol.v1.ZoneContent content    = 2;  // Content to publish
  uint64                         ttl_us      = 3;  // Duration in µs; 0 = zone default
  string                         merge_key   = 4;  // For MergeByKey contention policy; empty otherwise
  // Byte-offset breakpoints for StreamText word-by-word reveal (spec §Subtitle Streaming).
  // Only valid for StreamText content. Empty = reveal all at once.
  repeated uint64                breakpoints = 5;
}

// Server response to a durable-zone ZonePublish (RFC 0005 §3.1).
// Correlated by request_sequence matching the ZonePublish envelope's sequence.
// NOT sent for ephemeral-zone publishes (those are fire-and-forget).
message ZonePublishResult {
  uint64 request_sequence = 1;  // Sequence of the ZonePublish that triggered this
  bool   accepted         = 2;  // true = published; false = rejected
  string error_code       = 3;  // Machine-readable error code (if accepted=false)
  string error_message    = 4;  // Human-readable reason (if accepted=false)
}

// ─── Widget publishing messages ───────────────────────────────────────────────

// Client publishes parameter values to a named widget instance (widget-system spec).
// Durable-widget publishes receive WidgetPublishResult; ephemeral are fire-and-forget.
// Requires publish_widget:<widget_name> capability.
// Encoded at ClientMessage field 35.
message WidgetPublish {
  string widget_name   = 1;  // Instance addressing key (instance_id or widget_type_name)
  string instance_id   = 2;  // Optional disambiguation for multi-instance tabs
  repeated tze_hud.protocol.v1.WidgetParameterValueProto params = 3;
  uint32 transition_ms = 4;  // 0 = instant
  uint64 ttl_us        = 5;  // 0 = use widget instance default
  string merge_key     = 6;  // For MergeByKey contention policy; empty otherwise
}

// Server response to a durable-widget WidgetPublish (widget-system spec).
// Correlated by request_sequence matching the WidgetPublish envelope's sequence.
// NOT sent for ephemeral-widget publishes.
// Encoded at ServerMessage field 47.
message WidgetPublishResult {
  bool   accepted         = 1;  // true = applied; false = rejected
  string widget_name      = 2;  // Echoed from WidgetPublish
  string error_code       = 3;  // Machine-readable error code (if accepted=false)
  string error_message    = 4;  // Human-readable reason (if accepted=false)
  uint64 request_sequence = 5;  // Sequence of the WidgetPublish that triggered this
}

// ─── Widget asset registration messages ─────────────────────────────────────

// Client registers/uploads a runtime widget SVG asset by strong content hash.
// Two-stage behavior:
// 1) metadata-only preflight for dedup short-circuit
// 2) payload upload only when hash is unknown
message WidgetAssetRegister {
  string widget_type_id          = 1;  // Kebab-case widget type id
  string svg_filename            = 2;  // Logical filename (must be .svg)
  bytes  content_hash_blake3     = 3;  // 32-byte canonical strong hash identity
  uint32 transport_crc32c        = 4;  // Optional fast transport integrity checksum (0 = omitted)
  uint64 total_size_bytes        = 5;  // Declared payload byte size
  bytes  inline_svg_bytes        = 6;  // Optional inline payload
  bool   metadata_only_preflight = 7;  // True = dedup preflight only
}

// Server response to WidgetAssetRegister (transactional).
message WidgetAssetRegisterResult {
  uint64 request_sequence = 1;  // Sequence of the WidgetAssetRegister that triggered this
  bool   accepted         = 2;
  string widget_type_id   = 3;
  string svg_filename     = 4;
  string asset_handle     = 5;  // Runtime handle when accepted=true
  bool   was_deduplicated = 6;  // True when hash existed and payload transfer was skipped
  string error_code       = 7;  // Machine-readable error code (if accepted=false)
  string error_message    = 8;  // Human-readable reason (if accepted=false)
}

// ─── Heartbeat ────────────────────────────────────────────────────────────────

// Bidirectional keepalive. Same message type in both directions.
// Clock domain: _mono_us for RTT measurement (RFC 0005 SS2.4).
message Heartbeat {
  uint64 timestamp_mono_us = 1;  // Monotonic clock (us); echoed for RTT calculation
}

// ─── Telemetry ────────────────────────────────────────────────────────────────

// Agent-side metrics pushed to the runtime.
message TelemetryFrame {
  uint64 sample_timestamp_wall_us = 1;  // Wall-clock UTC (us since epoch)
  uint32 mutations_sent           = 2;  // Mutations sent since last frame
  uint32 mutations_acked          = 3;  // Mutations acknowledged since last frame
  uint64 rtt_estimate_us          = 4;  // Latest RTT estimate (us)
}

// Runtime-to-agent compositor telemetry (RFC 0005 §9, §3.2).
// Delivered on ServerMessage field 36 to agents subscribed to TELEMETRY_FRAMES.
// State-stream traffic class: coalesced under backpressure, latest-wins.
// Requires the read_telemetry capability AND TELEMETRY_FRAMES subscription.
message RuntimeTelemetryFrame {
  uint64 sample_timestamp_wall_us = 1;  // Wall-clock UTC (us since epoch)
  float  compositor_frame_rate    = 2;  // Frames per second (recent average)
  uint64 compositor_frame_budget_us = 3;  // Target frame budget (us)
  uint64 compositor_frame_time_us  = 4;  // Actual last frame time (us)
  uint32 active_sessions          = 5;  // Number of active agent sessions
  uint32 active_leases            = 6;  // Number of active leases
  uint64 heap_used_bytes          = 7;  // Heap memory used (bytes)
  float  gpu_utilization_pct      = 8;  // GPU utilization 0.0–100.0
}

// ─── Scene state messages ─────────────────────────────────────────────────────

// Full deterministic scene snapshot sent on connect/reconnect (RFC 0001 §4.1, §4.2).
//
// The runtime MUST send this after SessionEstablished (new session) and
// SessionResumeResult (reconnect). Agents MUST discard prior state and apply
// this snapshot before issuing mutations. Sequence-number resumption starts
// from the `sequence` field value.
//
// Encoding: snapshot_json carries a JSON-serialized SceneGraphSnapshot struct
// (defined in tze_hud_scene::types). The JSON uses compact (non-pretty)
// encoding for byte stability and must include all fields from the struct,
// including tabs (ordered by display_order), tiles, nodes, zone_registry
// (zone types, instances, active publications — no effective_geometry),
// and active_tab. BTreeMap iteration order guarantees determinism.
//
// Checksum: blake3_checksum (hex) is carried separately for fast validation
// without deserializing the full JSON payload. The checksum is computed over
// the JSON bytes with the checksum field set to "". Agents SHOULD verify the
// checksum before applying the snapshot.
//
// V1 constraints (RFC 0001 §4.2, §6, spec lines 324, 342, 360):
//   - Resources are ephemeral: snapshot references ResourceIds, no blob data.
//   - Incremental diff is NOT available; snapshot-only reconnect in v1.
//   - effective_geometry is NOT included (post-v1 per spec line 360).
message SceneSnapshot {
  // Full scene topology as canonical compact JSON (SceneGraphSnapshot struct).
  // Includes: sequence, snapshot_wall_us, snapshot_mono_us, tabs, tiles,
  // nodes, zone_registry, active_tab, checksum.
  string snapshot_json  = 1;

  // Sequence number at snapshot time (RFC 0001 §3.5).
  // Agents resume mutation submission from this sequence number.
  uint64 sequence       = 2;

  // UTC wall-clock at snapshot time (microseconds since Unix epoch).
  uint64 snapshot_wall_us = 3;

  // Monotonic timestamp at snapshot time (microseconds since process start).
  uint64 snapshot_mono_us = 4;

  // BLAKE3 checksum of the snapshot_json content (64-char lowercase hex).
  // Computed with checksum="" in the JSON payload.
  // Agents SHOULD verify before applying. Mismatch indicates corruption.
  string blake3_checksum = 5;

  // The field name `version` (previously at tag 2) and `scene_json` (previously
  // at tag 1) are reserved to prevent accidental reuse of old names that had
  // different semantics in the pre-spec SceneSnapshot format.
  reserved "scene_json", "version";
}

// Incremental scene update for subscribed events.
message SceneDelta {
  oneof delta {
    tze_hud.protocol.v1.TileCreatedEvent tile_created = 1;
    tze_hud.protocol.v1.TileDeletedEvent tile_deleted = 2;
    tze_hud.protocol.v1.TileUpdatedEvent tile_updated = 3;
    tze_hud.protocol.v1.LeaseEvent       lease_event  = 4;
  }
}

// ─── Input control messages (RFC 0004 §8.3.1, RFC 0005 §3.8) ─────────────────

// Client requests keyboard focus for one of its tiles.
// Synchronous: runtime responds with InputFocusResponse correlated by sequence.
message InputFocusRequest {
  bytes tile_id  = 1;  // Target tile (16-byte UUIDv7); empty = release focus
}

// Server response to InputFocusRequest.
message InputFocusResponse {
  bytes  tile_id = 1;  // Tile the focus decision applies to
  bool   granted = 2;  // true = focus granted; false = denied or released
  string reason  = 3;  // Human-readable reason on denial
}

// Client requests exclusive capture of an input device (e.g. pointer, keyboard).
// Synchronous: runtime responds with InputCaptureResponse correlated by sequence.
message InputCaptureRequest {
  bytes  tile_id     = 1;  // Tile requesting capture (16-byte UUIDv7)
  string device_kind = 2;  // "pointer" | "keyboard" | "touch"
}

// Server response to InputCaptureRequest.
message InputCaptureResponse {
  bytes  tile_id     = 1;  // Tile the capture decision applies to
  string device_kind = 2;  // Mirrors InputCaptureRequest.device_kind
  bool   granted     = 3;  // true = capture granted; false = denied
  string reason      = 4;  // Human-readable reason on denial
}

// Client voluntarily releases a previously captured input device.
// Asynchronous: confirmed by CaptureReleasedEvent in the next EventBatch (field 34).
message InputCaptureRelease {
  bytes  tile_id     = 1;  // Tile releasing capture (16-byte UUIDv7)
  string device_kind = 2;  // "pointer" | "keyboard" | "touch"
}

// Client repositions the IME (Input Method Editor) candidate window.
// Fire-and-forget: no response sent by the runtime.
message SetImePosition {
  bytes tile_id = 1;  // Tile context for the IME (16-byte UUIDv7)
  float x       = 2;  // Display-space X coordinate (pixels)
  float y       = 3;  // Display-space Y coordinate (pixels)
}

// ─── Backpressure ─────────────────────────────────────────────────────────────

// Server signals queue pressure to the client.
message BackpressureSignal {
  float  queue_pressure    = 1;  // 0.0 = empty, 1.0 = full
  string suggested_action  = 2;  // "reduce_rate", "coalesce", etc.
}

// ─── Agent Scene Event Emission (scene-events/spec.md §5.1, §5.2) ─────────────

// Client emits a scene event from an agent source.
//
// Emission requires the `emit_scene_event:<event_name>` capability, where
// `<event_name>` is the bare name (e.g., "doorbell.ring"), not the fully-prefixed
// delivered event_type.
//
// The runtime will:
//   1. Validate the bare name against [a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+
//   2. Check that "system." and "scene." prefixes are not present
//   3. Check the emit_scene_event:<bare_name> capability
//   4. Enforce the 4 KB payload size limit
//   5. Enforce the per-session sliding-window rate limit (default 10/s)
//   6. Namespace-prefix the event as agent.<namespace>.<bare_name> before delivery
//
// Correlated by the enclosing ClientMessage.sequence field.
// Always receives an EmitSceneEventResult response.
message EmitSceneEvent {
  // Bare event name supplied by the agent (e.g., "doorbell.ring").
  // Runtime prefixes this as agent.<namespace>.<bare_name> for delivery.
  // Must match: [a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+
  // Must not start with "system." or "scene." (reserved).
  string bare_name = 1;

  // Encoded event payload (proto-serialised bytes).
  // Maximum 4096 bytes (4 KB). Exceeding this limit rejects the emission.
  bytes  payload   = 2;

  // Reserved / advisory field for future attention-policy integration.
  // Currently not used by the runtime to affect event delivery semantics.
  // Will be wired to zone-ceiling enforcement and CRITICAL downgrade in bead #3.
  // Uses wire values matching the InterruptionClass enum in the scene data model:
  //   0=CRITICAL, 1=HIGH, 2=NORMAL (default), 3=LOW, 4=SILENT
  uint32 interruption_class_hint = 3;
}

// Server response to EmitSceneEvent.
// Correlated by request_sequence matching the EmitSceneEvent message's
// enclosing ClientMessage.sequence.
message EmitSceneEventResult {
  // Sequence of the EmitSceneEvent ClientMessage that triggered this.
  uint64  request_sequence  = 1;

  // true = event accepted, namespace-prefixed, and dispatched to subscribers.
  // false = emission rejected; inspect error_code and error_message.
  bool    accepted          = 2;

  // Fully-prefixed event type as delivered to subscribers (populated when accepted=true).
  // Example: "agent.doorbell_agent.doorbell.ring"
  string  delivered_event_type = 3;

  // Machine-readable rejection code (populated when accepted=false).
  // Uses ErrorCode enum names as strings:
  //   "AGENT_EVENT_CAPABILITY_MISSING"  — missing emit_scene_event:<bare_name>
  //   "AGENT_EVENT_RATE_EXCEEDED"       — sliding-window rate limit exceeded
  //   "AGENT_EVENT_PAYLOAD_TOO_LARGE"   — payload > 4 KB
  //   "AGENT_EVENT_INVALID_NAME"        — bare name fails regex validation
  //   "AGENT_EVENT_RESERVED_PREFIX"     — bare name starts with "system." or "scene."
  string  error_code        = 4;

  // Human-readable rejection reason (populated when accepted=false).
  string  error_message     = 5;
}

// ─── Degradation (RFC 0005 §3.4, §7.1) ───────────────────────────────────────

// Degradation severity levels reported by the runtime.
// NORMAL means all systems operating at full capability.
// Higher levels indicate progressively deeper capacity reduction.
enum DegradationLevel {
  DEGRADATION_LEVEL_UNSPECIFIED     = 0;  // Sentinel / unknown
  NORMAL                            = 1;  // Full capability; no degradation
  COALESCING_MORE                   = 2;  // State-stream updates are coalesced more aggressively
  MEDIA_QUALITY_REDUCED             = 3;  // AV stream quality/bitrate reduced
  STREAMS_REDUCED                   = 4;  // Some media streams suspended
  RENDERING_SIMPLIFIED              = 5;  // Compositor drops non-critical render passes
  SHEDDING_TILES                    = 6;  // Low-priority tiles actively shed
  AUDIO_ONLY_FALLBACK               = 7;  // Video disabled; audio-only mode
}

// Runtime notifies all active sessions of a change in degradation level.
// Transactional — never dropped under backpressure (RFC 0005 §3.4).
// Delivered unconditionally to ALL active sessions regardless of subscription config.
// degradation_notices subscriptions SHALL NOT be filterable (RFC 0005 §7.1).
message DegradationNotice {
  DegradationLevel level              = 1;  // Current degradation level
  string           reason             = 2;  // Human-readable reason for the change
  repeated string  affected_capabilities = 3;  // Capabilities impacted at this level
  uint64           timestamp_wall_us  = 4;  // Wall-clock time of the level change (UTC µs)
}

// ─── RuntimeService — configuration management RPC ────────────────────────────
//
// Implements RFC 0006 §9 (v1-mandatory): live configuration reload without
// process restart. The `ReloadConfig` RPC is one of the two required triggers
// for hot-reloadable config sections ([privacy], [degradation], [chrome],
// [agents.dynamic_policy]). The other trigger is SIGHUP (OS signal).
//
// Callers must supply the full TOML config; the runtime re-validates the entire
// file and applies only the hot-reloadable sections on success.

service RuntimeService {
  // Reload hot-reloadable configuration sections from a new TOML string.
  //
  // The runtime validates the supplied TOML. If validation succeeds, the
  // hot-reloadable sections ([privacy], [degradation], [chrome],
  // [agents.dynamic_policy]) are atomically applied. Frozen sections
  // ([runtime], [[tabs]], [agents.registered]) are silently ignored.
  //
  // Returns:
  //   - ReloadConfigResponse with success=true on successful reload.
  //   - ReloadConfigResponse with success=false and validation_errors populated
  //     on parse or validation failure. The running config is NOT modified.
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);
}

// Request to reload hot-reloadable config sections from a new TOML string.
message ReloadConfigRequest {
  // Full TOML config string to parse and validate.
  // Per RFC 0006 §9: the entire config is re-validated; only the
  // hot-reloadable sections are applied on success.
  string config_toml = 1;
}

// Response to a ReloadConfig request.
message ReloadConfigResponse {
  // true if the new config was valid and has been applied.
  // false if validation failed; the running config is unchanged.
  bool success = 1;

  // Human-readable error messages on failure (empty on success).
  // Each entry corresponds to one validation error.
  repeated string validation_errors = 2;

  // Wall-clock timestamp of the reload (UTC µs since epoch).
  // Set on both success and failure for audit purposes.
  uint64 reloaded_at_wall_us = 3;
}
