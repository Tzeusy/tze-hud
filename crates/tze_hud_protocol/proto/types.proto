syntax = "proto3";

package tze_hud.protocol.v1;

// ─── Identity Types ───────────────────────────────────────────────────────────

// A scene-object identifier: 16-byte little-endian UUIDv7.
// All-zero bytes represent the null/absent sentinel (RFC 0001 §1.1).
// Wire format: raw 16 bytes (little-endian UUID byte order).
message SceneIdProto {
  bytes bytes = 1;  // exactly 16 bytes
}

// A content-addressed resource identifier: raw 32-byte BLAKE3 hash.
// Wire format: raw 32 bytes — never hex-encoded (RFC 0001 §1.1).
message ResourceIdProto {
  bytes bytes = 1;  // exactly 32 bytes
}

// ─── Geometry Primitives ─────────────────────────────────────────────────────

message Rect {
  float x      = 1;
  float y      = 2;
  float width  = 3;
  float height = 4;
}

message Rgba {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// ─── Node Types ───────────────────────────────────────────────────────────────

message NodeProto {
  bytes id = 1;  // 16-byte UUIDv7 SceneId (little-endian); empty (0 bytes) = unset, server assigns; 16 zero bytes = explicit null sentinel
  oneof data {
    SolidColorNodeProto solid_color = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto hit_region = 12;
    StaticImageNodeProto static_image = 13;
  }
  // Inline child subtree (hud-ga4md). Recursive: each child MAY carry its own
  // `children`. Empty (the default) = a flat single-node root — BYTE-COMPATIBLE
  // with the pre-children wire, so existing publishers are unaffected. When a
  // tile root arrives with inline children, the runtime materializes the whole
  // subtree atomically as ONE mutation (`SetTileRoot`), so a multi-part portal
  // body (transcript + head-anchored composer + INPUT band as separate nodes)
  // rides a single coalescible StateStream update instead of a per-node `AddNode`
  // fan-out that would flip the batch Transactional and break latest-wins
  // coalescing on the hot transcript-republish path (hud-mzk74). Field 2 is
  // stable and MUST NOT be renumbered.
  repeated NodeProto children = 2;
  // How this node positions its direct children (hud-yfj8u). UNSPECIFIED (the
  // default, 0) = Absolute — each child drawn at its own explicit `bounds.y`,
  // BYTE-COMPATIBLE with the pre-layout wire so existing publishers are
  // unaffected. VERTICAL_FLOW asks the runtime to stack the children (measure
  // each child's wrapped height and position the next below it plus a
  // token-driven gap; see the vertical-flow layout engine). Field 3 is stable
  // and MUST NOT be renumbered.
  NodeLayoutProto layout = 3;
}

// How a NodeProto lays out its direct children (hud-yfj8u). Additive and
// default-off: UNSPECIFIED maps to Absolute (historical behavior).
enum NodeLayoutProto {
  NODE_LAYOUT_PROTO_UNSPECIFIED   = 0;  // absent = Absolute (byte-compatible default)
  NODE_LAYOUT_PROTO_ABSOLUTE      = 1;  // children positioned by their own bounds
  NODE_LAYOUT_PROTO_VERTICAL_FLOW = 2;  // children stacked by the runtime flow resolver
}

message SolidColorNodeProto {
  Rgba color = 1;
  Rect bounds = 2;
  float radius = 3;  // -1.0 = not set sentinel; valid >= 0.0
}

// A single inline color run for TextMarkdownNodeProto.
//
// Byte offsets are into the raw `content` string (pre-markdown-strip).
// start_byte MUST be < end_byte, both MUST be valid UTF-8 boundary positions
// within `content`.  Ranges not covered by any run inherit the node's base
// `color`.  When runs overlap, the last run in the repeated list wins.
message TextColorRunProto {
  uint32 start_byte = 1;  // Inclusive UTF-8 byte offset into content
  uint32 end_byte   = 2;  // Exclusive UTF-8 byte offset into content
  Rgba   color      = 3;
}

message TextMarkdownNodeProto {
  string content = 1;
  Rect bounds = 2;
  float font_size_px = 3;
  Rgba color = 4;
  Rgba background = 5;
  // Optional inline color runs.  Empty = use base `color` everywhere
  // (backward-compatible default).  Offsets reference the raw `content`
  // bytes before any Markdown stripping.  Field 6 is stable and must not
  // be renumbered.
  repeated TextColorRunProto color_runs = 6;
  // Overflow behaviour for text that overflows the node bounds.
  // UNSPECIFIED = compositor default (Ellipsis).  Field 7 is stable and
  // must not be renumbered.  Callers that want explicit clip must set
  // TEXT_OVERFLOW_PROTO_CLIP.  Live portal transcript panes set
  // TEXT_OVERFLOW_PROTO_ELLIPSIS to engage the TruncationCache contract.
  TextOverflowProto overflow = 7;
}

message HitRegionNodeProto {
  Rect bounds = 1;
  string interaction_id = 2;
  bool accepts_focus = 3;
  bool accepts_pointer = 4;
  // When true, PointerDown on this region acquires runtime pointer capture so
  // subsequent move/up events continue routing to the same node even after the
  // pointer leaves the original bounds.
  bool auto_capture = 5;
  // When true, runtime pointer capture acquired by this region is released on
  // the matching PointerUp.
  bool release_on_up = 6;
  // When true, keystroke events targeting this focused node are intercepted by
  // the runtime's ComposerDraftManager and routed into a ComposerDraft buffer
  // instead of being forwarded to the owning agent as raw key events.
  // The adapter receives coalesced DraftStateNotification messages and a final
  // transactional DraftSubmission on Enter/submit.
  // Source: spec §4.1 (hud-5jbra.4 / hud-qwqxy).
  bool accepts_composer_input = 7;
}

// How image content is fitted within the node bounds.
enum ImageFitModeProto {
  IMAGE_FIT_MODE_UNSPECIFIED = 0;
  IMAGE_FIT_MODE_CONTAIN     = 1;  // Scale uniformly so entire image is visible (may letterbox)
  IMAGE_FIT_MODE_COVER       = 2;  // Scale uniformly to cover full bounds (may crop)
  IMAGE_FIT_MODE_FILL        = 3;  // Stretch non-uniformly to fill bounds exactly
  IMAGE_FIT_MODE_SCALE_DOWN  = 4;  // Like Contain but never scale up
}

// A static image node referencing a resource by content-addressed identity.
//
// Per RS-4 (rig-6l03) ephemerality contract: scene messages carry only the
// ResourceId reference (32 raw bytes).  Raw pixel data is NOT embedded.
// Agents upload resources via ResourceUploadStart before creating image nodes.
message StaticImageNodeProto {
  // BLAKE3 hash of the raw resource bytes (32 bytes).
  // Wire format: raw bytes (NOT hex-encoded).
  bytes  resource_id   = 1;
  uint32 width         = 2;
  uint32 height        = 3;
  // Decoded in-memory size in bytes (for budget accounting).
  // Set by the runtime when confirming the mutation; clients may send 0.
  uint64 decoded_bytes = 4;
  ImageFitModeProto fit_mode = 5;
  Rect   bounds        = 6;
}

// ─── Mutation Types ───────────────────────────────────────────────────────────

message CreateTileMutation {
  bytes tab_id = 1;  // 16-byte UUIDv7 SceneId of the target tab; empty = server-infers active tab
  Rect bounds = 2;
  uint32 z_order = 3;
}

message SetTileRootMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the tile
  NodeProto node = 2;
}

// Publish content to an existing tile addressed by persistent element ID.
//
// The runtime resolves `element_id` through the element store (must be a Tile),
// applies the geometry override chain (user > agent-requested bounds), then
// sets content and updates `last_published_at`.
message PublishToTileMutation {
  bytes element_id = 1;  // 16-byte SceneId from element store
  Rect bounds = 2;       // Optional agent-requested bounds
  NodeProto node = 3;    // Optional replacement root node content
}

// Atomically replace the data of an existing node.
// The node must already exist, belong to tile_id, and the data variant must
// match the existing node's variant.  Children and node id are preserved.
message UpdateNodeContentMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the owning tile
  bytes node_id = 2;  // 16-byte UUIDv7 SceneId of the node to update
  // Replacement data — exactly one variant must be set; it must match the
  // existing node's variant (type-change is rejected).
  oneof data {
    SolidColorNodeProto  solid_color   = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto   hit_region    = 12;
    StaticImageNodeProto static_image  = 13;
  }
}

// Add a child node to an existing tile.
//
// parent_id semantics:
//   - Empty (0 bytes): the runtime attaches the node to the tile root if the
//     tile has no root yet; if a root already exists, parent_id MUST be set to
//     an explicit parent to ensure the node is reachable.
//   - Non-empty (16 bytes): the node is inserted as a child of that parent.
//     Use MutationResult.created_ids or the tile root node ID from a snapshot.
//
// Byte order: parent_id uses the same big-endian RFC 4122 wire encoding as
// tile_id and all other SceneId bytes fields in MutationProto (i.e. the raw
// uuid::Uuid::as_bytes() encoding, NOT the little-endian NodeProto.id encoding).
// Use MutationResult.created_ids to obtain parent node IDs in the correct order.
message AddNodeMutation {
  bytes tile_id   = 1;  // 16-byte UUIDv7 SceneId of the target tile (big-endian)
  bytes parent_id = 2;  // 16-byte UUIDv7 SceneId of the parent node (big-endian); empty = see comment
  NodeProto node  = 3;
}

// Update a tile's opacity in [0.0, 1.0].
message UpdateTileOpacityMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the tile
  float opacity = 2;  // Must be in [0.0, 1.0]
}

// Input handling mode for a tile.
enum TileInputModeProto {
  TILE_INPUT_MODE_UNSPECIFIED = 0;
  TILE_INPUT_MODE_PASSTHROUGH = 1;  // Input events pass through to layers below
  TILE_INPUT_MODE_CAPTURE     = 2;  // Tile captures and consumes input events
  TILE_INPUT_MODE_LOCAL_ONLY  = 3;  // Input handled locally, not forwarded to agent
}

// Update a tile's input handling mode.
message UpdateTileInputModeMutation {
  bytes tile_id              = 1;  // 16-byte UUIDv7 SceneId of the tile
  TileInputModeProto input_mode = 2;
}

// Register or replace local-first scroll config for a tile. Enables
// adapter-driven scroll via SetScrollOffsetMutation. Renderer/coalescer
// plumbing shipped in hud-w5ih (PR #489); this is the session-protocol
// exposure of that surface.
message RegisterTileScrollMutation {
  bytes tile_id        = 1;
  bool  scrollable_x   = 2;
  bool  scrollable_y   = 3;
  // -1.0 = unset sentinel (no x-clamp); >= 0.0 = content width pixels.
  float content_width  = 4;
  // -1.0 = unset sentinel (no y-clamp); >= 0.0 = content height pixels.
  float content_height = 5;
}

// Set the tile-local scroll offset. Clamped by the tile's scroll config.
// Requires a prior RegisterTileScrollMutation on the same tile.
message SetScrollOffsetMutation {
  bytes tile_id  = 1;
  float offset_x = 2;
  float offset_y = 3;
}

message MutationProto {
  oneof mutation {
    CreateTileMutation          create_tile            = 1;
    SetTileRootMutation         set_tile_root          = 2;
    PublishToZoneMutation       publish_to_zone        = 3;
    ClearZoneMutation           clear_zone             = 4;
    ClearWidgetMutation         clear_widget           = 5;
    UpdateNodeContentMutation   update_node_content    = 6;
    AddNodeMutation             add_node               = 7;
    UpdateTileOpacityMutation   update_tile_opacity    = 8;
    UpdateTileInputModeMutation update_tile_input_mode = 9;
    PublishToTileMutation       publish_to_tile        = 10;
    RegisterTileScrollMutation  register_tile_scroll   = 11;
    SetScrollOffsetMutation     set_scroll_offset      = 12;
    SetTileLifecycleAccentMutation set_tile_lifecycle_accent = 13;
    SetPortalSurfaceMutation    set_portal_surface     = 14;
    UpdatePortalSurfaceStateMutation update_portal_surface_state = 15;
    SetTileUnreadCountMutation  set_tile_unread_count  = 16;
    SetTileComposerInteractionMutation set_tile_composer_interaction = 17;
  }
}

// Set (or clear) the composer interaction hit region an interaction-enabled
// portal exposes over its host tile (hud-iofav).
//
// This is a *coalescible StateStream* tile-update (client→server MutationBatch,
// RFC 0005 §3.3 / §3.1; Four Message Classes "State-stream"), exactly like
// SetTileLifecycleAccentMutation and SetTileUnreadCountMutation: it reflects the
// portal's interaction-enabled state and is refreshed each portal drain, never
// carried as a per-republish structural `AddNode` (which would flip an
// otherwise-StateStream portal to Transactional and defeat latest-wins coalescing
// on the HOTTEST path — a streaming transcript with an interactive composer,
// hud-mzk74 / hud-iofav).
//
// The composer spec is stored as runtime overlay state keyed by `tile_id`
// (mirroring the lifecycle accent and unread count). The runtime derives the
// composer hit-region scene node from it and RE-ATTACHES that node under the tile
// root after every `PublishToTile`/`SetTileRoot` content republish — which
// replaces the whole node tree and would otherwise wipe a child hit-region node.
// The hit region stays a real scene node so `SceneGraph::hit_test`, focus
// acquisition, and the `ComposerDraftManager` all operate unchanged; the node is
// synthesized server-side as a derived consequence of this overlay state, not as
// an inbound `AddNode`, so the batch stays coalescible.
//
// Absent `composer` clears the interaction (interaction disabled) — the derived
// hit-region node is detached, mirroring the accent's absent-color clear.
message SetTileComposerInteractionMutation {
  bytes tile_id = 1;                // 16-byte SceneId of the target tile
  HitRegionNodeProto composer = 2;  // Composer hit-region spec; absent = clear (interaction disabled)
}

// Set (or clear) the ambient unread-output count a tile's jump-to-latest pill
// MAY carry as a centered badge (hud-g1ena.3 / portal-chat-grade-affordances
// §Jump-to-Latest Affordance).
//
// This is a *coalescible StateStream* tile-update (client→server MutationBatch,
// RFC 0005 §3.3 / §3.1; Four Message Classes "State-stream"), exactly like
// SetTileLifecycleAccentMutation: the count reflects runtime-owned unread state
// and is refreshed each portal drain, never carried as a per-republish `AddNode`
// (which would flip an otherwise-StateStream portal to Transactional, hud-mzk74).
//
// Stored as runtime overlay state keyed by `tile_id` (mirroring the local-first
// scroll config and lifecycle accent), so it survives the transcript's
// `PublishToTile` content republishes — which replace the whole node tree and
// would wipe any child badge node. The compositor reads it via
// `SceneGraph::tile_unread_count` when collecting the pill badge; the pill's own
// `scrolled_back` gate hides the badge the instant the viewer returns to the
// tail. This is the bridged-transport counterpart of the in-process driver's
// direct `set_tile_unread_count` call — carrying the count over the wire gives a
// bridged portal's pill the same badge (hud-hwk2m).
//
// `count = 0` clears the badge; the producer sends 0 for both a genuine empty
// count and a redaction-gated (absent) count, matching the in-process arm's
// `unread_output_count.unwrap_or(0)`.
message SetTileUnreadCountMutation {
  bytes  tile_id = 1;  // 16-byte SceneId of the target tile
  uint32 count   = 2;  // Ambient unread-output count; 0 clears the badge
}

// Set (or clear) the lifecycle-affordance accent for a tile.
//
// This is a *coalescible StateStream* tile-update (carried in a client→server
// MutationBatch, RFC 0005 §3.3 / §3.1; Four Message Classes "State-stream"): the
// accent reflects the portal's lifecycle state
// (active / waiting-for-input / blocked / degraded / detached) and is updated as
// that state transitions — never as a per-republish structural `AddNode` (which
// would flip an otherwise-StateStream portal to Transactional, hud-mzk74).
//
// The accent is stored as runtime overlay state keyed by `tile_id` (mirroring
// the local-first scroll config), so it survives the transcript's
// `PublishToTile` content republishes — which replace the whole node tree
// (`SetTileRoot`) and would wipe any child accent node.
//
// Geometry/color are token-resolved by the producer (portal adapter); the
// compositor paints a left-edge bar from this state. Absent `color` (or a
// non-positive `width_px`) clears the accent — e.g. when lifecycle state is
// redaction-gated to absent.
message SetTileLifecycleAccentMutation {
  bytes tile_id  = 1;  // 16-byte SceneId of the target tile
  Rgba  color    = 2;  // Accent bar color; absent / zero-alpha = clear accent
  float width_px = 3;  // Left-edge bar width in px; <= 0.0 = clear accent
}

// ─── Portal Surface (RFC 0013 §7.2 promotion; hud-tc153) ────────────────────────
//
// First-class text-stream portal surface scene-mutation schema. RFC 0013 §7.2
// authorizes, once the promotion evidence gate passes (hud-qfyfg, PASSED
// 2026-07-05), promotion of the Phase-0 raw-tile pilot to "a first-class runtime
// portal surface or node type". These messages are that surface: a governed
// descriptor that groups the portal's eight named parts, identity, and lifecycle/
// display state into one coalescible object rather than an ad-hoc six-tile
// assembly. Part set + raw-tile cross-map are defined by the `text-portal`
// component type (component-shape-language delta, hud-2ey2w).
//
// No new transport/stream and no scene-graph transcript history: a portal surface
// rides the existing client→server MutationBatch and its parts reference the
// existing bounded-viewport nodes.

// Peer class of the far side of a portal's text stream (RFC 0013 §2.1). Advisory
// identity metadata only; governance does not branch on it.
enum PortalPeerClassProto {
  PORTAL_PEER_CLASS_UNSPECIFIED  = 0;
  PORTAL_PEER_CLASS_RESIDENT_LLM = 1;
  PORTAL_PEER_CLASS_OPERATOR     = 2;
  PORTAL_PEER_CLASS_HUMAN_PEER   = 3;
  PORTAL_PEER_CLASS_ADAPTER      = 4;
}

// Portal lifecycle state (RFC 0013 §3.2 / §6.2). Drives the coalescible
// lifecycle accent the compositor paints.
enum PortalLifecycleStateProto {
  PORTAL_LIFECYCLE_STATE_UNSPECIFIED       = 0;
  PORTAL_LIFECYCLE_STATE_ACTIVE            = 1;
  PORTAL_LIFECYCLE_STATE_WAITING_FOR_INPUT = 2;
  PORTAL_LIFECYCLE_STATE_BLOCKED           = 3;
  PORTAL_LIFECYCLE_STATE_DEGRADED          = 4;
  PORTAL_LIFECYCLE_STATE_DETACHED          = 5;
}

// Collapsed vs. expanded portal presentation (RFC 0013 §3.2).
enum PortalDisplayStateProto {
  PORTAL_DISPLAY_STATE_UNSPECIFIED = 0;
  PORTAL_DISPLAY_STATE_COLLAPSED   = 1;
  PORTAL_DISPLAY_STATE_EXPANDED    = 2;
}

// One of the eight named parts of the first-class portal surface, per the
// `text-portal` component-shape-language part model. Each value cross-maps to the
// Phase-0 raw-tile assembly (comments show the raw tile).
enum PortalPartKindProto {
  PORTAL_PART_KIND_UNSPECIFIED      = 0;
  PORTAL_PART_KIND_FRAME            = 1;  // Phase-0 `frame` tile
  PORTAL_PART_KIND_HEADER           = 2;  // header band of `frame`
  PORTAL_PART_KIND_COMPOSER         = 3;  // Phase-0 `input_scroll`
  PORTAL_PART_KIND_TRANSCRIPT       = 4;  // Phase-0 `output_scroll`
  PORTAL_PART_KIND_DIVIDER          = 5;  // frame-internal divider
  PORTAL_PART_KIND_COLLAPSED_CARD   = 6;  // Phase-0 `minimized_icon`
  PORTAL_PART_KIND_CAPTURE_BACKSTOP = 7;  // Phase-0 `capture_backstop`
  PORTAL_PART_KIND_GESTURE_SHIELD   = 8;  // Phase-0 `drag_shield`
}

// Stable identity / status metadata for a portal surface (RFC 0013 §2.1).
message PortalIdentityProto {
  string session_id   = 1;  // Stable adapter-assigned session id (≤ 256 bytes)
  string display_name = 2;  // Human-readable display name (≤ 128 bytes)
  PortalPeerClassProto peer_class = 3;
}

// One named part of a PortalSurfaceProto.
message PortalPartProto {
  PortalPartKindProto kind = 1;
  Rect  bounds = 2;  // Surface-local geometry (relative to the host tile)
  // 16-byte SceneId of the scene node backing this part's content — "one scene
  // node per part". Empty (0 bytes) = no materialized backing node (e.g. a
  // geometry-only divider). Must be reachable from the host tile's root node.
  bytes node   = 3;
}

// A first-class text-stream portal surface descriptor. Groups the named parts
// with the portal's identity and lifecycle/display state. Stored as runtime
// overlay state keyed by the host tile so it survives transcript republishes.
message PortalSurfaceProto {
  PortalIdentityProto        identity      = 1;
  PortalLifecycleStateProto  lifecycle     = 2;
  PortalDisplayStateProto    display_state = 3;
  repeated PortalPartProto   parts         = 4;  // ≤ 8, one per kind
}

// Declare or replace the first-class portal surface over a tile. Transactional
// (RFC 0005 §3.1): establishes the promoted surface as one governed object in
// place of the six-tile raw assembly. Requires `modify_own_tiles`.
message SetPortalSurfaceMutation {
  bytes tile_id = 1;  // 16-byte SceneId of the host tile
  PortalSurfaceProto surface = 2;
}

// Patch the lifecycle and/or display state of an existing portal surface.
//
// Coalescible StateStream tile-update (RFC 0005 §3.3): an UNSPECIFIED enum value
// leaves that field unchanged; identity and parts are untouched, so a frequent
// lifecycle/collapse transition never re-sends the whole surface (mirrors
// SetTileLifecycleAccent coalescing, hud-mzk74).
message UpdatePortalSurfaceStateMutation {
  bytes tile_id = 1;  // 16-byte SceneId of the host tile
  PortalLifecycleStateProto lifecycle     = 2;  // UNSPECIFIED = leave unchanged
  PortalDisplayStateProto   display_state = 3;  // UNSPECIFIED = leave unchanged
}

// ─── Zone Types ───────────────────────────────────────────────────────────────

// A single action button on a notification slot.
// Maps to the scene-type `NotificationAction` (label + callback_id).
message NotificationActionProto {
  string label       = 1;  // Human-readable button label (≤32 chars recommended)
  string callback_id = 2;  // Opaque identifier forwarded to the publisher on activation
}

message NotificationPayload {
  string text    = 1;
  string icon    = 2;   // Resource name or empty
  uint32 urgency = 3;   // 0=low, 1=normal, 2=urgent, 3=critical
  string title   = 4;   // Optional: bold title for two-line layout; empty = single-line
  repeated NotificationActionProto actions = 5;  // Optional action buttons (≤3 rendered)
}

message StatusBarPayload {
  map<string, string> entries = 1;  // key → display string
}

// Content-addressed static image reference (field 5 in ZoneContent oneof).
// `resource_id` is the 32-byte BLAKE3 hash identifying a resource uploaded via
// ResourceUploadStart (RFC 0011).
message StaticImageRef {
  bytes resource_id = 1;  // 32-byte BLAKE3 content hash (ResourceIdProto.bytes); MUST NOT be empty
}

// Runtime-assigned surface reference for zone-bound media streams (field 6 in
// ZoneContent oneof). Materialised by the compositor when a MediaIngressOpen is
// admitted for a zone-bound stream (RFC 0014 §2.3.1, §2.7). The `surface_id`
// echoes MediaIngressOpenResult.assigned_surface_id and is stable for the
// lifetime of the stream's stream_epoch. Carries declarative publication state
// only; transport internals MUST NOT appear here (WM-S2b snapshot exclusion).
message VideoSurfaceRef {
  bytes  surface_id             = 1;  // 16-byte UUIDv7 runtime-assigned surface identity
  uint64 expires_at_wall_us     = 2;  // Absolute expiry UTC µs (0 = no expiry); snapshot parity
  string content_classification = 3;  // Empty = unclassified (RFC 0009 A1 viewer-class filter)
}

message ZoneContent {
  oneof payload {
    string              stream_text       = 1;
    NotificationPayload notification      = 2;
    StatusBarPayload    status_bar        = 3;
    Rgba                solid_color       = 4;
    StaticImageRef      static_image_ref  = 5;  // Content-addressed static image (WM-S2b types.proto delta)
    VideoSurfaceRef     video_surface_ref = 6;  // Zone-bound media surface (RFC 0014 §2.7; WM-S2b types.proto delta)
  }
}

message ZonePublishToken {
  bytes token = 1;  // Opaque capability token issued at session auth
}

// Geometry policy variants for zone placement.
enum DisplayEdge {
  DISPLAY_EDGE_UNSPECIFIED = 0;
  DISPLAY_EDGE_TOP         = 1;
  DISPLAY_EDGE_BOTTOM      = 2;
  DISPLAY_EDGE_LEFT        = 3;
  DISPLAY_EDGE_RIGHT       = 4;
}

message RelativeGeometryPolicy {
  float x_pct      = 1;
  float y_pct      = 2;
  float width_pct  = 3;
  float height_pct = 4;
}

message EdgeAnchoredGeometryPolicy {
  DisplayEdge edge       = 1;
  float       height_pct = 2;   // Used for Top/Bottom edges
  float       width_pct  = 3;   // Used for Left/Right edges
  float       margin_px  = 4;
}

message GeometryPolicyProto {
  oneof policy {
    RelativeGeometryPolicy     relative     = 1;
    EdgeAnchoredGeometryPolicy edge_anchored = 2;
  }
}

// Text alignment for zone content.
enum TextAlignProto {
  TEXT_ALIGN_PROTO_UNSPECIFIED = 0;
  TEXT_ALIGN_PROTO_START       = 1;
  TEXT_ALIGN_PROTO_CENTER      = 2;
  TEXT_ALIGN_PROTO_END         = 3;
}

// Font family for zone text rendering.
enum FontFamilyProto {
  FONT_FAMILY_PROTO_UNSPECIFIED      = 0;  // absent = compositor default (SystemSansSerif)
  FONT_FAMILY_PROTO_SYSTEM_SANS      = 1;
  FONT_FAMILY_PROTO_SYSTEM_MONOSPACE = 2;
  FONT_FAMILY_PROTO_SYSTEM_SERIF     = 3;
}

// Text overflow mode for zone text rendering.
enum TextOverflowProto {
  TEXT_OVERFLOW_PROTO_UNSPECIFIED = 0;  // absent = compositor default (Clip)
  TEXT_OVERFLOW_PROTO_CLIP        = 1;
  TEXT_OVERFLOW_PROTO_ELLIPSIS    = 2;
}

// Rendering policy for zone content presentation.
// All fields optional; absent = compositor default.
// Fields 1-4 are the original fields and MUST NOT be renumbered.
message RenderingPolicyProto {
  float             font_size_px       = 1;   // 0.0 = not set
  Rgba              backdrop           = 2;   // Zero alpha = not set
  TextAlignProto    text_align         = 3;   // UNSPECIFIED = compositor default
  float             margin_px          = 4;   // 0.0 = not set
  FontFamilyProto   font_family        = 5;   // UNSPECIFIED = compositor default
  uint32            font_weight        = 6;   // 0 = not set (valid range 100-900)
  Rgba              text_color         = 7;   // Zero alpha = not set
  float             backdrop_opacity   = 8;   // -1.0 = not set sentinel; valid [0.0, 1.0]
  Rgba              outline_color      = 9;   // Zero alpha = not set
  float             outline_width      = 10;  // 0.0 = not set
  float             margin_horizontal  = 11;  // -1.0 = not set sentinel; valid >= 0.0
  float             margin_vertical    = 12;  // -1.0 = not set sentinel; valid >= 0.0
  uint32            transition_in_ms   = 13;  // 0 = not set
  uint32            transition_out_ms  = 14;  // 0 = not set
  TextOverflowProto overflow           = 15;  // UNSPECIFIED = compositor default (Clip)
  float             backdrop_radius    = 16;  // -1.0 = not set sentinel; valid >= 0.0
}

// Contention policy values (used as enum int in ZoneDefinitionProto).
enum ContentionPolicyProto {
  CONTENTION_POLICY_UNSPECIFIED  = 0;
  CONTENTION_POLICY_LATEST_WINS  = 1;
  CONTENTION_POLICY_REPLACE      = 2;
  CONTENTION_POLICY_STACK        = 3;
  CONTENTION_POLICY_MERGE_BY_KEY = 4;
}

message ZoneDefinitionProto {
  string               id                   = 1;
  string               name                 = 2;
  string               description          = 3;
  GeometryPolicyProto  geometry_policy      = 4;
  repeated string      accepted_media_types = 5;   // ZoneMediaType names
  RenderingPolicyProto rendering_policy     = 6;
  ContentionPolicyProto contention_policy   = 7;
  uint32               max_publishers       = 8;
  uint64               auto_clear_ms        = 9;   // 0 = no auto-clear
  // Stack/MergeByKey parameters
  uint32               stack_max_depth      = 10;  // For Stack policy
  uint32               merge_max_keys       = 11;  // For MergeByKey policy
  // When true, publishes to this zone are fire-and-forget (no ZonePublishResult).
  // When false (default), publishes are transactional (RFC 0005 §3.1, §8.6).
  bool                 ephemeral            = 12;
}

message ZonePublishRecordProto {
  string          zone_name             = 1;
  string          publisher_namespace   = 2;
  ZoneContent     content               = 3;
  uint64          published_at_wall_us  = 4;  // UTC wall clock timestamp in microseconds
  string          merge_key             = 5;  // Empty if not MergeByKey

  // Snapshot parity fields (WM-S2b types.proto delta §4). Required so that
  // SceneSnapshot carries complete publication state for reconnect reconciliation
  // without transport internals (RFC 0014 §3.6, WM-S2b snapshot inclusion rules).
  uint64          expires_at_wall_us    = 6;  // Absolute expiry UTC µs (0 = no expiry)
  string          content_classification = 7; // Empty = unclassified (RFC 0009 A1 viewer-class)
  repeated uint64 breakpoints           = 8;  // StreamText reveal breakpoints (byte offsets); empty = reveal all at once
}

message ZoneRegistrySnapshotProto {
  repeated ZoneDefinitionProto    zones           = 1;
  repeated ZonePublishRecordProto active_publishes = 2;
}

// ─── Zone Mutation Messages ───────────────────────────────────────────────────

message PublishToZoneMutation {
  string           zone_name     = 1;
  ZoneContent      content       = 2;
  ZonePublishToken publish_token = 3;
  string           merge_key     = 4;  // For MergeByKey contention; empty otherwise
  bytes            element_id    = 5;  // Optional zone element ID addressing (16 bytes)
}

message ClearZoneMutation {
  string           zone_name     = 1;
  ZonePublishToken publish_token = 2;
}

// ─── Zone Query Messages ──────────────────────────────────────────────────────

message ZoneRegistryRequest {
  string session_id = 1;
}

message ZoneRegistryResponse {
  ZoneRegistrySnapshotProto registry = 1;
  string error = 2;
}

// ─── Element Discovery ───────────────────────────────────────────────────────

message ListElementsRequest {
  optional string namespace_filter = 1;  // Prefix match against stored namespace key
  optional string element_type     = 2;  // "tile" | "zone" | "widget"
}

message ElementInfo {
  bytes              element_id            = 1;  // 16-byte SceneId
  string             element_type          = 2;  // "tile" | "zone" | "widget"
  string             namespace             = 3;
  GeometryPolicyProto current_geometry     = 4;
  bool               has_user_override     = 5;
  uint64             created_at_ms         = 6;
  uint64             last_published_at_ms  = 7;
}

message ListElementsResponse {
  repeated ElementInfo elements = 1;
}

// ─── Widget Types ─────────────────────────────────────────────────────────────

// Parameter types supported by the widget system (v1: f32, string, color, enum).
enum WidgetParamTypeProto {
  WIDGET_PARAM_TYPE_UNSPECIFIED = 0;
  WIDGET_PARAM_TYPE_F32         = 1;
  WIDGET_PARAM_TYPE_STRING      = 2;
  WIDGET_PARAM_TYPE_COLOR       = 3;
  WIDGET_PARAM_TYPE_ENUM        = 4;
}

// Constraints for a widget parameter (bounds for f32, max length for string,
// allowed values for enum; absent fields mean unconstrained).
//
// Note: f32 fields cannot use 0.0 as a sentinel because 0.0 is a valid
// constraint value.  The has_* companion booleans disambiguate Some(0.0) from
// None.  has_f32_min=false means "no minimum constraint" regardless of f32_min.
message WidgetParamConstraintsProto {
  float  f32_min          = 1;  // f32 range minimum; only meaningful when has_f32_min=true
  float  f32_max          = 2;  // f32 range maximum; only meaningful when has_f32_max=true
  uint32 string_max_bytes = 3;  // String max length in UTF-8 bytes (0 = default 1024)
  repeated string enum_allowed_values = 4;  // Allowed enum values
  bool   has_f32_min      = 5;  // true iff f32_min is set (disambiguates Some(0.0) from None)
  bool   has_f32_max      = 6;  // true iff f32_max is set (disambiguates Some(0.0) from None)
}

// A typed parameter value (oneof carries exactly one variant).
message WidgetParameterValueProto {
  string param_name = 1;
  oneof value {
    float  f32_value    = 2;
    string string_value = 3;
    Rgba   color_value  = 4;
    string enum_value   = 5;
  }
}

// A single parameter declaration in a widget's parameter schema.
message WidgetParameterDeclarationProto {
  string                    name          = 1;
  WidgetParamTypeProto      param_type    = 2;
  WidgetParameterValueProto default_value = 3;
  WidgetParamConstraintsProto constraints = 4;
}

// The full parameter schema for a widget type (ordered list of declarations).
message WidgetParameterSchemaProto {
  repeated WidgetParameterDeclarationProto parameters = 1;
}

// How a parameter value is mapped to an SVG attribute.
message WidgetBindingMappingProto {
  oneof mapping {
    WidgetLinearMappingProto   linear   = 1;
    bool                       direct   = 2;  // true = direct (value as-is)
    WidgetDiscreteMappingProto discrete = 3;
  }
}

message WidgetLinearMappingProto {
  float attr_min = 1;
  float attr_max = 2;
}

message WidgetDiscreteMappingProto {
  map<string, string> value_map = 1;  // enum value → SVG attribute value
}

// A single parameter-to-SVG-attribute binding.
message WidgetBindingProto {
  string                    param          = 1;  // Parameter name from schema
  string                    target_element = 2;  // SVG element ID
  string                    target_attribute = 3;  // SVG attribute name (or "text-content")
  WidgetBindingMappingProto mapping        = 4;
}

// An SVG layer in a widget type definition.
message WidgetSvgLayerProto {
  string                   svg_file = 1;  // Filename within the bundle
  repeated WidgetBindingProto bindings = 2;
}

// A full widget type definition.
message WidgetDefinitionProto {
  string                     id                        = 1;  // kebab-case unique id
  string                     name                      = 2;  // human-readable name
  string                     description               = 3;
  WidgetParameterSchemaProto parameter_schema          = 4;
  repeated WidgetSvgLayerProto layers                  = 5;
  GeometryPolicyProto        default_geometry_policy   = 6;
  RenderingPolicyProto       default_rendering_policy  = 7;
  ContentionPolicyProto      default_contention_policy = 8;
  bool                       ephemeral                 = 9;
  // Stack/MergeByKey parameters (mirror of ZoneDefinitionProto fields 10-11).
  // 0 = use runtime default (8 for Stack, 16 for MergeByKey).
  uint32                     stack_max_depth           = 10;  // For Stack policy
  uint32                     merge_max_keys            = 11;  // For MergeByKey policy
}

// A widget instance — a widget type bound to a specific tab.
message WidgetInstanceProto {
  string              widget_type_name   = 1;  // References WidgetDefinitionProto.id
  bytes               tab_id             = 2;  // 16-byte SceneId of the tab
  GeometryPolicyProto geometry_override  = 3;  // Optional override; absent = use type default
  ContentionPolicyProto contention_override = 4; // Optional override; absent = use type default
  string              instance_name      = 5;  // Addressing key (instance_id or widget_type_name)
  repeated WidgetParameterValueProto current_params = 6;
}

// A recorded widget publication.
message WidgetPublishRecordProto {
  string              widget_name          = 1;
  string              publisher_namespace  = 2;
  repeated WidgetParameterValueProto params = 3;
  uint64              published_at_wall_us = 4;
  string              merge_key           = 5;  // Empty if not MergeByKey
  uint64              expires_at_wall_us  = 6;  // 0 = no expiry
  uint32              transition_ms       = 7;
}

// Resolved occupancy state for a widget instance after contention policy.
message WidgetOccupancyProto {
  string              widget_name         = 1;
  bytes               tab_id              = 2;  // 16-byte SceneId
  repeated WidgetPublishRecordProto active_publications = 3;
  uint32              occupant_count      = 4;
  repeated WidgetParameterValueProto effective_params = 5;
}

// Snapshot of the widget registry (all types + instances + active publishes).
message WidgetRegistrySnapshotProto {
  repeated WidgetDefinitionProto     widget_types     = 1;
  repeated WidgetInstanceProto       widget_instances = 2;
  repeated WidgetPublishRecordProto  active_publishes = 3;
}

// ─── Widget Mutation Messages ─────────────────────────────────────────────────

// Note: widget publish mutations are sent via session.proto WidgetPublish
// (ClientMessage field 35).  PublishToWidgetMutation was removed because it
// was an exact duplicate of WidgetPublish; use WidgetPublish instead.

// Clear all publications by the calling agent on the given widget instance.
message ClearWidgetMutation {
  string widget_name = 1;  // Instance addressing key
  string instance_id = 2;  // Optional disambiguation
}

// ─── Widget Query Messages ────────────────────────────────────────────────────

message WidgetRegistryRequest {
  string session_id = 1;
}

message WidgetRegistryResponse {
  WidgetRegistrySnapshotProto registry = 1;
  string error = 2;
}
