syntax = "proto3";

package tze_hud.protocol.v1;

// ─── Identity Types ───────────────────────────────────────────────────────────

// A scene-object identifier: 16-byte little-endian UUIDv7.
// All-zero bytes represent the null/absent sentinel (RFC 0001 §1.1).
// Wire format: raw 16 bytes (little-endian UUID byte order).
message SceneIdProto {
  bytes bytes = 1;  // exactly 16 bytes
}

// A content-addressed resource identifier: raw 32-byte BLAKE3 hash.
// Wire format: raw 32 bytes — never hex-encoded (RFC 0001 §1.1).
message ResourceIdProto {
  bytes bytes = 1;  // exactly 32 bytes
}

// ─── Geometry Primitives ─────────────────────────────────────────────────────

message Rect {
  float x      = 1;
  float y      = 2;
  float width  = 3;
  float height = 4;
}

message Rgba {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// ─── Node Types ───────────────────────────────────────────────────────────────

message NodeProto {
  bytes id = 1;  // 16-byte UUIDv7 SceneId (little-endian); empty (0 bytes) = unset, server assigns; 16 zero bytes = explicit null sentinel
  oneof data {
    SolidColorNodeProto solid_color = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto hit_region = 12;
    StaticImageNodeProto static_image = 13;
  }
}

message SolidColorNodeProto {
  Rgba color = 1;
  Rect bounds = 2;
}

message TextMarkdownNodeProto {
  string content = 1;
  Rect bounds = 2;
  float font_size_px = 3;
  Rgba color = 4;
  Rgba background = 5;
}

message HitRegionNodeProto {
  Rect bounds = 1;
  string interaction_id = 2;
  bool accepts_focus = 3;
  bool accepts_pointer = 4;
}

// How image content is fitted within the node bounds.
enum ImageFitModeProto {
  IMAGE_FIT_MODE_UNSPECIFIED = 0;
  IMAGE_FIT_MODE_CONTAIN     = 1;  // Scale uniformly so entire image is visible (may letterbox)
  IMAGE_FIT_MODE_COVER       = 2;  // Scale uniformly to cover full bounds (may crop)
  IMAGE_FIT_MODE_FILL        = 3;  // Stretch non-uniformly to fill bounds exactly
  IMAGE_FIT_MODE_SCALE_DOWN  = 4;  // Like Contain but never scale up
}

// A static image node referencing a resource by content-addressed identity.
//
// Per RS-4 (rig-6l03) ephemerality contract: scene messages carry only the
// ResourceId reference (32 raw bytes).  Raw pixel data is NOT embedded.
// Agents upload resources via ResourceUploadStart before creating image nodes.
message StaticImageNodeProto {
  // BLAKE3 hash of the raw resource bytes (32 bytes).
  // Wire format: raw bytes (NOT hex-encoded).
  bytes  resource_id   = 1;
  uint32 width         = 2;
  uint32 height        = 3;
  // Decoded in-memory size in bytes (for budget accounting).
  // Set by the runtime when confirming the mutation; clients may send 0.
  uint64 decoded_bytes = 4;
  ImageFitModeProto fit_mode = 5;
  Rect   bounds        = 6;
}

// ─── Mutation Types ───────────────────────────────────────────────────────────

message CreateTileMutation {
  bytes tab_id = 1;  // 16-byte UUIDv7 SceneId of the target tab; empty = server-infers active tab
  Rect bounds = 2;
  uint32 z_order = 3;
}

message SetTileRootMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the tile
  NodeProto node = 2;
}

message MutationProto {
  oneof mutation {
    CreateTileMutation    create_tile      = 1;
    SetTileRootMutation   set_tile_root    = 2;
    PublishToZoneMutation publish_to_zone  = 3;
    ClearZoneMutation     clear_zone       = 4;
  }
}

// ─── Zone Types ───────────────────────────────────────────────────────────────

message NotificationPayload {
  string text    = 1;
  string icon    = 2;   // Resource name or empty
  uint32 urgency = 3;   // 0=low, 1=normal, 2=urgent, 3=critical
}

message StatusBarPayload {
  map<string, string> entries = 1;  // key → display string
}

message ZoneContent {
  oneof payload {
    string              stream_text  = 1;
    NotificationPayload notification = 2;
    StatusBarPayload    status_bar   = 3;
    Rgba                solid_color  = 4;
  }
}

message ZonePublishToken {
  bytes token = 1;  // Opaque capability token issued at session auth
}

// Geometry policy variants for zone placement.
enum DisplayEdge {
  DISPLAY_EDGE_UNSPECIFIED = 0;
  DISPLAY_EDGE_TOP         = 1;
  DISPLAY_EDGE_BOTTOM      = 2;
  DISPLAY_EDGE_LEFT        = 3;
  DISPLAY_EDGE_RIGHT       = 4;
}

message RelativeGeometryPolicy {
  float x_pct      = 1;
  float y_pct      = 2;
  float width_pct  = 3;
  float height_pct = 4;
}

message EdgeAnchoredGeometryPolicy {
  DisplayEdge edge       = 1;
  float       height_pct = 2;   // Used for Top/Bottom edges
  float       width_pct  = 3;   // Used for Left/Right edges
  float       margin_px  = 4;
}

message GeometryPolicyProto {
  oneof policy {
    RelativeGeometryPolicy     relative     = 1;
    EdgeAnchoredGeometryPolicy edge_anchored = 2;
  }
}

// Text alignment for zone content.
enum TextAlignProto {
  TEXT_ALIGN_PROTO_UNSPECIFIED = 0;
  TEXT_ALIGN_PROTO_START       = 1;
  TEXT_ALIGN_PROTO_CENTER      = 2;
  TEXT_ALIGN_PROTO_END         = 3;
}

// Rendering policy for zone content presentation.
// All fields optional; absent = compositor default.
message RenderingPolicyProto {
  float         font_size_px = 1;   // 0.0 = not set
  Rgba          backdrop     = 2;   // Zero alpha = not set
  TextAlignProto text_align  = 3;   // UNSPECIFIED = compositor default
  float         margin_px    = 4;   // 0.0 = not set
}

// Contention policy values (used as enum int in ZoneDefinitionProto).
enum ContentionPolicyProto {
  CONTENTION_POLICY_UNSPECIFIED  = 0;
  CONTENTION_POLICY_LATEST_WINS  = 1;
  CONTENTION_POLICY_REPLACE      = 2;
  CONTENTION_POLICY_STACK        = 3;
  CONTENTION_POLICY_MERGE_BY_KEY = 4;
}

message ZoneDefinitionProto {
  string               id                   = 1;
  string               name                 = 2;
  string               description          = 3;
  GeometryPolicyProto  geometry_policy      = 4;
  repeated string      accepted_media_types = 5;   // ZoneMediaType names
  RenderingPolicyProto rendering_policy     = 6;
  ContentionPolicyProto contention_policy   = 7;
  uint32               max_publishers       = 8;
  uint64               auto_clear_ms        = 9;   // 0 = no auto-clear
  // Stack/MergeByKey parameters
  uint32               stack_max_depth      = 10;  // For Stack policy
  uint32               merge_max_keys       = 11;  // For MergeByKey policy
  // When true, publishes to this zone are fire-and-forget (no ZonePublishResult).
  // When false (default), publishes are transactional (RFC 0005 §3.1, §8.6).
  bool                 ephemeral            = 12;
}

message ZonePublishRecordProto {
  string      zone_name           = 1;
  string      publisher_namespace = 2;
  ZoneContent content             = 3;
  uint64      published_at_ms     = 4;
  string      merge_key           = 5;  // Empty if not MergeByKey
}

message ZoneRegistrySnapshotProto {
  repeated ZoneDefinitionProto    zones           = 1;
  repeated ZonePublishRecordProto active_publishes = 2;
}

// ─── Zone Mutation Messages ───────────────────────────────────────────────────

message PublishToZoneMutation {
  string           zone_name     = 1;
  ZoneContent      content       = 2;
  ZonePublishToken publish_token = 3;
  string           merge_key     = 4;  // For MergeByKey contention; empty otherwise
}

message ClearZoneMutation {
  string           zone_name     = 1;
  ZonePublishToken publish_token = 2;
}

// ─── Zone Query Messages ──────────────────────────────────────────────────────

message ZoneRegistryRequest {
  string session_id = 1;
}

message ZoneRegistryResponse {
  ZoneRegistrySnapshotProto registry = 1;
  string error = 2;
}
