syntax = "proto3";

package tze_hud.protocol.v1;

// ─── Identity Types ───────────────────────────────────────────────────────────

// A scene-object identifier: 16-byte little-endian UUIDv7.
// All-zero bytes represent the null/absent sentinel (RFC 0001 §1.1).
// Wire format: raw 16 bytes (little-endian UUID byte order).
message SceneIdProto {
  bytes bytes = 1;  // exactly 16 bytes
}

// A content-addressed resource identifier: raw 32-byte BLAKE3 hash.
// Wire format: raw 32 bytes — never hex-encoded (RFC 0001 §1.1).
message ResourceIdProto {
  bytes bytes = 1;  // exactly 32 bytes
}

// ─── Geometry Primitives ─────────────────────────────────────────────────────

message Rect {
  float x      = 1;
  float y      = 2;
  float width  = 3;
  float height = 4;
}

message Rgba {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// ─── Node Types ───────────────────────────────────────────────────────────────

message NodeProto {
  bytes id = 1;  // 16-byte UUIDv7 SceneId (little-endian); empty (0 bytes) = unset, server assigns; 16 zero bytes = explicit null sentinel
  oneof data {
    SolidColorNodeProto solid_color = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto hit_region = 12;
    StaticImageNodeProto static_image = 13;
  }
}

message SolidColorNodeProto {
  Rgba color = 1;
  Rect bounds = 2;
}

message TextMarkdownNodeProto {
  string content = 1;
  Rect bounds = 2;
  float font_size_px = 3;
  Rgba color = 4;
  Rgba background = 5;
}

message HitRegionNodeProto {
  Rect bounds = 1;
  string interaction_id = 2;
  bool accepts_focus = 3;
  bool accepts_pointer = 4;
}

// How image content is fitted within the node bounds.
enum ImageFitModeProto {
  IMAGE_FIT_MODE_UNSPECIFIED = 0;
  IMAGE_FIT_MODE_CONTAIN     = 1;  // Scale uniformly so entire image is visible (may letterbox)
  IMAGE_FIT_MODE_COVER       = 2;  // Scale uniformly to cover full bounds (may crop)
  IMAGE_FIT_MODE_FILL        = 3;  // Stretch non-uniformly to fill bounds exactly
  IMAGE_FIT_MODE_SCALE_DOWN  = 4;  // Like Contain but never scale up
}

// A static image node referencing a resource by content-addressed identity.
//
// Per RS-4 (rig-6l03) ephemerality contract: scene messages carry only the
// ResourceId reference (32 raw bytes).  Raw pixel data is NOT embedded.
// Agents upload resources via ResourceUploadStart before creating image nodes.
message StaticImageNodeProto {
  // BLAKE3 hash of the raw resource bytes (32 bytes).
  // Wire format: raw bytes (NOT hex-encoded).
  bytes  resource_id   = 1;
  uint32 width         = 2;
  uint32 height        = 3;
  // Decoded in-memory size in bytes (for budget accounting).
  // Set by the runtime when confirming the mutation; clients may send 0.
  uint64 decoded_bytes = 4;
  ImageFitModeProto fit_mode = 5;
  Rect   bounds        = 6;
}

// ─── Mutation Types ───────────────────────────────────────────────────────────

message CreateTileMutation {
  bytes tab_id = 1;  // 16-byte UUIDv7 SceneId of the target tab; empty = server-infers active tab
  Rect bounds = 2;
  uint32 z_order = 3;
}

message SetTileRootMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the tile
  NodeProto node = 2;
}

// Atomically replace the data of an existing node.
// The node must already exist, belong to tile_id, and the data variant must
// match the existing node's variant.  Children and node id are preserved.
message UpdateNodeContentMutation {
  bytes tile_id = 1;  // 16-byte UUIDv7 SceneId of the owning tile
  bytes node_id = 2;  // 16-byte UUIDv7 SceneId of the node to update
  // Replacement data — exactly one variant must be set; it must match the
  // existing node's variant (type-change is rejected).
  oneof data {
    SolidColorNodeProto  solid_color   = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto   hit_region    = 12;
    StaticImageNodeProto static_image  = 13;
  }
}

message MutationProto {
  oneof mutation {
    CreateTileMutation        create_tile        = 1;
    SetTileRootMutation       set_tile_root      = 2;
    PublishToZoneMutation     publish_to_zone    = 3;
    ClearZoneMutation         clear_zone         = 4;
    ClearWidgetMutation       clear_widget       = 5;
    UpdateNodeContentMutation update_node_content = 6;
  }
}

// ─── Zone Types ───────────────────────────────────────────────────────────────

message NotificationPayload {
  string text    = 1;
  string icon    = 2;   // Resource name or empty
  uint32 urgency = 3;   // 0=low, 1=normal, 2=urgent, 3=critical
}

message StatusBarPayload {
  map<string, string> entries = 1;  // key → display string
}

message ZoneContent {
  oneof payload {
    string              stream_text  = 1;
    NotificationPayload notification = 2;
    StatusBarPayload    status_bar   = 3;
    Rgba                solid_color  = 4;
  }
}

message ZonePublishToken {
  bytes token = 1;  // Opaque capability token issued at session auth
}

// Geometry policy variants for zone placement.
enum DisplayEdge {
  DISPLAY_EDGE_UNSPECIFIED = 0;
  DISPLAY_EDGE_TOP         = 1;
  DISPLAY_EDGE_BOTTOM      = 2;
  DISPLAY_EDGE_LEFT        = 3;
  DISPLAY_EDGE_RIGHT       = 4;
}

message RelativeGeometryPolicy {
  float x_pct      = 1;
  float y_pct      = 2;
  float width_pct  = 3;
  float height_pct = 4;
}

message EdgeAnchoredGeometryPolicy {
  DisplayEdge edge       = 1;
  float       height_pct = 2;   // Used for Top/Bottom edges
  float       width_pct  = 3;   // Used for Left/Right edges
  float       margin_px  = 4;
}

message GeometryPolicyProto {
  oneof policy {
    RelativeGeometryPolicy     relative     = 1;
    EdgeAnchoredGeometryPolicy edge_anchored = 2;
  }
}

// Text alignment for zone content.
enum TextAlignProto {
  TEXT_ALIGN_PROTO_UNSPECIFIED = 0;
  TEXT_ALIGN_PROTO_START       = 1;
  TEXT_ALIGN_PROTO_CENTER      = 2;
  TEXT_ALIGN_PROTO_END         = 3;
}

// Font family for zone text rendering.
enum FontFamilyProto {
  FONT_FAMILY_PROTO_UNSPECIFIED      = 0;  // absent = compositor default (SystemSansSerif)
  FONT_FAMILY_PROTO_SYSTEM_SANS      = 1;
  FONT_FAMILY_PROTO_SYSTEM_MONOSPACE = 2;
  FONT_FAMILY_PROTO_SYSTEM_SERIF     = 3;
}

// Rendering policy for zone content presentation.
// All fields optional; absent = compositor default.
// Fields 1-4 are the original fields and MUST NOT be renumbered.
message RenderingPolicyProto {
  float          font_size_px       = 1;   // 0.0 = not set
  Rgba           backdrop           = 2;   // Zero alpha = not set
  TextAlignProto text_align         = 3;   // UNSPECIFIED = compositor default
  float          margin_px          = 4;   // 0.0 = not set
  FontFamilyProto font_family       = 5;   // UNSPECIFIED = compositor default
  uint32         font_weight        = 6;   // 0 = not set (valid range 100-900)
  Rgba           text_color         = 7;   // Zero alpha = not set
  float          backdrop_opacity   = 8;   // -1.0 = not set sentinel; valid [0.0, 1.0]
  Rgba           outline_color      = 9;   // Zero alpha = not set
  float          outline_width      = 10;  // 0.0 = not set
  float          margin_horizontal  = 11;  // -1.0 = not set sentinel; valid >= 0.0
  float          margin_vertical    = 12;  // -1.0 = not set sentinel; valid >= 0.0
  uint32         transition_in_ms   = 13;  // 0 = not set
  uint32         transition_out_ms  = 14;  // 0 = not set
}

// Contention policy values (used as enum int in ZoneDefinitionProto).
enum ContentionPolicyProto {
  CONTENTION_POLICY_UNSPECIFIED  = 0;
  CONTENTION_POLICY_LATEST_WINS  = 1;
  CONTENTION_POLICY_REPLACE      = 2;
  CONTENTION_POLICY_STACK        = 3;
  CONTENTION_POLICY_MERGE_BY_KEY = 4;
}

message ZoneDefinitionProto {
  string               id                   = 1;
  string               name                 = 2;
  string               description          = 3;
  GeometryPolicyProto  geometry_policy      = 4;
  repeated string      accepted_media_types = 5;   // ZoneMediaType names
  RenderingPolicyProto rendering_policy     = 6;
  ContentionPolicyProto contention_policy   = 7;
  uint32               max_publishers       = 8;
  uint64               auto_clear_ms        = 9;   // 0 = no auto-clear
  // Stack/MergeByKey parameters
  uint32               stack_max_depth      = 10;  // For Stack policy
  uint32               merge_max_keys       = 11;  // For MergeByKey policy
  // When true, publishes to this zone are fire-and-forget (no ZonePublishResult).
  // When false (default), publishes are transactional (RFC 0005 §3.1, §8.6).
  bool                 ephemeral            = 12;
}

message ZonePublishRecordProto {
  string      zone_name           = 1;
  string      publisher_namespace = 2;
  ZoneContent content             = 3;
  uint64      published_at_wall_us = 4;  // UTC wall clock timestamp in microseconds
  string      merge_key           = 5;  // Empty if not MergeByKey
}

message ZoneRegistrySnapshotProto {
  repeated ZoneDefinitionProto    zones           = 1;
  repeated ZonePublishRecordProto active_publishes = 2;
}

// ─── Zone Mutation Messages ───────────────────────────────────────────────────

message PublishToZoneMutation {
  string           zone_name     = 1;
  ZoneContent      content       = 2;
  ZonePublishToken publish_token = 3;
  string           merge_key     = 4;  // For MergeByKey contention; empty otherwise
}

message ClearZoneMutation {
  string           zone_name     = 1;
  ZonePublishToken publish_token = 2;
}

// ─── Zone Query Messages ──────────────────────────────────────────────────────

message ZoneRegistryRequest {
  string session_id = 1;
}

message ZoneRegistryResponse {
  ZoneRegistrySnapshotProto registry = 1;
  string error = 2;
}

// ─── Widget Types ─────────────────────────────────────────────────────────────

// Parameter types supported by the widget system (v1: f32, string, color, enum).
enum WidgetParamTypeProto {
  WIDGET_PARAM_TYPE_UNSPECIFIED = 0;
  WIDGET_PARAM_TYPE_F32         = 1;
  WIDGET_PARAM_TYPE_STRING      = 2;
  WIDGET_PARAM_TYPE_COLOR       = 3;
  WIDGET_PARAM_TYPE_ENUM        = 4;
}

// Constraints for a widget parameter (bounds for f32, max length for string,
// allowed values for enum; absent fields mean unconstrained).
//
// Note: f32 fields cannot use 0.0 as a sentinel because 0.0 is a valid
// constraint value.  The has_* companion booleans disambiguate Some(0.0) from
// None.  has_f32_min=false means "no minimum constraint" regardless of f32_min.
message WidgetParamConstraintsProto {
  float  f32_min          = 1;  // f32 range minimum; only meaningful when has_f32_min=true
  float  f32_max          = 2;  // f32 range maximum; only meaningful when has_f32_max=true
  uint32 string_max_bytes = 3;  // String max length in UTF-8 bytes (0 = default 1024)
  repeated string enum_allowed_values = 4;  // Allowed enum values
  bool   has_f32_min      = 5;  // true iff f32_min is set (disambiguates Some(0.0) from None)
  bool   has_f32_max      = 6;  // true iff f32_max is set (disambiguates Some(0.0) from None)
}

// A typed parameter value (oneof carries exactly one variant).
message WidgetParameterValueProto {
  string param_name = 1;
  oneof value {
    float  f32_value    = 2;
    string string_value = 3;
    Rgba   color_value  = 4;
    string enum_value   = 5;
  }
}

// A single parameter declaration in a widget's parameter schema.
message WidgetParameterDeclarationProto {
  string                    name          = 1;
  WidgetParamTypeProto      param_type    = 2;
  WidgetParameterValueProto default_value = 3;
  WidgetParamConstraintsProto constraints = 4;
}

// The full parameter schema for a widget type (ordered list of declarations).
message WidgetParameterSchemaProto {
  repeated WidgetParameterDeclarationProto parameters = 1;
}

// How a parameter value is mapped to an SVG attribute.
message WidgetBindingMappingProto {
  oneof mapping {
    WidgetLinearMappingProto   linear   = 1;
    bool                       direct   = 2;  // true = direct (value as-is)
    WidgetDiscreteMappingProto discrete = 3;
  }
}

message WidgetLinearMappingProto {
  float attr_min = 1;
  float attr_max = 2;
}

message WidgetDiscreteMappingProto {
  map<string, string> value_map = 1;  // enum value → SVG attribute value
}

// A single parameter-to-SVG-attribute binding.
message WidgetBindingProto {
  string                    param          = 1;  // Parameter name from schema
  string                    target_element = 2;  // SVG element ID
  string                    target_attribute = 3;  // SVG attribute name (or "text-content")
  WidgetBindingMappingProto mapping        = 4;
}

// An SVG layer in a widget type definition.
message WidgetSvgLayerProto {
  string                   svg_file = 1;  // Filename within the bundle
  repeated WidgetBindingProto bindings = 2;
}

// A full widget type definition.
message WidgetDefinitionProto {
  string                     id                        = 1;  // kebab-case unique id
  string                     name                      = 2;  // human-readable name
  string                     description               = 3;
  WidgetParameterSchemaProto parameter_schema          = 4;
  repeated WidgetSvgLayerProto layers                  = 5;
  GeometryPolicyProto        default_geometry_policy   = 6;
  RenderingPolicyProto       default_rendering_policy  = 7;
  ContentionPolicyProto      default_contention_policy = 8;
  bool                       ephemeral                 = 9;
  // Stack/MergeByKey parameters (mirror of ZoneDefinitionProto fields 10-11).
  // 0 = use runtime default (8 for Stack, 16 for MergeByKey).
  uint32                     stack_max_depth           = 10;  // For Stack policy
  uint32                     merge_max_keys            = 11;  // For MergeByKey policy
}

// A widget instance — a widget type bound to a specific tab.
message WidgetInstanceProto {
  string              widget_type_name   = 1;  // References WidgetDefinitionProto.id
  bytes               tab_id             = 2;  // 16-byte SceneId of the tab
  GeometryPolicyProto geometry_override  = 3;  // Optional override; absent = use type default
  ContentionPolicyProto contention_override = 4; // Optional override; absent = use type default
  string              instance_name      = 5;  // Addressing key (instance_id or widget_type_name)
  repeated WidgetParameterValueProto current_params = 6;
}

// A recorded widget publication.
message WidgetPublishRecordProto {
  string              widget_name          = 1;
  string              publisher_namespace  = 2;
  repeated WidgetParameterValueProto params = 3;
  uint64              published_at_wall_us = 4;
  string              merge_key           = 5;  // Empty if not MergeByKey
  uint64              expires_at_wall_us  = 6;  // 0 = no expiry
  uint32              transition_ms       = 7;
}

// Resolved occupancy state for a widget instance after contention policy.
message WidgetOccupancyProto {
  string              widget_name         = 1;
  bytes               tab_id              = 2;  // 16-byte SceneId
  repeated WidgetPublishRecordProto active_publications = 3;
  uint32              occupant_count      = 4;
  repeated WidgetParameterValueProto effective_params = 5;
}

// Snapshot of the widget registry (all types + instances + active publishes).
message WidgetRegistrySnapshotProto {
  repeated WidgetDefinitionProto     widget_types     = 1;
  repeated WidgetInstanceProto       widget_instances = 2;
  repeated WidgetPublishRecordProto  active_publishes = 3;
}

// ─── Widget Mutation Messages ─────────────────────────────────────────────────

// Note: widget publish mutations are sent via session.proto WidgetPublish
// (ClientMessage field 35).  PublishToWidgetMutation was removed because it
// was an exact duplicate of WidgetPublish; use WidgetPublish instead.

// Clear all publications by the calling agent on the given widget instance.
message ClearWidgetMutation {
  string widget_name = 1;  // Instance addressing key
  string instance_id = 2;  // Optional disambiguation
}

// ─── Widget Query Messages ────────────────────────────────────────────────────

message WidgetRegistryRequest {
  string session_id = 1;
}

message WidgetRegistryResponse {
  WidgetRegistrySnapshotProto registry = 1;
  string error = 2;
}
