syntax = "proto3";

package tze_hud.protocol.v1;

// TRANSITIONAL: This unary-RPC service is superseded by the bidirectional
// streaming HudSession service defined in session.proto (RFC 0005).
// It is retained for backward compatibility during the cutover period.
// New code should use the session.proto HudSession service.

// ─── Core Types ─────────────────────────────────────────────────────────────

message Rect {
  float x      = 1;
  float y      = 2;
  float width  = 3;
  float height = 4;
}

message Rgba {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// ─── Authentication ─────────────────────────────────────────────────────────

message ConnectRequest {
  string agent_name = 1;
  string pre_shared_key = 2;
  repeated string requested_capabilities = 3;
}

message ConnectResponse {
  string session_id = 1;
  string namespace = 2;
  repeated string granted_capabilities = 3;
  string error = 4;
}

// ─── Lease Management ───────────────────────────────────────────────────────

message LeaseRequest {
  string session_id = 1;
  uint64 ttl_ms = 2;
  repeated string capabilities = 3;
}

message LeaseResponse {
  string lease_id = 1;
  uint64 granted_ttl_ms = 2;
  string error = 3;
}

message LeaseRenewRequest {
  string session_id = 1;
  string lease_id = 2;
  uint64 new_ttl_ms = 3;
}

message LeaseRenewResponse {
  bool success = 1;
  string error = 2;
}

message LeaseRevokeRequest {
  string session_id = 1;
  string lease_id = 2;
}

message LeaseRevokeResponse {
  bool success = 1;
  string error = 2;
}

// ─── Scene Mutations ────────────────────────────────────────────────────────

message CreateTileMutation {
  string tab_id = 1;
  Rect bounds = 2;
  uint32 z_order = 3;
}

message SetTileRootMutation {
  string tile_id = 1;
  NodeProto node = 2;
}

message NodeProto {
  string id = 1;
  oneof data {
    SolidColorNodeProto solid_color = 10;
    TextMarkdownNodeProto text_markdown = 11;
    HitRegionNodeProto hit_region = 12;
    StaticImageNodeProto static_image = 13;
  }
}

message SolidColorNodeProto {
  Rgba color = 1;
  Rect bounds = 2;
}

message TextMarkdownNodeProto {
  string content = 1;
  Rect bounds = 2;
  float font_size_px = 3;
  Rgba color = 4;
  Rgba background = 5;
}

message HitRegionNodeProto {
  Rect bounds = 1;
  string interaction_id = 2;
  bool accepts_focus = 3;
  bool accepts_pointer = 4;
}

// How image content is fitted within the node bounds.
enum ImageFitModeProto {
  IMAGE_FIT_MODE_UNSPECIFIED = 0;
  IMAGE_FIT_MODE_CONTAIN     = 1;  // Scale uniformly so entire image is visible (may letterbox)
  IMAGE_FIT_MODE_COVER       = 2;  // Scale uniformly to cover full bounds (may crop)
  IMAGE_FIT_MODE_FILL        = 3;  // Stretch non-uniformly to fill bounds exactly
  IMAGE_FIT_MODE_SCALE_DOWN  = 4;  // Like Contain but never scale up
}

// A static image node carrying raw RGBA8 pixel data.
message StaticImageNodeProto {
  // Raw RGBA8 pixel data (width * height * 4 bytes).
  bytes  image_data    = 1;
  uint32 width         = 2;
  uint32 height        = 3;
  // SHA-256 hex string for content-addressed deduplication.
  string content_hash  = 4;
  ImageFitModeProto fit_mode = 5;
  Rect   bounds        = 6;
}

message MutationBatchRequest {
  string session_id = 1;
  string lease_id = 2;
  repeated MutationProto mutations = 3;
}

// ─── Zone types ─────────────────────────────────────────────────────────────

message NotificationPayload {
  string text    = 1;
  string icon    = 2;   // Resource name or empty
  uint32 urgency = 3;   // 0=low, 1=normal, 2=urgent, 3=critical
}

message StatusBarPayload {
  map<string, string> entries = 1;  // key → display string
}

message ZoneContent {
  oneof payload {
    string              stream_text  = 1;
    NotificationPayload notification = 2;
    StatusBarPayload    status_bar   = 3;
    Rgba                solid_color  = 4;
  }
}

message ZonePublishToken {
  bytes token = 1;  // Opaque capability token issued at session auth
}

// Geometry policy variants for zone placement.
enum DisplayEdge {
  DISPLAY_EDGE_UNSPECIFIED = 0;
  DISPLAY_EDGE_TOP         = 1;
  DISPLAY_EDGE_BOTTOM      = 2;
  DISPLAY_EDGE_LEFT        = 3;
  DISPLAY_EDGE_RIGHT       = 4;
}

message RelativeGeometryPolicy {
  float x_pct      = 1;
  float y_pct      = 2;
  float width_pct  = 3;
  float height_pct = 4;
}

message EdgeAnchoredGeometryPolicy {
  DisplayEdge edge       = 1;
  float       height_pct = 2;   // Used for Top/Bottom edges
  float       width_pct  = 3;   // Used for Left/Right edges
  float       margin_px  = 4;
}

message GeometryPolicyProto {
  oneof policy {
    RelativeGeometryPolicy     relative     = 1;
    EdgeAnchoredGeometryPolicy edge_anchored = 2;
  }
}

// Text alignment for zone content.
enum TextAlignProto {
  TEXT_ALIGN_PROTO_UNSPECIFIED = 0;
  TEXT_ALIGN_PROTO_START       = 1;
  TEXT_ALIGN_PROTO_CENTER      = 2;
  TEXT_ALIGN_PROTO_END         = 3;
}

// Rendering policy for zone content presentation.
// All fields optional; absent = compositor default.
message RenderingPolicyProto {
  float         font_size_px = 1;   // 0.0 = not set
  Rgba          backdrop     = 2;   // Zero alpha = not set
  TextAlignProto text_align  = 3;   // UNSPECIFIED = compositor default
  float         margin_px    = 4;   // 0.0 = not set
}

// Contention policy values (used as enum int in ZoneDefinitionProto).
enum ContentionPolicyProto {
  CONTENTION_POLICY_UNSPECIFIED  = 0;
  CONTENTION_POLICY_LATEST_WINS  = 1;
  CONTENTION_POLICY_REPLACE      = 2;
  CONTENTION_POLICY_STACK        = 3;
  CONTENTION_POLICY_MERGE_BY_KEY = 4;
}

message ZoneDefinitionProto {
  string               id                   = 1;
  string               name                 = 2;
  string               description          = 3;
  GeometryPolicyProto  geometry_policy      = 4;
  repeated string      accepted_media_types = 5;   // ZoneMediaType names
  RenderingPolicyProto rendering_policy     = 6;
  ContentionPolicyProto contention_policy   = 7;
  uint32               max_publishers       = 8;
  uint64               auto_clear_ms        = 9;   // 0 = no auto-clear
  // Stack/MergeByKey parameters
  uint32               stack_max_depth      = 10;  // For Stack policy
  uint32               merge_max_keys       = 11;  // For MergeByKey policy
}

message ZonePublishRecordProto {
  string      zone_name           = 1;
  string      publisher_namespace = 2;
  ZoneContent content             = 3;
  uint64      published_at_ms     = 4;
  string      merge_key           = 5;  // Empty if not MergeByKey
}

message ZoneRegistrySnapshotProto {
  repeated ZoneDefinitionProto    zones           = 1;
  repeated ZonePublishRecordProto active_publishes = 2;
}

// ─── Zone mutation messages ──────────────────────────────────────────────────

message PublishToZoneMutation {
  string           zone_name     = 1;
  ZoneContent      content       = 2;
  ZonePublishToken publish_token = 3;
  string           merge_key     = 4;  // For MergeByKey contention; empty otherwise
}

message ClearZoneMutation {
  string           zone_name     = 1;
  ZonePublishToken publish_token = 2;
}

// ─── Zone query messages ─────────────────────────────────────────────────────

message ZoneRegistryRequest {
  string session_id = 1;
}

message ZoneRegistryResponse {
  ZoneRegistrySnapshotProto registry = 1;
  string error = 2;
}

message MutationProto {
  oneof mutation {
    CreateTileMutation    create_tile      = 1;
    SetTileRootMutation   set_tile_root    = 2;
    PublishToZoneMutation publish_to_zone  = 3;
    ClearZoneMutation     clear_zone       = 4;
  }
}

message MutationBatchResponse {
  bool success = 1;
  repeated string created_ids = 2;
  string error = 3;
}

// ─── Events ─────────────────────────────────────────────────────────────────

message EventSubscribeRequest {
  string session_id = 1;
}

// Typed scene lifecycle events (runtime → agent).
message TileCreatedEvent {
  string tile_id    = 1;
  string namespace  = 2;  // owning agent namespace
  uint64 timestamp_ms = 3;
}

message TileDeletedEvent {
  string tile_id    = 1;
  uint64 timestamp_ms = 2;
}

message TileUpdatedEvent {
  string tile_id    = 1;
  uint64 timestamp_ms = 2;
}

// Pointer input event dispatched to the agent that owns the hit tile.
message InputEvent {
  string tile_id       = 1;
  string node_id       = 2;
  string interaction_id = 3;
  float  local_x       = 4;  // coordinates relative to tile origin
  float  local_y       = 5;
  float  display_x     = 6;  // raw display-space coordinates
  float  display_y     = 7;
  InputEventKind kind  = 8;
  uint64 timestamp_ms  = 9;
}

enum InputEventKind {
  INPUT_EVENT_KIND_UNSPECIFIED = 0;
  POINTER_MOVE   = 1;
  POINTER_DOWN   = 2;
  POINTER_UP     = 3;
  POINTER_ENTER  = 4;
  POINTER_LEAVE  = 5;
  ACTIVATED      = 6;  // press + release on the same hit region
}

// Lease lifecycle events dispatched to the owning agent.
message LeaseEvent {
  string lease_id     = 1;
  string namespace    = 2;
  LeaseEventKind kind = 3;
  uint64 timestamp_ms = 4;
}

enum LeaseEventKind {
  LEASE_EVENT_KIND_UNSPECIFIED = 0;
  LEASE_GRANTED  = 1;
  LEASE_RENEWED  = 2;
  LEASE_REVOKED  = 3;
  LEASE_EXPIRED  = 4;
}

// Envelope sent on the server-streaming SubscribeEvents RPC.
// Each message carries exactly one event via the oneof.
message SceneEvent {
  uint64 timestamp_ms = 1;
  oneof event {
    TileCreatedEvent tile_created = 10;
    TileDeletedEvent tile_deleted = 11;
    TileUpdatedEvent tile_updated = 12;
    InputEvent       input        = 20;
    LeaseEvent       lease        = 30;
  }
}

// ─── Scene Query ────────────────────────────────────────────────────────────

message SceneQueryRequest {
  string session_id = 1;
}

message SceneQueryResponse {
  string scene_json = 1;
  uint64 version = 2;
}

// ─── Service ────────────────────────────────────────────────────────────────

service SceneService {
  // Authentication
  rpc Authenticate(ConnectRequest) returns (ConnectResponse);

  // Lease management
  rpc AcquireLease(LeaseRequest) returns (LeaseResponse);
  rpc RenewLease(LeaseRenewRequest) returns (LeaseRenewResponse);
  rpc RevokeLease(LeaseRevokeRequest) returns (LeaseRevokeResponse);

  // Scene mutations
  rpc ApplyMutations(MutationBatchRequest) returns (MutationBatchResponse);

  // Scene query
  rpc QueryScene(SceneQueryRequest) returns (SceneQueryResponse);

  // Zone registry query
  rpc QueryZoneRegistry(ZoneRegistryRequest) returns (ZoneRegistryResponse);

  // Event subscription (server-streaming, per-session filtered events)
  rpc SubscribeEvents(EventSubscribeRequest) returns (stream SceneEvent);
}
