<?xml version="1.0" encoding="UTF-8"?>
<!-- Fill layer for the reference gauge widget fixture.
     Contains the fill bar (bound to "level" via linear mapping),
     the label text element (bound to "label" via text-content synthetic target),
     and the severity indicator circle (bound to "severity" via discrete mapping).

     Element IDs referenced in widget.toml bindings:
       - "bar"         — fill rect, height and fill driven by parameters
       - "label-text"  — SVG text element, text content driven by "label"
       - "indicator"   — circle, fill color driven by "severity" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 220" width="100" height="220">
  <!-- Fill bar: height driven by "level" (linear 0→200), fill driven by "fill_color" -->
  <rect id="bar" x="30" y="10" width="40" height="0"
        fill="#00b4ff" rx="3" ry="3"/>
  <!-- Label text: text content driven by "label" -->
  <text id="label-text" x="50" y="215" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#cccccc"></text>
  <!-- Severity indicator: fill color driven by "severity" discrete mapping -->
  <circle id="indicator" cx="85" cy="15" r="6" fill="#00cc66"/>
</svg>
