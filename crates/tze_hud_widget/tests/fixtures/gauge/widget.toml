# Reference gauge widget bundle — used as a test fixture.
#
# This implements a simple vertical fill gauge with a background layer and a
# fill layer.  The fill height is controlled by the "level" parameter (0.0-1.0).
# The fill color is controlled by the "fill_color" parameter.
# A text label is controlled by the "label" parameter.
# An optional severity indicator uses the "severity" enum parameter.
#
# Source: widget-system/spec.md §Deliverable 10 (Reference gauge widget bundle test fixture)

name = "gauge"
version = "1.0.0"
description = "Vertical fill gauge widget — reference fixture for widget bundle loader tests"

[[parameter_schema]]
name = "level"
type = "f32"
default = 0.0

[parameter_schema.constraints]
f32_min = 0.0
f32_max = 1.0

[[parameter_schema]]
name = "label"
type = "string"
default = ""

[[parameter_schema]]
name = "fill_color"
type = "color"
default = [0, 180, 255, 255]

[[parameter_schema]]
name = "severity"
type = "enum"
default = "info"

[parameter_schema.constraints]
enum_allowed_values = ["info", "warning", "error"]

# Background layer: static SVG frame with no bindings.
[[layers]]
svg_file = "background.svg"

# Fill layer: "bar" height driven by "level", color driven by "fill_color",
# label text driven by "label", indicator fill driven by "severity".
[[layers]]
svg_file = "fill.svg"

[[layers.bindings]]
param = "level"
target_element = "bar"
target_attribute = "height"
mapping = "linear"
attr_min = 0.0
attr_max = 200.0

[[layers.bindings]]
param = "fill_color"
target_element = "bar"
target_attribute = "fill"
mapping = "direct"

[[layers.bindings]]
param = "label"
target_element = "label-text"
target_attribute = "text-content"
mapping = "direct"

[[layers.bindings]]
param = "severity"
target_element = "indicator"
target_attribute = "fill"
mapping = "discrete"

[layers.bindings.value_map]
info = "#00cc66"
warning = "#ffcc00"
error = "#ff3300"
