# Reference status-indicator widget bundle — used as a test fixture.
#
# This implements a simple status indicator with a coloured fill circle and a
# text label.  The circle fill is controlled by the "status" enum parameter via
# a discrete colour mapping.  The label text is driven by the "label" parameter.
#
# Colours and constraints match spec.md §Requirement: Status Indicator Discrete
# Color Binding and §Requirement: Status Indicator Parameter Schema exactly.
#
# Source: hud-tjq8.1 §Create status-indicator asset bundle
#         hud-tjq8.2 §Add discrete binding and token resolution tests

name = "status-indicator"
version = "1.0.0"
description = "Status indicator widget — reference fixture for discrete binding and text-content tests"
default_contention_policy = "LatestWins"

[[parameter_schema]]
name = "status"
type = "enum"
default = "offline"

[parameter_schema.constraints]
enum_allowed_values = ["online", "away", "busy", "offline"]

[[parameter_schema]]
name = "label"
type = "string"
default = ""

[parameter_schema.constraints]
string_max_bytes = 16

# Indicator layer: circle fill driven by "status" discrete mapping,
# label text driven by "label" direct binding.
[[layers]]
svg_file = "indicator.svg"

[[layers.bindings]]
param = "status"
target_element = "indicator-fill"
target_attribute = "fill"
mapping = "discrete"

[layers.bindings.value_map]
online  = "#4FB543"
away    = "#D97706"
busy    = "#DC2626"
offline = "#6B7280"

[[layers.bindings]]
param = "label"
target_element = "label-text"
target_attribute = "text-content"
mapping = "direct"
