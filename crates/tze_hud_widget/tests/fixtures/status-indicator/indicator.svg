<?xml version="1.0" encoding="UTF-8"?>
<!-- Top-right status indicator with three selectable visual themes.

     Theme groups (one visible at a time via `theme` bindings):
       minimal-group   <- theme (discrete opacity)
       system-group    <- theme (discrete opacity)
       friendly-group  <- theme (discrete opacity)

     Status-driven visual IDs:
       minimal-fill, minimal-glyph
       system-fill, system-glyph
       friendly-fill, friendly-glyph

     Shared bindings:
       label-text      <- label (legacy direct text-content compatibility)
       tooltip-group   <- tooltip_visible (linear opacity 0..1)
       tooltip-label   <- label (direct text-content)
       tooltip-reason  <- reason (direct text-content)
       tooltip-panel/tooltip-theme/tooltip-footer <- theme (discrete styling/copy)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 96" width="252" height="96">
  <!-- Minimal theme: simple glyph-first dot (quiet visual weight). -->
  <g id="minimal-group" opacity="0">
    <circle id="minimal-fill" cx="233" cy="13" r="8" fill="#6B7280"/>
    <text id="minimal-glyph" x="233" y="16"
          text-anchor="middle"
          font-family="sans-serif" font-size="9.5" font-weight="700"
          fill="#FFFFFF">×</text>
  </g>

  <!-- System Ops theme: compact rounded-square badge with border and shadow. -->
  <g id="system-group" opacity="0.82">
    <rect x="224" y="4" width="20" height="20" rx="6"
          fill="#000000" fill-opacity="0.25"/>
    <rect id="system-fill" x="223" y="3" width="20" height="20" rx="6"
          fill="#6B7280" stroke="{{token.color.border.default}}" stroke-width="1.2"/>
    <text id="system-glyph" x="233" y="17"
          text-anchor="middle"
          font-family="sans-serif" font-size="12" font-weight="700"
          fill="#FFFFFF">×</text>
  </g>

  <!-- Friendly theme: soft circular badge with expressive symbol. -->
  <g id="friendly-group" opacity="0">
    <circle cx="233" cy="13" r="11" fill="#000000" fill-opacity="0.18"/>
    <circle id="friendly-fill" cx="233" cy="13" r="10"
            fill="#94A3B8" stroke="#E5E7EB" stroke-width="1"/>
    <text id="friendly-glyph" x="233.7" y="17.2"
          text-anchor="middle"
          font-family="Segoe UI Symbol, Noto Sans Symbols, sans-serif" font-size="11" font-weight="800"
          fill="#0F172A">☾</text>
  </g>

  <!-- Hidden compatibility node retained for legacy label-text binding tests. -->
  <text id="label-text" x="0" y="0"
        font-family="sans-serif" font-size="10"
        fill="{{token.color.text.secondary}}" opacity="0"></text>

  <!-- Tooltip panel; hidden by default and revealed by tooltip_visible binding. -->
  <g id="tooltip-group" opacity="0">
    <rect id="tooltip-panel" x="12" y="30" width="228" height="56" rx="9"
          fill="#101826"
          stroke="{{token.color.border.default}}" stroke-width="1"/>
    <text x="18" y="46"
          font-family="sans-serif" font-size="10" font-weight="700"
          fill="{{token.color.text.secondary}}">Status</text>
    <text id="tooltip-label" x="58" y="46"
          font-family="sans-serif" font-size="10" font-weight="700"
          fill="#F9FAFB"></text>
    <text id="tooltip-reason" x="18" y="64"
          data-role="text"
          font-family="sans-serif" font-size="9"
          fill="#E5E7EB"></text>
    <text id="tooltip-theme" x="18" y="78"
          font-family="sans-serif" font-size="8" font-weight="700"
          fill="#93C5FD">System Ops</text>
    <text id="tooltip-footer" x="90" y="78"
          font-family="sans-serif" font-size="8"
          fill="#94A3B8">Operational detail</text>
  </g>
</svg>
