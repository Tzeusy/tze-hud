# Exemplar Subtitle Component Profile
#
# This is the canonical exemplar for the "subtitle" component type. It
# demonstrates token-referenced rendering overrides via {{token.key}} syntax
# and proves DualLayer readability (backdrop + outline required).
#
# Component type: subtitle
# Readability technique: DualLayer (backdrop_opacity >= 0.3, outline_width >= 1.0)
# Governed zone: subtitle
#
# Source: component-shape-language/spec.md §Component Profile Format,
#         tasks.md §hud-hzub.1

name        = "exemplar-subtitle"
version     = "1.0.0"
description = "Exemplar DualLayer subtitle profile — all rendering overrides via token refs"

component_type = "subtitle"

# Profile-scoped token overrides.
# These values override global [design_tokens] for this profile's assets only.
# They do NOT affect other profiles or the global token map.
#
# This exemplar slightly widens the outline (3px vs reference 2px) and uses a
# warmer backdrop tint (#0A0A0A vs #000000) to differentiate visually from
# reference-subtitle while still satisfying DualLayer requirements.
[token_overrides]
"color.text.primary"         = "#FFFFFF"    # white subtitle text
"color.backdrop.default"     = "#0A0A0A"    # near-black — slightly warmer than reference
"opacity.backdrop.default"   = "0.65"       # 65% — satisfies DualLayer (>= 0.3)
"color.outline.default"      = "#000000"    # black text outline
"stroke.outline.width"       = "3"          # 3px outline — exceeds DualLayer minimum (>= 1.0)
"typography.subtitle.family" = "system-ui"
"typography.subtitle.size"   = "28"         # pixels
"typography.subtitle.weight" = "600"
