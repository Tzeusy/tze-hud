# Zone rendering overrides for the "subtitle" zone type — exemplar-subtitle profile.
#
# All rendering overrides use {{token.key}} references, resolved against this
# profile's scoped token map (profile overrides -> global -> canonical fallbacks).
# Literal numeric fields (backdrop_opacity, outline_width, font_size_px) may also
# be token-referenced; they are shown as literals here for clarity where inline
# numeric TOML is the most readable form.
#
# DualLayer readability requirements (validated at startup):
#   - backdrop_color must be set and not fully transparent
#   - backdrop_opacity >= 0.3
#   - outline_color must be set
#   - outline_width >= 1.0
#
# File naming note: the filename MUST match the zone registry name — "subtitle".
#
# Source: component-shape-language/spec.md §Zone Rendering Override Schema,
#         tasks.md §hud-hzub.1

# Typography
font_family  = "{{typography.subtitle.family}}"   # resolved: "system-ui"
font_size_px = "{{typography.subtitle.size}}"     # resolved: 28.0 px
font_weight  = "{{typography.subtitle.weight}}"   # resolved: 600

# Text rendering
text_color = "{{color.text.primary}}"             # resolved: #FFFFFF
text_align = "center"                             # "start" | "center" | "end"

# Backdrop — semi-transparent strip behind text
backdrop_color   = "{{color.backdrop.default}}"   # resolved: #0A0A0A
backdrop_opacity = "{{opacity.backdrop.default}}" # resolved: 0.65 — satisfies DualLayer >= 0.3

# Outline — DualLayer readability layer (text drawn twice: outline offset + fill)
outline_color = "{{color.outline.default}}"       # resolved: #000000
outline_width = "{{stroke.outline.width}}"        # resolved: 3.0 px — satisfies DualLayer >= 1.0

# Margins
margin_vertical = 8.0                             # pixels from top/bottom zone edges

# Overflow — truncate with ellipsis when text exceeds zone vertical bounds
# Per spec §Subtitle Multi-Line Overflow Handling: "compositor MUST truncate
# the last visible line with an ellipsis character (...)".
overflow = "ellipsis"

# Fade transitions
transition_in_ms  = 200                           # ms — opacity 0 -> 1 on content publish
transition_out_ms = 150                           # ms — opacity 1 -> 0 on content clear
