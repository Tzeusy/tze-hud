<?xml version="1.0" encoding="UTF-8"?>
<!-- Clock icon for exemplar-status-bar key_icon_map.
     Simple clock face: circle outline + hour hand + minute hand.
     24x24 viewport. Monochrome — color.text.secondary default (#B0B0B0).
     NOTE: key_icon_map icons are rasterized directly by resvg without token
     placeholder resolution; literal hex colors are intentional here. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Clock face circle outline -->
  <circle cx="12" cy="12" r="10"
          fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
  <!-- Hour hand: pointing to ~10 o'clock position (short, thick) -->
  <line x1="12" y1="12" x2="8.5" y2="7.5"
        stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand: pointing to ~12 o'clock position (long, thinner) -->
  <line x1="12" y1="12" x2="12" y2="5"
        stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1" fill="#B0B0B0"/>
</svg>
