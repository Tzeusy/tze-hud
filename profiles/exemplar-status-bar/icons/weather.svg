<?xml version="1.0" encoding="UTF-8"?>
<!-- Weather icon for exemplar-status-bar key_icon_map.
     Simple sun: circle center + 8 radiating lines.
     24x24 viewport. Monochrome fill — color.text.secondary default (#B0B0B0).
     NOTE: key_icon_map icons are rasterized directly by resvg without token
     placeholder resolution; literal hex colors are intentional here. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Sun center circle -->
  <circle cx="12" cy="12" r="3.5" fill="#B0B0B0"/>
  <!-- Rays: 8 lines at 45-degree increments, stroke matches fill color -->
  <line x1="12" y1="2"  x2="12" y2="5"  stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="19" x2="12" y2="22" stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="12" x2="5"  y2="12" stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="22" y2="12" stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4.93" y1="4.93"   x2="7.05" y2="7.05"   stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.07" y1="4.93"  x2="16.95" y2="7.05"  stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7.05"  y1="16.95" x2="4.93"  y2="19.07" stroke="#B0B0B0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
