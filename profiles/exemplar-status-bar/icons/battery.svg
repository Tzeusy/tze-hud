<?xml version="1.0" encoding="UTF-8"?>
<!-- Battery icon for exemplar-status-bar key_icon_map.
     Simple battery outline: rounded rect body + small cap nub on right side.
     24x24 viewport. Monochrome — color.text.secondary default (#B0B0B0).
     NOTE: key_icon_map icons are rasterized directly by resvg without token
     placeholder resolution; literal hex colors are intentional here. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Battery body outline: x=1, y=6, width=18, height=12, rounded corners -->
  <rect x="1" y="6" width="18" height="12" rx="2" ry="2"
        fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
  <!-- Battery cap (positive terminal): small rect on right side -->
  <rect x="19" y="9.5" width="3" height="5" rx="1" ry="1" fill="#B0B0B0"/>
  <!-- Battery fill indicator: ~75% charge level -->
  <rect x="3" y="8.5" width="11" height="7" rx="1" ry="1" fill="#B0B0B0"/>
</svg>
