# Zone rendering overrides for the "status-bar" zone type.
#
# This file configures the RenderingPolicy fields applied to the status-bar zone
# when this profile is active. Fields omitted here retain their token-derived
# defaults (see component-shape-language/spec.md §Default Zone Rendering with Tokens).
#
# File naming note: the filename MUST match the zone registry name — "status-bar"
# in this case. The config constant form is "status_bar" but registry name uses
# a hyphen; using "status_bar.toml" will cause a PROFILE_ZONE_OVERRIDE_MISMATCH
# error at startup.
#
# OpaqueBackdrop readability requirements (validated at startup):
#   - backdrop_color must be set and not fully transparent
#   - backdrop_opacity >= 0.8
#
# Outline is NOT required for OpaqueBackdrop profiles.
#
# Source: exemplar-status-bar/spec.md §Status Bar Component Profile,
#         exemplar-status-bar/tasks.md §1.2

# Typography — monospace for aligned key-value display
font_family  = "monospace"                        # fixed-width for key=value pairs
font_size_px = "{{typography.body.size}}"         # resolved: 16px (token override)

# Text — secondary color for non-distracting readability
text_color = "{{color.text.secondary}}"           # resolved: #B0B0B0

# Backdrop — dark, nearly opaque (satisfies OpaqueBackdrop >= 0.8)
backdrop_color   = "{{color.backdrop.default}}"   # resolved: #1A1A2E
backdrop_opacity = 0.9                            # satisfies OpaqueBackdrop >= 0.8

# Margins — consistent horizontal padding between key-value pairs;
# no vertical margin so the strip is flush to its edge anchor
margin_horizontal = "{{spacing.padding.medium}}"  # resolved: 8px
margin_vertical   = 0.0                           # flush edge — no top/bottom margin

# Key-to-icon SVG mapping — optional per key.
# Keys absent from this map are rendered as text-only (backward compatible).
# Values are SVG file paths (relative to profile directory) or resource IDs.
# Values may reference design tokens: "{{token.key}}".
#
# This field is specific to zones with accepted_media_types = [KeyValuePairs]
# (i.e. the status-bar zone); it is ignored for other zone types.
[key_icon_map]
weather = "icons/weather.svg"
battery = "icons/battery.svg"
time    = "icons/clock.svg"
