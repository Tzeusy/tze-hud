# Exemplar Status Bar Component Profile
#
# This is the canonical exemplar for the "status-bar" component type. It proves
# merge-by-key multi-agent coexistence and chrome-layer always-on-top rendering.
#
# Component type: status-bar
# Readability technique: OpaqueBackdrop (backdrop with opacity >= 0.8 required)
# Governed zone: status-bar
#
# Source: exemplar-status-bar/spec.md §Status Bar Component Profile,
#         exemplar-status-bar/tasks.md §1.1

name        = "exemplar-status-bar"
version     = "1.0.0"
description = "Polished status bar exemplar proving merge-by-key multi-agent coexistence"

component_type = "status-bar"

# Profile-scoped token overrides.
# These values override global [design_tokens] for this profile's assets only.
# They do NOT affect other profiles or the global token map.
#
# The text.secondary token (#B0B0B0) provides readable but non-distracting
# secondary text against the dark navy backdrop (#1A1A2E).
# backdrop_opacity = 0.9 satisfies OpaqueBackdrop readability (>= 0.8).
[token_overrides]
"color.text.secondary"   = "#B0B0B0"    # secondary gray — non-distracting readability
"color.backdrop.default" = "#1A1A2E"    # dark navy — consistent with notification exemplar
"typography.body.size"   = "16"         # pixels — body text size
"spacing.padding.medium" = "8"          # pixels — horizontal key-value spacing
