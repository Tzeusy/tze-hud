# Zone rendering overrides for the "notification-area" zone type.
#
# This is the exemplar rendering configuration for the notification stack.
# backdrop_opacity = 0.9 satisfies OpaqueBackdrop readability (>= 0.8).
#
# Source: exemplar-notification/tasks.md §7.2

# Typography — body text for notification content
font_family  = "{{typography.body.family}}"   # resolved: "system-ui"
font_size_px = 16.0                           # body text size
font_weight  = 400                            # regular weight

# Text rendering
text_color = "{{color.text.primary}}"         # resolved: #FFFFFF
text_align = "start"                          # left-aligned

# Backdrop — base backdrop; urgency tinting applied per-notification by compositor
backdrop_color   = "{{color.backdrop.default}}"  # resolved: #1A1A2E (navy fallback)
backdrop_opacity = 0.9                            # satisfies OpaqueBackdrop >= 0.8

# Margins — 8px on all sides (matches spacing.padding.medium)
margin_horizontal = 8.0
margin_vertical   = 8.0
