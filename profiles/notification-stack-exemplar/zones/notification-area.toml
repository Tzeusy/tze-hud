# Zone rendering overrides for the "notification-area" zone type.
#
# This is the exemplar rendering configuration for the notification stack.
# backdrop_opacity = 0.8 satisfies OpaqueBackdrop readability (>= 0.8).
#
# Source: exemplar-notification/tasks.md §7.2

# Typography — body text for notification content
font_family  = "{{typography.body.family}}"   # resolved: "system-ui"
font_size_px = "{{typography.body.size}}"     # body text size
font_weight  = "{{typography.body.weight}}"   # medium weight for better legibility

# Text rendering
text_color = "{{color.text.primary}}"         # resolved: #F5F7FA
text_align = "start"                          # left-aligned

# Backdrop — base backdrop; urgency tinting applied per-notification by compositor
backdrop_color   = "{{color.backdrop.default}}"  # resolved: #000000 (fallback when no urgency tint)
backdrop_opacity = "{{opacity.backdrop.opaque}}"  # satisfies OpaqueBackdrop >= 0.8

# Rounded card styling
backdrop_radius = "{{border.radius.medium}}"

# Margins — tighter modern card body inset
margin_horizontal = "{{spacing.padding.medium}}"
margin_vertical   = "{{spacing.padding.medium}}"

# Slightly softer zone-level transitions (publication-level fade remains in compositor)
transition_in_ms  = 120
transition_out_ms = 180
