# Notification Stack Exemplar Component Profile
#
# This profile is the canonical exemplar for the "notification" component type.
# It declares urgency-tinted backdrop color tokens and satisfies OpaqueBackdrop
# readability validation at startup.
#
# Source: exemplar-notification/spec.md §Notification Stack Exemplar Component Profile,
#         exemplar-notification/tasks.md §7.1

name        = "notification-stack-exemplar"
version     = "1.0.0"
description = "Notification stack exemplar — rounded urgency-tinted cards with stronger type hierarchy"

component_type = "notification"

# Profile-scoped token overrides.
# These urgency tokens are used by the compositor's urgency-to-color mapping
# when rendering notification-area items. They override the compositor's
# hardcoded defaults when this profile is active.
#
# All four urgency levels must be defined for full coverage.
[token_overrides]
"color.notification.urgency.low"      = "#2A2A2A"   # dark gray — low urgency
"color.notification.urgency.normal"   = "#1A1A3A"   # dark navy — normal
"color.notification.urgency.urgent"   = "#8B6914"   # amber — urgent attention
"color.notification.urgency.critical" = "#8B1A1A"   # deep red — critical

# Base backdrop and typography tokens
"color.text.primary"      = "#F5F7FA"
"color.backdrop.default"  = "#141A24"    # fallback when no urgency tinting
"opacity.backdrop.opaque" = "0.92"       # satisfies OpaqueBackdrop (>= 0.8)
"color.border.default"    = "#6E7A91"
"typography.body.family"  = "system-ui"
"typography.body.size"    = "15"
"typography.body.weight"  = "500"
"typography.notification.body.scale"  = "0.90"
"typography.notification.title.weight" = "700"
"spacing.padding.medium"  = "10"
"stroke.border.width"     = "1"
"border.radius.medium"    = "14"
