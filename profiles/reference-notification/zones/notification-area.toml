# Zone rendering overrides for the "notification-area" zone type.
#
# IMPORTANT: The filename MUST be "notification-area.toml" — matching the zone
# registry name exactly. Using "notification.toml" will cause a
# PROFILE_ZONE_OVERRIDE_MISMATCH error at startup. The component type name
# ("notification") and the zone registry name ("notification-area") differ by
# design; always use the zone registry name for override files.
#
# OpaqueBackdrop readability requirements (validated at startup):
#   - backdrop_color must be set and not fully transparent
#   - backdrop_opacity >= 0.8
#
# Outline is NOT required for OpaqueBackdrop profiles.
#
# Notifications are rendered as stacked items; individual urgency-tinted
# backdrop colors are handled by the compositor urgency mapping. The backdrop
# fields here serve as the base/fallback when no urgency tinting applies.

# Typography
font_family  = "{{typography.body.family}}"   # resolved: "system-ui"
font_size_px = 16.0                           # pixels; or "{{typography.body.size}}"
font_weight  = 400                            # CSS numeric 100-900

# Text rendering
text_color = "{{color.text.primary}}"         # resolved: #FFFFFF
text_align = "start"                          # left-aligned for notifications

# Backdrop — opaque dark backdrop per notification slot
backdrop_color   = "{{color.backdrop.default}}"  # resolved: #1A1A2E
backdrop_opacity = 0.9                            # satisfies OpaqueBackdrop >= 0.8

# No outline for notification (OpaqueBackdrop readability — outline optional)
# outline_color and outline_width are omitted; they default to None

# Margins — inset text from backdrop edges (border width is added by compositor)
margin_horizontal = 8.0   # pixels — includes space for 1px border + 8px padding
margin_vertical   = 8.0   # pixels — includes space for 1px border + 8px padding

# Transitions — notifications appear/dismiss smoothly
transition_in_ms  = 100   # ms — quick appear
transition_out_ms = 150   # ms — fade on TTL dismiss
