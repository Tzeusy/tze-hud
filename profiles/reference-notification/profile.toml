# Reference Notification Component Profile
#
# This is the canonical reference implementation for the "notification"
# component type. It demonstrates the minimal structure of a valid notification
# profile and serves as a template for custom implementations.
#
# Component type: notification
# Readability technique: OpaqueBackdrop (backdrop with opacity >= 0.8 required)
# Governed zone: notification-area
#
# Source: component-shape-language/spec.md §Component Profile Format,
#         tasks.md §15.2

name        = "reference-notification"
version     = "1.0.0"
description = "Reference OpaqueBackdrop notification profile — opaque dark backdrop with border styling"

component_type = "notification"

# Profile-scoped token overrides.
# These values override global [design_tokens] for this profile's assets only.
# They do NOT affect other profiles or the global token map.
[token_overrides]
"color.text.primary"       = "#FFFFFF"    # white notification text
"color.backdrop.default"   = "#1A1A2E"    # dark navy backdrop
"opacity.backdrop.opaque"  = "0.9"        # 90% — satisfies OpaqueBackdrop (>= 0.8)
"color.border.default"     = "#4A4A6A"    # muted purple-grey border
"typography.body.family"   = "system-ui"
"typography.body.size"     = "16"         # pixels
"typography.body.weight"   = "400"
"spacing.padding.medium"   = "8"          # pixels
"stroke.border.width"      = "1"          # pixels
