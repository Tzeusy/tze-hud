# Zone rendering overrides for the "alert-banner" zone type.
#
# This file configures the RenderingPolicy fields applied to the alert-banner zone
# when this profile is active. Fields omitted here retain their token-derived
# defaults (see component-shape-language/spec.md §Default Zone Rendering with Tokens).
#
# File naming note: the filename MUST match the zone registry name — "alert-banner"
# in this case. The config constant form is "alert_banner" but registry name uses
# a hyphen; using "alert_banner.toml" will cause a PROFILE_ZONE_OVERRIDE_MISMATCH
# error at startup.
#
# OpaqueBackdrop readability requirements (validated at startup):
#   - backdrop_color must be set and not fully transparent
#   - backdrop_opacity >= 0.8
#
# Outline is NOT required for OpaqueBackdrop profiles.
#
# Source: hud-w3o6.1

# Typography — bold heading for urgency and immediate attention
font_family  = "{{typography.heading.family}}"    # resolved: "system-ui"
font_size_px = "{{typography.heading.size}}"      # resolved: 20px (token override)
font_weight  = "{{typography.heading.weight}}"    # resolved: 700 (bold)

# Text — white for high contrast against all severity backdrop colors
text_color = "{{color.text.primary}}"             # resolved: #FFFFFF

# Backdrop — dark, nearly opaque (satisfies OpaqueBackdrop >= 0.8)
# The default backdrop is the navy fallback; severity-specific tints are
# applied at runtime via urgency-to-severity token mapping.
backdrop_color   = "{{color.backdrop.default}}"   # resolved: #1A1A2E
backdrop_opacity = 0.9                            # satisfies OpaqueBackdrop >= 0.8

# Margins — horizontal padding for readability; no vertical margin so the
# banner is flush to its anchor edge
margin_horizontal = "{{spacing.padding.medium}}"  # resolved: 8px (from global tokens)
margin_vertical   = 0.0                           # flush edge — no top/bottom margin
