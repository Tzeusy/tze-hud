# Exemplar Alert Banner Component Profile
#
# This is the canonical exemplar for the "alert-banner" component type. It
# proves token-resolved severity-tinted backdrops and heading typography
# overrides with OpaqueBackdrop readability.
#
# Component type: alert-banner
# Readability technique: OpaqueBackdrop (backdrop with opacity >= 0.8 required)
# Governed zone: alert-banner
#
# Source: hud-w3o6.1

name        = "exemplar-alert-banner"
version     = "1.0.0"
description = "Exemplar alert-banner profile with token-resolved severity backdrops and heading typography"

component_type = "alert-banner"

# Profile-scoped token overrides.
# These values override global [design_tokens] for this profile's assets only.
# They do NOT affect other profiles or the global token map.
#
# Severity backdrop colors cover the four urgency levels (info, warning, error,
# critical). backdrop_opacity = 0.9 satisfies OpaqueBackdrop readability (>= 0.8).
[token_overrides]
"color.text.primary"         = "#FFFFFF"    # white text — high contrast against severity backdrops
"color.backdrop.default"     = "#1A1A2E"    # dark navy fallback — used when no severity is active
"opacity.backdrop.opaque"    = "0.9"        # satisfies OpaqueBackdrop (>= 0.8)
"color.severity.info"        = "#4A9EFF"    # blue — informational severity backdrop
"color.severity.warning"     = "#FFB800"    # amber — warning severity backdrop
"color.severity.error"       = "#FF4444"    # orange-red — error severity backdrop
"color.severity.critical"    = "#FF0000"    # red — critical severity backdrop
"typography.heading.family"  = "system-ui"
"typography.heading.size"    = "24"         # pixels — heading size per spec §Alert-Banner Heading Typography
"typography.heading.weight"  = "700"        # bold — urgency emphasis
