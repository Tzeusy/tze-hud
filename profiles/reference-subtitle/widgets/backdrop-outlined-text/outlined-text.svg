<?xml version="1.0" encoding="UTF-8"?>
<!-- Outlined text layer for the reference subtitle widget.
     Renders subtitle text with a stroke outline for DualLayer readability.

     IMPORTANT: This element MUST appear after the backdrop layer in document
     order (SVG painter's model) so text renders on top of the backdrop.

     data-role="text" marks this element for readability validation.
     For DualLayer profiles, both fill AND stroke MUST be present on elements
     with data-role="text". stroke-width MUST be >= 1.0.

     Token placeholders ({{...}}) are resolved at bundle load time.
     The "text" and "text_color" parameters are bound in widget.toml. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 120" width="1920" height="120">
  <!-- Subtitle text — centered horizontally, vertically centered in zone.
       stroke provides the DualLayer outline requirement.
       paint-order="stroke fill" renders stroke behind fill for cleaner outline. -->
  <text
    id="subtitle-text"
    data-role="text"
    x="960" y="76"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="{{token.typography.subtitle.family}}"
    font-size="{{token.typography.subtitle.size}}"
    font-weight="{{token.typography.subtitle.weight}}"
    fill="{{token.color.text.primary}}"
    stroke="{{token.color.outline.default}}"
    stroke-width="{{token.stroke.outline.width}}"
    stroke-linejoin="round"
    paint-order="stroke fill">Subtitle text</text>
</svg>
