# Reference subtitle widget bundle — backdrop + outlined text SVG.
#
# This widget demonstrates the DualLayer readability pattern using SVG:
# a backdrop rectangle followed by outlined text in document order (painter's
# model: backdrop paints first so text renders on top).
#
# Registered as "reference-subtitle/backdrop-outlined-text" in the WidgetRegistry.
#
# Parameters:
#   text        - The subtitle string to display
#   text_color  - Override fill color for the text (color param)
#   opacity     - Backdrop opacity override (f32, 0.0-1.0)
#
# Token placeholders ({{token.key}}) in layer SVGs are resolved against this
# profile's scoped token map at bundle load time — never at render time.

name        = "backdrop-outlined-text"
version     = "1.0.0"
description = "DualLayer subtitle widget: semi-transparent backdrop with outlined text"

[[parameter_schema]]
name    = "text"
type    = "string"
default = ""

[[parameter_schema]]
name    = "text_color"
type    = "color"
default = [255, 255, 255, 255]

[[parameter_schema]]
name    = "opacity"
type    = "f32"
default = 0.6

[parameter_schema.constraints]
f32_min = 0.0
f32_max = 1.0

# Backdrop layer: renders the semi-transparent background rectangle.
# Must appear before the text layer in document order (painter's model).
[[layers]]
svg_file = "backdrop.svg"

[[layers.bindings]]
param            = "opacity"
target_element   = "backdrop-rect"
target_attribute = "opacity"
mapping          = "direct"

# Text layer: renders outlined subtitle text over the backdrop.
[[layers]]
svg_file = "outlined-text.svg"

[[layers.bindings]]
param            = "text"
target_element   = "subtitle-text"
target_attribute = "text-content"
mapping          = "direct"

[[layers.bindings]]
param            = "text_color"
target_element   = "subtitle-text"
target_attribute = "fill"
mapping          = "direct"
