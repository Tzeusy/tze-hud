<?xml version="1.0" encoding="UTF-8"?>
<!-- Backdrop layer for the reference subtitle widget.
     Renders a semi-transparent dark rectangle behind the subtitle text.
     IMPORTANT: This element MUST appear before the text layer in document
     order (SVG painter's model) so text renders on top of the backdrop.

     data-role="backdrop" marks this element for readability validation.
     Token placeholders ({{...}}) are resolved at bundle load time. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 120" width="1920" height="120">
  <!-- Backdrop rectangle — spans full subtitle zone width.
       opacity is driven by the "opacity" widget parameter. -->
  <rect
    id="backdrop-rect"
    data-role="backdrop"
    x="0" y="0"
    width="1920" height="120"
    fill="{{color.backdrop.default}}"
    opacity="0.6"/>
</svg>
