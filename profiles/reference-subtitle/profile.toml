# Reference Subtitle Component Profile
#
# This is the canonical reference implementation for the "subtitle" component
# type. It demonstrates the minimal structure of a valid subtitle profile and
# serves as a template for custom implementations.
#
# Component type: subtitle
# Readability technique: DualLayer (backdrop + outline required)
# Governed zone: subtitle
#
# Source: component-shape-language/spec.md §Component Profile Format,
#         tasks.md §15.1

name        = "reference-subtitle"
version     = "1.0.0"
description = "Reference DualLayer subtitle profile — white text, black outline, semi-transparent backdrop"

component_type = "subtitle"

# Profile-scoped token overrides.
# These values override global [design_tokens] for this profile's assets only.
# They do NOT affect other profiles or the global token map.
#
# The defaults below match the canonical fallback values exactly, so this
# profile produces the same visual output as the token-derived default.
# Override these to customise the appearance without touching global tokens.
[token_overrides]
"color.text.primary"      = "#FFFFFF"    # white subtitle text
"color.backdrop.default"  = "#000000"    # black semi-transparent backdrop
"opacity.backdrop.default" = "0.6"       # 60% — satisfies DualLayer (>= 0.3)
"color.outline.default"   = "#000000"    # black text outline
"stroke.outline.width"    = "2"          # 2px outline — satisfies DualLayer (>= 1.0)
"typography.subtitle.family" = "system-ui"
"typography.subtitle.size"   = "28"      # pixels
"typography.subtitle.weight" = "600"
