# Zone rendering overrides for the "subtitle" zone type.
#
# This file configures the RenderingPolicy fields applied to the subtitle zone
# when this profile is active. Fields omitted here retain their token-derived
# defaults (see component-shape-language/spec.md §Default Zone Rendering with Tokens).
#
# File naming note: the filename MUST match the zone registry name — "subtitle"
# in this case. For notification use "notification-area.toml" (not "notification.toml").
#
# DualLayer readability requirements (validated at startup):
#   - backdrop_color must be set and not fully transparent
#   - backdrop_opacity >= 0.3
#   - outline_color must be set
#   - outline_width >= 1.0
#
# Token references use {{token.key}} syntax and are resolved against this
# profile's scoped token map (profile overrides -> global -> canonical fallbacks).

# Typography
font_family  = "{{typography.subtitle.family}}"   # resolved: "system-ui"
font_size_px = 28.0                               # pixels; or "{{typography.subtitle.size}}"
font_weight  = 600                                # CSS numeric 100-900

# Text rendering
text_color = "{{color.text.primary}}"             # resolved: #FFFFFF
text_align = "center"                             # "start" | "center" | "end"

# Backdrop — semi-transparent dark strip behind the text
backdrop_color   = "{{color.backdrop.default}}"  # resolved: #000000
backdrop_opacity = 0.6                            # satisfies DualLayer >= 0.3

# Outline — renders text twice: at 8 cardinal+diagonal offsets in outline_color,
# then fill text on top in text_color. See spec §Extended RenderingPolicy.
outline_color = "{{color.outline.default}}"       # resolved: #000000
outline_width = 2.0                               # pixels; satisfies DualLayer >= 1.0

# Margins
margin_horizontal = 16.0   # pixels from left/right zone edges
margin_vertical   = 8.0    # pixels from top/bottom zone edges

# Fade transitions
transition_in_ms  = 200    # ms — opacity 0 -> 1 when content is published
transition_out_ms = 150    # ms — opacity 1 -> 0 when content is cleared/replaced
