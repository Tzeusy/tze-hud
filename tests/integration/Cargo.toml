[package]
name = "integration"
description = "Multi-crate integration tests for tze_hud"
version.workspace = true
edition.workspace = true

[[test]]
name = "multi_agent"
path = "multi_agent.rs"

[features]
headless = [
    "tze_hud_runtime/headless",
    "tze_hud_compositor/headless",
]

[dependencies]
tze_hud_scene = { path = "../../crates/tze_hud_scene" }
tze_hud_compositor = { path = "../../crates/tze_hud_compositor" }
tze_hud_runtime = { path = "../../crates/tze_hud_runtime", features = ["headless"] }
tze_hud_protocol = { path = "../../crates/tze_hud_protocol" }
tze_hud_telemetry = { path = "../../crates/tze_hud_telemetry" }
tokio = { workspace = true }
tonic = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
