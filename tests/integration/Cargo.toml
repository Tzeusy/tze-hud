[package]
name = "integration"
description = "Multi-crate integration tests for tze_hud"
version.workspace = true
edition.workspace = true

[[test]]
name = "multi_agent"
path = "multi_agent.rs"

[[test]]
name = "trace_regression"
path = "trace_regression.rs"

# Soak and leak test suite (validation-framework/spec.md lines 298-310).
#
# Default run (fast CI, 10 seconds):
#   cargo test --test soak
#
# 1-hour CI run:
#   TZE_HUD_SOAK_SECS=3600 cargo test --test soak -- --nocapture
#
# 6-hour nightly run:
#   TZE_HUD_SOAK_SECS=21600 cargo test --test soak -- --nocapture
[[test]]
name = "soak"
path = "soak.rs"

# Integration tests always run headless (no display server required).
# tze_hud_runtime is built with the headless feature unconditionally so
# all tests run in CI without a display. The workspace-level `headless`
# feature is re-exported here for downstream tooling that may set it.
[features]
headless = ["tze_hud_compositor/headless"]

[dependencies]
tze_hud_scene = { path = "../../crates/tze_hud_scene" }
tze_hud_compositor = { path = "../../crates/tze_hud_compositor" }
tze_hud_runtime = { path = "../../crates/tze_hud_runtime", features = ["headless"] }
tze_hud_protocol = { path = "../../crates/tze_hud_protocol" }
tze_hud_telemetry = { path = "../../crates/tze_hud_telemetry" }
tokio = { workspace = true }
tonic = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
