# cargo-deny configuration for tze_hud
#
# This project is GPL-3.0-only. All dependency licenses must be compatible with
# the GNU General Public License v3.0 or later. cargo-deny enforces this on
# every PR via the `cargo-deny` CI job in .github/workflows/ci.yml.
#
# Reference: https://embarkstudios.github.io/cargo-deny/

# ─── Advisories ──────────────────────────────────────────────────────────────
#
# Deny known CVEs and security vulnerabilities. Unmaintained crates generate
# errors by default; individual waivers are documented with rationale below.
#
# yanked = "warn" (not deny) because a yanked crate version is sometimes an
# accidental publish that does not indicate a security issue. The lockfile
# pins us to a specific version regardless; we accept the warning and track
# yanked crates in the follow-up inventory.
[advisories]
version = 2
yanked = "warn"

# Advisory ignores — every entry documents:
#   id: RUSTSEC-XXXX-XXXX
#   crate: <name>@<version>
#   reason: why we cannot upgrade right now
#   action: what needs to happen to remove this waiver
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained (archived by dtolnay).
    # Transitive dependency chain: paste ← metal ← wgpu-hal ← wgpu ← glyphon.
    # The wgpu 24.x version is pinned by the glyphon 0.8.x → wgpu 24.x →
    # Rust 1.88 co-pin documented in Cargo.toml. No safe upgrade exists until
    # wgpu bumps its metal dep to a maintained fork, which requires wgpu 28+
    # (needs Rust 1.92+ MSRV). Risk: compile-time proc-macro only, zero
    # runtime attack surface.
    # Action: Remove when MSRV is bumped to Rust 1.92+ and wgpu upgraded to 28+.
    { id = "RUSTSEC-2024-0436", reason = "Transitive dep via metal←wgpu-hal←wgpu←glyphon. Compile-time proc-macro, no runtime attack surface. Blocked on wgpu 28+ (needs Rust 1.92+ MSRV bump, tracked with glyphon/wgpu version chain in Cargo.toml)." },
    # RUSTSEC-2026-0192: `ttf-parser` is unmaintained (author statement,
    # harfbuzz/ttf-parser#217). Transitive chains: ttf-parser@0.20 ← fontdb ←
    # cosmic-text ← glyphon and ttf-parser@0.21 ← cosmic-text ← glyphon. Both
    # pinned by the same glyphon 0.8.x → wgpu 24.x → Rust 1.88 co-pin as the
    # `paste` waiver above; no safe upgrade exists (advisory suggests migrating
    # the ecosystem to `skrifa`, which cosmic-text has not done at our pin).
    # Risk: font parsing of locally-installed system fonts only — no untrusted
    # font ingestion path exists in the runtime.
    # Action: Remove when the glyphon/wgpu chain is bumped (wgpu 28+, Rust
    # 1.92+ MSRV) and cosmic-text's font stack moves off ttf-parser.
    { id = "RUSTSEC-2026-0192", reason = "Unmaintained ttf-parser via cosmic-text/fontdb←glyphon, pinned by the glyphon→wgpu→Rust 1.88 co-pin (same chain as the paste waiver). Parses locally-installed system fonts only. Remove with the wgpu 28+ MSRV bump." },
    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml DoS (quadratic dup-attr
    # check; unbounded NsReader namespace allocation), fixed in >=0.41. Our
    # DIRECT workspace dependency was bumped to 0.41 (2026-07-02, hud-sv7z2);
    # the ONLY remaining vulnerable instance is quick-xml@0.39.2 inside
    # `wayland-scanner`, a compile-time proc-macro (smithay-client-toolkit ←
    # sctk-adwaita ← winit 0.30) that parses the vendored Wayland protocol XML
    # at build time. Zero runtime attack surface; input is trusted repo-pinned
    # XML, not attacker-controlled.
    # Action: Remove when winit's wayland stack updates quick-xml to >=0.41.
    { id = "RUSTSEC-2026-0194", reason = "Only remaining instance is build-time wayland-scanner proc-macro (via winit 0.30) parsing trusted vendored protocol XML. Direct workspace dep already bumped to 0.41. Remove when winit updates its wayland stack." },
    { id = "RUSTSEC-2026-0195", reason = "Only remaining instance is build-time wayland-scanner proc-macro (via winit 0.30) parsing trusted vendored protocol XML. Direct workspace dep already bumped to 0.41. Remove when winit updates its wayland stack." },
    # RUSTSEC-2026-0206: `rustybuzz` is unmaintained (maintainer statement,
    # harfbuzz/rustybuzz#166); successor is `harfrust`. Two transitive
    # versions are pinned in our tree: rustybuzz@0.14.1 via cosmic-text ←
    # glyphon ← tze_hud_compositor (the glyphon 0.8.x → wgpu 24.x → Rust 1.88
    # co-pin, same chain as the paste/ttf-parser waivers above), and
    # rustybuzz@0.20.1 via usvg/resvg 0.47 ← tze_hud_compositor. No safe
    # upgrade exists at either pin: cosmic-text has not migrated to harfrust,
    # and bumping usvg/resvg independently would fragment the font-shaping
    # stack from glyphon's. Unmaintained-class advisory, not a vulnerability —
    # no CVE, no known exploit; rustybuzz continues to function correctly for
    # our text-shaping usage.
    # Action: remove when cosmic-text (glyphon chain) and usvg/resvg both
    # migrate to harfrust. Tracked in hud-b0r5e.
    { id = "RUSTSEC-2026-0206", reason = "Unmaintained (not a vulnerability), successor is harfrust. Two transitive pins: rustybuzz@0.14.1 via cosmic-text←glyphon (same co-pin chain as the paste/ttf-parser waivers) and rustybuzz@0.20.1 via usvg/resvg←tze_hud_compositor. No safe upgrade until both upstreams migrate to harfrust. Tracked in hud-b0r5e." },
]

# ─── Licenses ────────────────────────────────────────────────────────────────
#
# tze_hud is GPL-3.0-only. All dependencies must use licenses compatible with
# GPL-3.0 as a downstream recipient.
#
# License compatibility rationale:
#
# Permissive licenses (MIT, Apache-2.0, BSD-*, ISC, CC0, 0BSD, MIT-0, Zlib,
#   Unlicense, Unicode-3.0): all GPL-3.0 compatible.
#
# Apache-2.0 WITH LLVM-exception: The LLVM exception removes the patent-
#   retaliation clause that would otherwise be incompatible with GPL-3.0.
#   Used by: blake3, linux-raw-sys, rustix, wasi, wasip2, wasip3, wit-bindgen.
#
# LGPL-2.1-or-later: The "or later" clause covers LGPL-3.0, which is
#   compatible with GPL-3.0. Linking LGPL code into a GPL-3.0 project is
#   explicitly permitted by the GPL. Present in: r-efi (UEFI firmware
#   interface stubs used by winit/windows targets).
#
# GPL-3.0-only: our own workspace crates.
#
# GPL-2.0-only — EXCEPTION via per-crate exceptions table: self_cell@1.2.2
#   declares "Apache-2.0 OR GPL-2.0-only". We use it under Apache-2.0. Rather
#   than allowing GPL-2.0-only globally (which would silently permit future
#   solely-GPL-2.0-only crates that are incompatible with GPL-3.0-only), this
#   license is scoped to self_cell only via the exceptions table below.
[licenses]
version = 2

# Explicitly allowed SPDX license identifiers.
allow = [
    # ── Permissive ────────────────────────────────────────────────────────
    "MIT",
    "Apache-2.0",
    # The LLVM exception makes Apache-2.0 unambiguously GPL-3.0 compatible.
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # CC0-1.0: public domain dedication. Used by blake3, constant_time_eq,
    # hexf-parse.
    "CC0-1.0",
    # 0BSD: BSD Zero Clause License. Used by adler2.
    "0BSD",
    # MIT-0: MIT without the attribution requirement. Used by constant_time_eq.
    "MIT-0",
    # Zlib: permissive, GPL-compatible. Used by bytemuck, cursor-icon, glyphon,
    # miniz_oxide, objc2-* crates, raw-window-handle, slotmap, tinyvec, etc.
    "Zlib",
    # Unlicense: public domain. Used by byteorder-lite, memchr, same-file,
    # termcolor, walkdir, winapi-util.
    "Unlicense",
    # Unicode-3.0: Unicode, Inc. open-source license, GPL-3.0 compatible.
    # Used by unicode-ident.
    "Unicode-3.0",

    # ── Weak copyleft (GPL-3.0 compatible) ───────────────────────────────
    # LGPL-2.1-or-later: compatible with GPL-3.0 via the "or later" clause.
    # Present in: r-efi (UEFI interface crate, winit/windows dep).
    "LGPL-2.1-or-later",

    # ── Strong copyleft ──────────────────────────────────────────────────
    # GPL-3.0-only: our own workspace crates.
    "GPL-3.0-only",

]

# Minimum confidence threshold for license text detection.
confidence-threshold = 0.8

# Per-crate license exceptions.
# self_cell@1.2.2 uses "Apache-2.0 OR GPL-2.0-only". We use it under
# Apache-2.0, but cargo-deny requires all OR alternatives to appear somewhere
# in the configuration. Scoping GPL-2.0-only to this single crate exception
# prevents any future solely-GPL-2.0-only dependency (which would be
# incompatible with our GPL-3.0-only project) from being silently allowed.
# Transitive chain: self_cell ← cosmic-text ← glyphon ← tze_hud_compositor.
exceptions = [
    { name = "self_cell", allow = ["GPL-2.0-only"] },
]

# ─── Bans ────────────────────────────────────────────────────────────────────
#
# Duplicate version detection and blocked crates.
[bans]
# Warn on duplicate crate versions. Many duplicates are unavoidable with the
# wgpu 24.x + winit 0.30.x + glyphon 0.8.x co-pin. Promote to "deny" once
# the co-pin is resolved.
multiple-versions = "warn"

# Wildcard version requirements in Cargo.toml. Changed to "warn" rather than
# "deny" because workspace intra-crate path dependencies (e.g.
# `tze_hud_scene = { path = "../../crates/tze_hud_scene" }`) do not carry a
# `version` field by convention; cargo-deny treats them as wildcards. Fixing
# all intra-workspace path deps is a separate housekeeping task and not the
# scope of this bead. External (registry) wildcard deps are rejected by
# convention — see Cargo.toml workspace deps for pinned version constraints.
wildcards = "warn"

# Workspace members are implicitly trusted.
allow-workspace = false

# No globally banned crates at present.
deny = []

# ─── Sources ─────────────────────────────────────────────────────────────────
#
# All production dependencies must be sourced from crates.io.
# Workspace path dependencies are local crates and are always trusted.
[sources]
# Reject crates from unknown registries.
unknown-registry = "deny"
# Reject crates from unknown git repositories.
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
