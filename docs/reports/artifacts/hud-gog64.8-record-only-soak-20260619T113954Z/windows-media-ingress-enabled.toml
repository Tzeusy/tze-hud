# tze_hud Windows Media Ingress Configuration
#
# Staged Windows validation copy for hud-gog64.8.
# The only difference from app/tze_hud_app/config/windows-media-ingress.toml is
# absolute bundle/profile paths suitable for C:\tze_hud.

[runtime]
profile = "full-display"

[widget_bundles]
paths = ["C:/tze_hud/widget_bundles"]

[component_profile_bundles]
paths = ["C:/tze_hud/profiles"]

[component_profiles]
notification = "notification-stack-exemplar"

[[tabs]]
name = "Main"
default_tab = true

[media_ingress]
enabled = true
approved_zone = "media-pip"
max_active_streams = 1
default_classification = "household"
operator_disabled = false

[media_ingress.geometry]
x = 1440
y = 756
width = 420
height = 236

[agents.registered.windows-local-media-producer]
capabilities = [
    "media_ingress",
    "publish_zone:media-pip",
    "read_telemetry",
]
