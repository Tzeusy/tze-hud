# tze_hud CI — closure-grade gates for v1-MVP.
#
# Job map:
#   check          — cargo check: fast compilation gate (no codegen)
#   fmt            — cargo fmt --check: formatting gate
#   clippy         — cargo clippy --all-targets -D warnings: lint gate (incl. tests/examples/benches)
#   clippy-windows-gnu — cargo clippy --target x86_64-pc-windows-gnu -D warnings: lints the four
#     crates carrying cfg(windows) code, which the Linux clippy job above never compiles
#   test-unit      — cargo test --workspace --all-targets --exclude integration
#   test-integration — cargo test -p integration (headless suites; excl. trace_regression, v1_thesis, soak)
#   test-trace     — cargo test -p integration --test trace_regression
#   test-v1-thesis — cargo test -p integration --test v1_thesis
#   production-boot — cargo test -p vertical_slice --test production_boot
#   windows-performance-budget — headless Windows benchmark + locked budget gate
#   release-artifact-provenance-smoke — cross-build tze_hud.exe and verify uploaded checksum round-trip
#   vocabulary-lint — scripts/check_canonical_vocabulary.sh
#   user-test-python-suite — pytest over .claude/skills/user-test/{tests,scripts}/
#     pure-Python suite (Rust<->Python token/geometry drift-guards); no GPU, no
#     Windows, no live HUD runtime, no external network (hud-43z24)
#   dev-mode-guard  — verifies dev-mode feature is NOT compiled into release binary
#   v2-preview      — cargo check/clippy/test with --features v2_preview (gated state machines)
#
# GPU / windowed jobs:
#   Windowed rendering and pixel-readback tests require a GPU (real or software).
#   These run with HEADLESS_FORCE_SOFTWARE=1 (llvmpipe on Linux) to avoid
#   hardware GPU dependency.  They are gated on the `test-unit` job and clearly
#   documented as GPU-required so teams can opt them out in environments without
#   llvmpipe (e.g., minimal container images).
#
# ── fmt gate contract ────────────────────────────────────────────────────────
#
# The `fmt` job runs `cargo fmt --check` (without --all) from the workspace
# root.  From a workspace root, `cargo fmt` and `cargo fmt --all` are
# equivalent — both discover and format every file in every workspace member
# by traversing `mod` declarations from each crate's entry point (lib.rs /
# main.rs).  Rustfmt operates on the source tree, not the compilation graph,
# so `#[cfg(target_os = "windows")]` blocks and other cfg-gated code are
# formatted regardless of the build host.
#
# Investigation note (hud-18hth, 2026-04-25):
#   PR #598 (native GPU lock) introduced fmt violations in gpu_lock.rs inside
#   a `#[cfg(target_os = "windows")]` block.  The `cargo fmt` CI check
#   correctly reported FAILURE on that PR.  The violations were merged anyway
#   because the main branch had no required-status-checks protection.  The
#   fix was applied in PR #599 during rebase.
#
#   Root cause: missing branch protection, NOT a gap in the fmt gate itself.
#   Branch protection with required status checks has now been enabled on
#   `main` to prevent future merges over failing CI.
#
#   All blocking jobs (check, fmt, clippy, test-unit, test-trace,
#   test-v1-thesis, vertical_slice production boot, canonical app production
#   boot, release artifact provenance smoke, vocabulary-lint, dev-mode-guard,
#   v2-preview) are required to pass before merge.
# ─────────────────────────────────────────────────────────────────────────────
# Spec ref:
#   validation-framework/spec.md §CI Requirements (headless, no physical GPU)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Force software GPU (llvmpipe on Linux, WARP on Windows) for headless rendering.
  # Tests that call HeadlessRuntime::new() will use a software adapter.
  HEADLESS_FORCE_SOFTWARE: "1"

jobs:
  # ── Fast fail ───────────────────────────────────────────────────────────────

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler (required by tze_hud_protocol build script)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: cargo check (workspace)
        run: cargo check --workspace

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler (required by tze_hud_protocol build script)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: cargo clippy (workspace, all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Windows-target clippy (cfg(windows) coverage) ──────────────────────────
  #
  # The `clippy` job above runs on ubuntu-latest, so it never compiles code
  # gated on #[cfg(target_os = "windows")] — that code is entirely invisible
  # to the Linux lint gate. hud-53s6m found a real clippy::io_other_error
  # regression in element_store.rs's Windows-only MoveFileExW path that this
  # gap let slip onto main undetected (PR #1042 fixed it).
  #
  # This job cross-compiles+lints just the crates that carry cfg(windows)
  # code, using the mingw-w64 cross toolchain (no linking/execution — clippy
  # only needs to typecheck). A workspace-wide `--workspace --target
  # x86_64-pc-windows-gnu` clippy run is NOT used here: several workspace
  # members pull in Linux-only GStreamer/media and windowing deps that do not
  # cross-compile, so this job is deliberately scoped to the four crates
  # confirmed (hud-fsfkx) to cross-compile clippy-clean:
  #   tze_hud_runtime, tze_hud_compositor, tze_hud_config, tze_hud_a11y
  #
  # If a fifth crate later grows cfg(windows) code, add it to the -p list
  # below (or drop it here with a comment if it doesn't cross-compile clean).

  clippy-windows-gnu:
    name: cargo clippy (windows-gnu cross-target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler + MinGW cross toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            mingw-w64
      - name: cargo clippy (windows-gnu, cfg(windows) crates, deny warnings)
        run: |
          cargo clippy \
            -p tze_hud_runtime \
            -p tze_hud_compositor \
            -p tze_hud_config \
            -p tze_hud_a11y \
            --target x86_64-pc-windows-gnu \
            -- -D warnings

  # ── Unit and crate-level tests ───────────────────────────────────────────────
  #
  # Runs all unit and crate tests across the workspace, excluding the
  # `integration` package, whose test targets run in their own jobs
  # (test-integration, test-trace, test-v1-thesis below) so failures are
  # attributable per-suite and the long soak target stays opt-in.
  # The vertical_slice tests require a software GPU (llvmpipe) — HEADLESS_FORCE_SOFTWARE=1
  # is set globally in env above.

  test-unit:
    name: cargo test (unit)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler
      - name: cargo test (workspace, exclude integration)
        run: |
          cargo test \
            --workspace \
            --all-targets \
            --exclude integration
        env:
          # Require a GPU adapter — Mesa llvmpipe is installed above.
          # If the adapter is missing the gpu_canary test fails loudly instead
          # of silently skipping ~129 compositor GPU tests (hud-2sxfk).
          TZE_HUD_REQUIRE_GPU: "1"

  # ── Integration: headless multi-crate suites ───────────────────────────────
  #
  # Runs the `integration` package's test targets that are fast and headless
  # (HeadlessRuntime + software GPU via HEADLESS_FORCE_SOFTWARE=1; no display
  # server required).
  #
  # Excluded targets (each with its own coverage):
  # - trace_regression — runs in the dedicated test-trace job below.
  # - v1_thesis        — runs in the dedicated test-v1-thesis job below.
  # - soak             — wall-clock-bound soak/leak suite. Even the default
  #   TZE_HUD_SOAK_SECS=10 run drives real-time multi-agent churn and is
  #   designed for 1h/6h dedicated runs; timing-sensitive on shared runners,
  #   so it stays opt-in (see tests/integration/Cargo.toml header).

  test-integration:
    name: cargo test (integration)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler
      - name: cargo test -p integration (headless suites)
        run: |
          cargo test \
            -p integration \
            --test multi_agent \
            --test presence_card_tile \
            --test disconnect_orphan \
            --test presence_card_coexistence \
            --test dashboard_tile_creation \
            --test dashboard_tile_input \
            --test dashboard_tile_lifecycle \
            --test subtitle_streaming \
            --test text_stream_portal_surface \
            --test text_stream_portal_adapter \
            --test text_stream_portal_coalescing \
            --test text_stream_portal_governance \
            --test text_stream_portal_markdown \
            --test text_stream_portal_composer \
            --test text_stream_portal_cadence \
            --test text_stream_portal_styling \
            --test drag_reposition \
            --test movable_elements_e2e

  windows-performance-budget:
    name: Windows performance budget
    runs-on: windows-latest
    needs: [check]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Ensure protobuf compiler is available
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command protoc -ErrorAction SilentlyContinue)) {
            choco install protoc -y --no-progress
          }
          protoc --version
      - name: Run headless benchmark artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path test_results/windows-performance-budget | Out-Null
          cargo run -p benchmark --features headless -- `
            --emit test_results/windows-performance-budget/benchmark.json `
            --frames 180
      - name: Enforce locked Windows budgets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/ci/check_windows_perf_budgets.py `
            --benchmark-json test_results/windows-performance-budget/benchmark.json `
            --output-json test_results/windows-performance-budget/budget-gate.json
      # ── Cross-run telemetry trend (informational; hud-kkx15, hud-bp3c3) ──────
      #
      # The gate above is a hard PASS/FAIL against the checked-in baseline; it
      # does not retain prior numeric values, so within-budget drift is
      # invisible. This step surfaces the numeric deltas.
      #
      # RETENTION/SCOPE POLICY (hud-bp3c3): the trend baseline is MAIN-PINNED,
      # not branch-scoped. Every run compares against the budget-gate summary
      # published as an artifact by the latest SUCCESSFUL `main` run. This gives
      # a stable baseline immune to per-branch cache divergence — a PR no longer
      # drifts against its own prior PR runs, and the headline "vs main" delta is
      # what a reviewer actually wants. The previous branch-scoped actions/cache
      # approach was replaced because it made each branch its own moving target.
      #
      # We fetch the main artifact with `gh run download` (cross-run, so plain
      # actions/download-artifact does not apply): pick the latest successful run
      # of this workflow on `main` and pull its `windows-perf-baseline-main`
      # artifact. On main pushes there may be no prior green main yet -> the
      # reporter handles the no-baseline case gracefully (prints a notice).
      - name: Download main-pinned Windows perf baseline
        id: perf-baseline
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path perf-baseline-main | Out-Null
          # Latest successful CI run on main (exclude this run if we ARE main).
          $runId = gh run list --workflow ci.yml --branch main --status success `
            --limit 1 --json databaseId --jq '.[0].databaseId' 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($runId)) {
            Write-Host "No successful main run found yet; no baseline to download."
          } else {
            Write-Host "Downloading perf baseline artifact from main run $runId"
            # Non-fatal: a green run may predate this artifact name.
            gh run download $runId `
              --name windows-perf-baseline-main `
              --dir perf-baseline-main 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Baseline artifact not present on run $runId; treating as no baseline."
            }
          }
          # Missing baseline is the expected bootstrap state, not a step failure.
          # GitHub's pwsh shell appends `exit $LASTEXITCODE`, so clear any
          # non-zero code left by the probing `gh` calls above.
          $global:LASTEXITCODE = 0
      - name: Report Windows perf trend deltas (vs main baseline)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $baseline = "perf-baseline-main/budget-gate.json"
          $baselineArg = @()
          if (Test-Path $baseline) { $baselineArg = @("--baseline", $baseline) }
          python scripts/ci/report_telemetry_trend.py `
            --current test_results/windows-performance-budget/budget-gate.json `
            @baselineArg
      # Publish this run's summary as the main-pinned baseline artifact. Only
      # main pushes update the baseline (branch/PR runs must not overwrite it),
      # and only when the run is green up to here — a failed gate must not become
      # the baseline future runs trend against.
      - name: Publish main-pinned Windows perf baseline
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: windows-perf-baseline-main
          path: test_results/windows-performance-budget/budget-gate.json
          if-no-files-found: error
          retention-days: 90
      - name: Upload Windows performance artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: windows-performance-budget
          path: test_results/windows-performance-budget/
          if-no-files-found: error

  # ── Integration: trace regression ──────────────────────────────────────────
  #
  # Runs the trace capture + replay integration tests.
  # These tests do NOT require a GPU (scene graph only; no compositor).
  # Other integration targets run in test-integration above.

  test-trace:
    name: cargo test (trace regression)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler (required by tze_hud_protocol build script)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: cargo test -p integration --test trace_regression
        run: |
          cargo test \
            -p integration \
            --test trace_regression

  # ── Integration: v1 thesis proof ───────────────────────────────────────────
  #
  # Runs the E12.6 v1 thesis proof — all 7 v1 success criteria aggregated
  # into a single capstone integration test.  Requires headless runtime
  # (software GPU via HEADLESS_FORCE_SOFTWARE=1).

  test-v1-thesis:
    name: cargo test (v1 thesis)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler
      - name: cargo test -p integration --test v1_thesis
        run: |
          cargo test \
            -p integration \
            --test v1_thesis \
            -- --nocapture

  # ── Example production config boot (vertical_slice) ────────────────────────
  #
  # Boots the runtime with the committed production config (config/production.toml)
  # and verifies startup succeeds.  This is the canonical sovereignty-by-mechanism
  # smoke test: if the committed config is malformed or governance is broken, this
  # fails.
  #
  # The test lives at examples/vertical_slice/tests/production_boot.rs and:
  # - Parses production.toml via HeadlessRuntime::new(config_toml: Some(...))
  # - Asserts the runtime starts without error
  # - Verifies that an unregistered agent receives guest policy (no capabilities)
  # - Does NOT use dev-mode: requires explicit config governance to pass

  production-boot-vertical-slice:
    name: vertical_slice production config boot
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler
      - name: cargo test -p vertical_slice --test production_boot
        run: |
          cargo test \
            -p vertical_slice \
            --test production_boot \
            -- --nocapture

  # ── Canonical app production config boot gate ───────────────────────────────
  #
  # Boots the runtime with the committed canonical app config:
  #   app/tze_hud_app/config/production.toml
  #
  # This gate must fail when startup silently falls back to default/headless
  # behavior. The backing test asserts config-declared widget instances/types and
  # profile-driven zone policy are present, not just that runtime construction
  # returns Ok.

  canonical-app-production-boot:
    name: canonical app production config boot gate
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler
      - name: cargo test -p tze_hud_app --test production_boot
        run: |
          cargo test \
            -p tze_hud_app \
            --test production_boot \
            -- --nocapture

  # ── Release artifact provenance smoke gate ─────────────────────────────────
  #
  # Builds the real Windows release artifact (`tze_hud.exe`) and publishes its
  # pipeline-generated SHA-256 checksum as a workflow artifact, then verifies the
  # downloaded artifact/checksum pair in a separate job. This is intentionally
  # distinct from canonical-app-production-boot: production boot validates the
  # committed config can construct the runtime; this gate validates release
  # artifact integrity and the provenance round-trip required by
  # openspec/changes/release-provenance.

  release-artifact-provenance-build:
    name: release artifact provenance build
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler + MinGW cross toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            mingw-w64
      - name: Build and stage release artifact + checksum
        run: |
          set -euo pipefail
          ARTIFACT_DIR="test_results/release-provenance"
          EXE_PATH="$(scripts/build_windows_app.sh \
            --target x86_64-pc-windows-gnu \
            --profile release \
            --skip-toolchain)"
          mkdir -p "$ARTIFACT_DIR"
          cp -f "$EXE_PATH" "$ARTIFACT_DIR/tze_hud.exe"
          (
            cd "$ARTIFACT_DIR"
            sha256sum tze_hud.exe > tze_hud.exe.sha256
          )
          bash scripts/ci/release_artifact_provenance_smoke.sh --artifact-dir "$ARTIFACT_DIR"
      - name: Publish release artifact + checksum for smoke round-trip
        uses: actions/upload-artifact@v6
        with:
          name: release-provenance-tze_hud-windows-gnu
          path: |
            test_results/release-provenance/tze_hud.exe
            test_results/release-provenance/tze_hud.exe.sha256
          if-no-files-found: error

  release-artifact-provenance-smoke:
    name: release artifact provenance smoke
    runs-on: ubuntu-latest
    needs: [release-artifact-provenance-build]
    steps:
      - uses: actions/checkout@v5
      - name: Run release provenance verifier unit tests
        run: python3 scripts/ci/test_release_artifact_provenance_smoke.py
      - name: Download published release artifact + checksum
        uses: actions/download-artifact@v6
        with:
          name: release-provenance-tze_hud-windows-gnu
          path: test_results/release-provenance-roundtrip
      - name: Verify downloaded artifact/checksum round-trip
        run: |
          bash scripts/ci/release_artifact_provenance_smoke.sh \
            --artifact-dir test_results/release-provenance-roundtrip

  # ── Vocabulary lint ─────────────────────────────────────────────────────────
  #
  # Runs scripts/check_canonical_vocabulary.sh — fails if any stale pre-Round-14
  # capability names are found outside the explicitly exempted files.
  # This is a pure text search, no compilation required.

  vocabulary-lint:
    name: vocabulary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check canonical vocabulary
        run: bash scripts/check_canonical_vocabulary.sh --verbose

  # ── User-test Python suite ──────────────────────────────────────────────────
  #
  # Runs the pure-Python unit tests under .claude/skills/user-test/{tests,scripts}/.
  # These hold the Rust<->Python token/geometry drift-guards (e.g.
  # test_text_stream_portal_exemplar.py::PortalTokenResolutionTests::
  # test_python_defaults_mirror_rust_defaults) for the exemplar scripts that
  # mirror crates/tze_hud_config/src/portal_tokens.rs. Previously this suite
  # only ran interactively via the user-test skill, so the same-day hud-yu20f
  # SPACING_HEADER_HEIGHT_PX 28->52 drift went undetected until a worker
  # tripped over it (hud-43z24).
  #
  # Scope is limited to files verified hermetic by reading + running locally:
  # no GPU, no Windows, no live HUD runtime, no external network.
  #   - tests/test_text_stream_portal_exemplar.py (94 tests — primary drift-guard target)
  #   - tests/test_presence_card_exemplar.py
  #   - tests/test_windows_media_ingress_exemplar.py (binds an ephemeral
  #     127.0.0.1 port for local HTTP-server tests — loopback only)
  #   - tests/test_windows_media_resource_sampler.py (pure stdlib: builds
  #     PowerShell/ssh command strings, never executes them)
  #   - scripts/test_hud_grpc_client.py (needs the packages installed below;
  #     without the `blake3` package it falls back to compiling a tiny cargo
  #     helper on the fly — a hidden crates.io network dependency — so
  #     installing the `blake3` wheel here keeps this job fully pip-hermetic)
  #
  # Excluded: scripts/stress_test_zones.py, publish_widget_batch.py,
  # publish_zone_batch.py and the other *_exemplar.py scripts under scripts/ —
  # these are live-HUD-runtime CLI tools (gRPC session against a running
  # resident), not unit-test suites, and have no test_*.py counterpart here.

  user-test-python-suite:
    name: user-test python suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test dependencies
        run: |
          pip install --quiet \
            "grpcio>=1.80.0" \
            "protobuf>=6.31.1" \
            "pillow>=11.0.0" \
            "blake3>=1.0.0" \
            "pytest>=8.0.0"
      - name: Run pure-Python user-test suite
        run: |
          python3 -m pytest \
            .claude/skills/user-test/tests/ \
            .claude/skills/user-test/scripts/test_hud_grpc_client.py \
            -q

  # ── Dev-mode guard ──────────────────────────────────────────────────────────
  #
  # Verifies that the `dev-mode` feature is NOT accidentally compiled into a
  # release binary.  In a release build of `tze_hud_app` (no features flag),
  # `HeadlessConfig { config_toml: None }` must return Err, not Ok.
  #
  # The guard works by:
  # 1. Building the release binary of `tze_hud_app` without --features dev-mode.
  # 2. Asserting the build output does NOT contain the dev-mode gate string
  #    "fallback_unrestricted = true" compiled in (checked via a test assertion
  #    in the build).
  #
  # Additionally: a dedicated unit test `dev_mode_not_active_in_release` in
  # tze_hud_runtime guards the cfg() gate at the Rust level.  It is compiled
  # only when NOT in test/dev-mode, and asserts that `HeadlessConfig::default()`
  # does NOT compile (the impl is absent).  This is validated by `test-unit`.
  #
  # The release build check here is the belt-and-suspenders CI gate.

  dev-mode-guard:
    name: dev-mode guard (release build)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler (required by tze_hud_protocol build script)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      - name: Build workspace release (no dev-mode feature)
        run: |
          cargo build --workspace --release 2>&1 | tee /tmp/release-build.log
          echo "--- Checking for dev-mode leakage ---"
          # Verify that the tze_hud_runtime crate did NOT compile with the
          # dev-mode feature by checking that there is no dev-mode feature
          # in the resolved Cargo metadata for the release profile.
          cargo metadata --format-version 1 --no-deps 2>/dev/null \
            | python3 -c "
          import json, sys
          meta = json.load(sys.stdin)
          for pkg in meta['packages']:
              if pkg['name'] == 'tze_hud_runtime':
                  features = pkg.get('features', {})
                  # dev-mode must exist as a feature but must NOT be in
                  # the default feature set.
                  default_features = features.get('default', [])
                  if 'dev-mode' in default_features:
                      print('FAIL: dev-mode is in default features of tze_hud_runtime')
                      sys.exit(1)
                  print('PASS: dev-mode is not in default features of tze_hud_runtime')
                  sys.exit(0)
          print('WARN: tze_hud_runtime package not found in metadata')
          sys.exit(0)
          "
      - name: Verify dev-mode is not a default feature in vertical_slice
        run: |
          cargo metadata --format-version 1 --no-deps 2>/dev/null \
            | python3 -c "
          import json, sys
          meta = json.load(sys.stdin)
          fail = False
          for pkg in meta['packages']:
              if pkg['name'] in ('tze_hud_runtime', 'vertical_slice', 'integration'):
                  features = pkg.get('features', {})
                  default_features = features.get('default', [])
                  if 'dev-mode' in default_features:
                      print(f'FAIL: dev-mode is in default features of {pkg[\"name\"]}')
                      fail = True
                  else:
                      print(f'PASS: dev-mode is not in default features of {pkg[\"name\"]}')
          sys.exit(1 if fail else 0)
          "

  # ── Dependency security + license audit (cargo-deny) ──────────────────────
  #
  # Runs cargo-deny to check:
  #   - advisories: known CVEs and unmaintained crates (RUSTSEC database)
  #   - licenses: all dependencies must be GPL-3.0 compatible per deny.toml
  #
  # This job does NOT require compilation — cargo-deny reads Cargo.lock and
  # crate metadata only.  It runs against the same Rust toolchain as the rest
  # of CI so that workspace metadata resolution is consistent.
  #
  # Advisory waivers and license allowances are documented with rationale in
  # deny.toml at the repository root.  See hud-1aswu.5 for context.
  #
  # Uses EmbarkStudios/cargo-deny-action for a stable, versioned install.
  # Pinned to a specific SHA to prevent supply-chain attacks on CI.

  cargo-deny:
    name: cargo deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: cargo deny check advisories + licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Check only the two gates relevant to security and license compliance.
          # bans and sources are checked implicitly; explicitly scoping prevents
          # new deny.toml sections from accidentally blocking CI before they are
          # tuned.
          command: check advisories licenses bans sources
          # Log level: warn surfaces yanked-crate and duplicate-version notices
          # without failing the job.
          log-level: warn

  # ── Windowed / GPU smoke (gated) ────────────────────────────────────────────
  #
  # GATED: This job is manually triggered or runs in environments with Vulkan
  # hardware (not standard GitHub-hosted runners).
  #
  # Runs the pixel readback integration tests that validate the full GPU
  # compositing pipeline (Layer 1 colour assertions).  These require either:
  # - A real GPU (hardware CI runner), or
  # - Mesa llvmpipe (software Vulkan, available on Linux)
  #
  # On GitHub-hosted runners, llvmpipe is available via mesa-vulkan-drivers
  # but performance is much slower.  Pixel assertions use a wider tolerance
  # in CI (configured via the LLVMPIPE_CI env var in the test harness).
  #
  # To run locally:
  #   cargo test -p tze_hud_runtime --test pixel_readback --features headless,dev-mode
  #
  # This job is INFORMATIONAL only on PRs and does not block merge.
  # Enable blocking by changing `continue-on-error: true` to `false` once
  # llvmpipe stability is confirmed across all runner image versions.

  # ── v2_preview feature lane ─────────────────────────────────────────────────
  #
  # Builds and tests code gated on the `v2_preview` feature flag.
  #
  # Without this lane, the hand-written statig state machines in
  # `tze_hud_compositor::video_surface` and the `tze_hud_runtime` media-ingress
  # admission gate are NEVER compiled by CI.  A visibility bug like E0446 (caught
  # only in PR #795 review) could ship a broken gated build undetected.
  #
  # Scope:
  #   - cargo check: full workspace with v2_preview activated on the two crates
  #     that declare the feature (tze_hud_compositor, tze_hud_runtime).
  #   - cargo clippy: same per-crate activation, -D warnings.
  #   - cargo test: module-scoped to avoid the GPU readback tests that deadlock
  #     on headless runners (see test-gpu-pixel-readback comment below).
  #
  # Test filters:
  #   `video_surface::` — 17 pure unit tests in tze_hud_compositor::video_surface
  #   `media_ingress::` — 61 pure unit tests in tze_hud_runtime::media_ingress
  #
  # Excluded (GPU required, tracked separately):
  #   `headless::tests::synthetic_media_surface` — 2 tokio tests exercising
  #       HeadlessRuntime.publish_synthetic_media_surface require a GPU adapter
  #       (HeadlessRuntime::new() calls wgpu::Instance::request_adapter); they
  #       are NOT available on ubuntu-latest without Mesa/llvmpipe.
  #       Tracked by bead hud-ckvd6 for a dedicated GPU runner lane.
  #
  # No GPU or Mesa required: all selected tests are pure Rust logic.

  v2-preview:
    name: v2_preview feature lane (check + clippy + tests)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install protobuf compiler (required by tze_hud_protocol build script)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      # Check: verify the entire workspace compiles with v2_preview active on the
      # two crates that declare the feature.  Catches visibility bugs (E0446) and
      # missing impls that only appear under the feature flag.
      - name: cargo check --workspace (v2_preview)
        run: |
          cargo check \
            --workspace \
            --features tze_hud_compositor/v2_preview,tze_hud_runtime/v2_preview
      # Clippy: lint the gated crates individually so --features is unambiguous.
      - name: cargo clippy -p tze_hud_compositor (v2_preview, deny warnings)
        run: |
          cargo clippy \
            -p tze_hud_compositor \
            --features v2_preview \
            -- -D warnings
      - name: cargo clippy -p tze_hud_runtime (v2_preview, deny warnings)
        run: |
          cargo clippy \
            -p tze_hud_runtime \
            --features v2_preview \
            -- -D warnings
      # Tests: module-scoped to the gated code only.
      # The `video_surface::` filter (double-colon) scopes to the module, not just
      # any test whose name contains "video_surface" — this avoids the renderer GPU
      # readback tests (renderer::tests::test_*video_surface*) that require llvmpipe
      # and call render_frame_headless before the markdown cache is primed.
      - name: cargo test -p tze_hud_compositor video_surface module (v2_preview)
        run: |
          cargo test \
            -p tze_hud_compositor \
            --features v2_preview \
            -- 'video_surface::'
      - name: cargo test -p tze_hud_runtime media_ingress module (v2_preview)
        run: |
          cargo test \
            -p tze_hud_runtime \
            --features v2_preview \
            -- 'media_ingress::'
      # headless::tests::synthetic_media_surface is intentionally excluded here.
      # Those 2 tokio tests call HeadlessRuntime::new() which requires a GPU
      # adapter (wgpu::Instance::request_adapter); HEADLESS_FORCE_SOFTWARE=1 is
      # insufficient on ubuntu-latest without Mesa/llvmpipe.  They belong in a
      # dedicated GPU runner lane.  Tracked by bead hud-ckvd6.

  test-gpu-pixel-readback:
    name: pixel readback (GPU / llvmpipe, informational)
    runs-on: ubuntu-latest
    needs: [test-unit]
    continue-on-error: true  # GATED: does not block merge; see comment above
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      # timeout-minutes caps cache-save hangs (incident: PR #606, canonical-app-production-boot
      # hung 15+ min in the Swatinem/rust-cache post-step, required --admin merge).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + Vulkan loader + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            vulkan-tools \
            protobuf-compiler
      - name: Verify Vulkan adapter available
        run: vulkaninfo --summary 2>&1 | head -30 || true
      - name: cargo test pixel_readback (software GPU)
        run: |
          cargo test \
            -p tze_hud_runtime \
            --test pixel_readback \
            --features headless,dev-mode \
            -- --nocapture
        env:
          HEADLESS_FORCE_SOFTWARE: "1"
          LLVMPIPE_CI: "1"
          # Canary: fail loudly if the adapter is missing instead of silently
          # skipping GPU tests (hud-2sxfk).
          TZE_HUD_REQUIRE_GPU: "1"
