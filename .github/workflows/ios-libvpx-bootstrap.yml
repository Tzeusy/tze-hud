# .github/workflows/ios-libvpx-bootstrap.yml
# Pre-phase-3 validation: libvpx static library cross-compile gate for iOS.
#
# This workflow validates the build chain required before the phase 3 iOS
# VP9 software decode lane (D19 — iPhone aarch64-apple-ios) can open:
#
#   Gate 1 — Xcode + iOS SDK present on the runner
#   Gate 2 — libvpx v1.15.1 source clones successfully
#   Gate 3 — libvpx configure succeeds for arm64-darwin-gcc (real device)
#   Gate 4 — libvpx make produces libvpx.a
#   Gate 5 — cargo check -p tze_hud_media_apple with LIBVPX_IOS_LIB_DIR set
#
# Gating policy: manual dispatch + PRs touching the iOS media crate or
# the workflow file itself.  Does NOT run on every push — Xcode runners
# are expensive and the libvpx build takes ~2 minutes.
#
# References:
#   docs/audits/ios-videotoolbox-alternative-audit.md — §5 VP9 strategy
#   crates/tze_hud_media_apple/build.rs               — build script (hud-n9qhl)
#   .github/workflows/ci.yml                           — main CI conventions
#   .github/workflows/android-bootstrap.yml            — Android parallel pattern

name: iOS libvpx Bootstrap

on:
  workflow_dispatch:
    inputs:
      libvpx_version:
        description: "libvpx version tag (e.g. v1.15.1)"
        required: true
        default: "v1.15.1"
  pull_request:
    paths:
      - "crates/tze_hud_media_apple/**"
      - ".github/workflows/ios-libvpx-bootstrap.yml"

env:
  # Pin matches the version in build.rs. Update both together via PR.
  LIBVPX_VERSION: ${{ github.event.inputs.libvpx_version || 'v1.15.1' }}
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ios-libvpx-bootstrap:
    name: iOS libvpx cross-compile gate
    # macos-14 is the GitHub-hosted Apple Silicon runner (M1), which provides
    # Xcode 16.x and the iOS 18.x SDK — required for aarch64-apple-ios.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (MSRV 1.88)
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ios-libvpx-${{ env.LIBVPX_VERSION }}

      # Gate 1 — Verify Xcode and iOS SDK are present.
      - name: Gate 1 — Verify Xcode + iOS SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-path
          echo "GATE 1 PASS: Xcode and iOS SDK present"

      # Gate 2 — Clone libvpx at the pinned version.
      - name: Cache libvpx source
        id: cache-libvpx-src
        uses: actions/cache@v4
        with:
          path: /tmp/libvpx-src
          key: libvpx-src-${{ env.LIBVPX_VERSION }}

      - name: Gate 2 — Clone libvpx source
        if: steps.cache-libvpx-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "${LIBVPX_VERSION}" \
            https://github.com/webmproject/libvpx.git \
            /tmp/libvpx-src
          echo "GATE 2 PASS: libvpx ${LIBVPX_VERSION} cloned"

      - name: Gate 2 (cache hit) — Verify libvpx source
        if: steps.cache-libvpx-src.outputs.cache-hit == 'true'
        run: |
          test -f /tmp/libvpx-src/configure
          echo "GATE 2 PASS: libvpx source from cache, configure present"

      # Gate 3 — Configure libvpx for aarch64-apple-ios (real device).
      - name: Cache libvpx built library
        id: cache-libvpx-lib
        uses: actions/cache@v4
        with:
          path: /tmp/libvpx-install
          key: libvpx-lib-aarch64-apple-ios-${{ env.LIBVPX_VERSION }}

      - name: Gate 3 — Configure libvpx for arm64-darwin-gcc
        if: steps.cache-libvpx-lib.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/libvpx-build
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          /tmp/libvpx-src/configure \
            --target=arm64-darwin-gcc \
            --prefix=/tmp/libvpx-install \
            --enable-vp9 \
            --disable-vp8 \
            --disable-vp9-encoder \
            --enable-pic \
            --disable-examples \
            --disable-unit-tests \
            --disable-docs \
            --disable-runtime-cpu-detect \
            --enable-neon \
            --disable-libyuv \
            --sdk-path="${SDK_PATH}"
          echo "GATE 3 PASS: libvpx configured for arm64-darwin-gcc"
        working-directory: /tmp/libvpx-build

      # Gate 4 — Build libvpx and verify libvpx.a is produced.
      - name: Gate 4 — Build libvpx
        if: steps.cache-libvpx-lib.outputs.cache-hit != 'true'
        run: |
          make -j$(sysctl -n hw.logicalcpu)
          make install
          ls -lh /tmp/libvpx-install/lib/libvpx.a
          echo "GATE 4 PASS: libvpx.a produced at /tmp/libvpx-install/lib/libvpx.a"
        working-directory: /tmp/libvpx-build

      - name: Gate 4 (cache hit) — Verify cached libvpx.a
        if: steps.cache-libvpx-lib.outputs.cache-hit == 'true'
        run: |
          ls -lh /tmp/libvpx-install/lib/libvpx.a
          echo "GATE 4 PASS: libvpx.a from cache"

      # Gate 5 — cargo check -p tze_hud_media_apple targeting iOS, with
      # LIBVPX_IOS_LIB_DIR pointing to the freshly built (or cached) library.
      # This validates that:
      #   a) the build.rs fast-path (LIBVPX_IOS_LIB_DIR set) triggers correctly
      #   b) the workspace compiles for aarch64-apple-ios with the lib linked
      - name: Gate 5 — cargo check -p tze_hud_media_apple (aarch64-apple-ios)
        env:
          LIBVPX_IOS_LIB_DIR: /tmp/libvpx-install/lib
        run: |
          cargo check -p tze_hud_media_apple \
            --target aarch64-apple-ios
          echo "GATE 5 PASS: tze_hud_media_apple checks clean for aarch64-apple-ios"

      - name: Summary
        run: |
          echo "### iOS libvpx Bootstrap — All Gates PASS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Description | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Xcode + iOS SDK present | PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | libvpx ${LIBVPX_VERSION} source | PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | configure arm64-darwin-gcc | PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | make + libvpx.a produced | PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | cargo check (LIBVPX_IOS_LIB_DIR fast path) | PASS |" >> $GITHUB_STEP_SUMMARY
