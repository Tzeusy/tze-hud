# tze_hud — Performance-assert CI lane (hud-94vm5)
#
# Runs calibrated wall-clock / p99 latency assertions that are intentionally
# EXCLUDED from the blocking `test-unit` lane (ci.yml) because they are
# sensitive to scheduler noise on shared GitHub runners.
#
# Trigger policy
# ──────────────
# This workflow runs on a schedule (weekly, Monday 02:00 UTC) and on any pull
# request that carries the `perf-assert` label.  It is NEVER on the blocking
# PR lane — a failure here does NOT prevent merge.
#
# How it works
# ────────────
# Sets `TZE_HUD_PERF_ASSERT=1` so that every `if perf_assert_enabled()` guard
# in the test suite becomes active.  On a reference host these pass; on shared
# runners they may flake (that is expected and acceptable).
#
# Artifact policy (craft-and-care: "track trends not just pass/fail")
# ──────────────────────────────────────────────────────────────────────
# p99 JSON results are uploaded unconditionally (`if: always()`) so trend data
# is preserved even on runs that fail.  The artifact contains one JSON file per
# test target with raw latency samples emitted by the test harness.
#
# To run locally:
#   TZE_HUD_PERF_ASSERT=1 cargo test --workspace --all-targets --exclude integration
#   TZE_HUD_PERF_ASSERT=1 cargo test -p integration --test dashboard_tile_input
#   TZE_HUD_PERF_ASSERT=1 cargo test -p integration --test text_stream_portal_cadence
#   TZE_HUD_PERF_ASSERT=1 cargo test -p vertical_slice --test budget_assertions

name: Performance Assert

on:
  # Weekly scheduled run on a reference-class host.
  schedule:
    - cron: "0 2 * * 1"  # Monday 02:00 UTC

  # Label-gated: add `perf-assert` label to a PR to trigger this lane.
  pull_request:
    types: [labeled]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Activate all calibrated wall-clock / p99 assertions.
  TZE_HUD_PERF_ASSERT: "1"
  # Force software GPU (llvmpipe on Linux) for headless rendering.
  HEADLESS_FORCE_SOFTWARE: "1"

jobs:
  # ── Label gate ────────────────────────────────────────────────────────────────
  #
  # For label-triggered runs, check that the triggering event matches.
  # Scheduled runs always proceed.

  # ── Workspace unit + crate perf asserts ──────────────────────────────────────
  #
  # Runs all workspace tests (excluding integration package) with
  # TZE_HUD_PERF_ASSERT=1 so calibrated timing assertions are active.
  # Covers:
  #   - crates/tze_hud_scene/src/calibration.rs  (test_calibration_completes_under_500ms)
  #   - crates/tze_hud_scene/src/lease/budget.rs (test_budget_check_latency_under_50us)
  #   - crates/tze_hud_runtime/src/pipeline.rs   (test_check_latency_*)
  #   - crates/tze_hud_compositor/src/markdown.rs (adversarial_*_flood_completes_fast)

  perf-assert-unit:
    name: Perf assert (workspace unit tests)
    # Only run on schedule, or on PRs carrying the `perf-assert` label.
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'perf-assert')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler

      - name: cargo test (workspace unit, TZE_HUD_PERF_ASSERT=1)
        run: |
          cargo test \
            --workspace \
            --all-targets \
            --exclude integration \
            -- --nocapture 2>&1 | tee /tmp/perf-assert-unit.log

      - name: Collect p99 JSON trend artifacts
        # Emit raw p99 data even if the test step fails so trend history is preserved.
        if: always()
        run: |
          mkdir -p test_results/perf-assert
          # Extract SKIP-TIMING / PASS lines emitted by perf_assert_enabled() guards.
          grep -E '^\[(SKIP-TIMING|PASS|UNCALIBRATED)\]' /tmp/perf-assert-unit.log \
            > test_results/perf-assert/unit-p99-summary.txt || true
          python3 - <<'EOF'
          import json, re, pathlib

          log = pathlib.Path("/tmp/perf-assert-unit.log").read_text(errors="replace")
          entries = []
          for line in log.splitlines():
              m = re.match(r'\[(PASS|SKIP-TIMING|UNCALIBRATED)\]\s+(\S+)\s+p99=(\d+)', line)
              if m:
                  entries.append({
                      "status": m.group(1),
                      "metric": m.group(2),
                      "p99_us": int(m.group(3)),
                  })
          out = pathlib.Path("test_results/perf-assert/unit-p99.json")
          out.write_text(json.dumps({"entries": entries}, indent=2))
          print(f"Captured {len(entries)} p99 entries -> {out}")
          EOF

      - name: Upload p99 trend artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: perf-assert-unit-p99
          path: test_results/perf-assert/
          if-no-files-found: warn

  # ── Integration perf asserts ─────────────────────────────────────────────────
  #
  # Runs integration test targets that contain gated wall-clock asserts:
  #   - tests/integration/dashboard_tile_input.rs   (pressed_state_set_within_4ms_p99)
  #   - tests/integration/text_stream_portal_cadence.rs (frame/stage budget assertions)

  perf-assert-integration:
    name: Perf assert (integration tests)
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'perf-assert')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler

      - name: cargo test -p integration (perf-assert targets, TZE_HUD_PERF_ASSERT=1)
        run: |
          cargo test \
            -p integration \
            --test dashboard_tile_input \
            --test text_stream_portal_cadence \
            -- --nocapture 2>&1 | tee /tmp/perf-assert-integration.log

      - name: Collect p99 JSON trend artifacts
        if: always()
        run: |
          mkdir -p test_results/perf-assert
          python3 - <<'EOF'
          import json, re, pathlib

          log = pathlib.Path("/tmp/perf-assert-integration.log").read_text(errors="replace")
          entries = []
          for line in log.splitlines():
              m = re.match(r'\[(PASS|SKIP-TIMING|UNCALIBRATED)\]\s+(\S+)\s+p99=(\d+)', line)
              if m:
                  entries.append({
                      "status": m.group(1),
                      "metric": m.group(2),
                      "p99_us": int(m.group(3)),
                  })
          out = pathlib.Path("test_results/perf-assert/integration-p99.json")
          out.write_text(json.dumps({"entries": entries}, indent=2))
          print(f"Captured {len(entries)} p99 entries -> {out}")
          EOF

      - name: Upload p99 trend artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: perf-assert-integration-p99
          path: test_results/perf-assert/
          if-no-files-found: warn

  # ── Vertical slice budget assertions ─────────────────────────────────────────
  #
  # Runs examples/vertical_slice/tests/budget_assertions.rs with
  # TZE_HUD_PERF_ASSERT=1.  These are the primary hit-test (<100µs),
  # transaction-validation (<200µs), and scene-diff (<500µs) micro-budgets.

  perf-assert-budget:
    name: Perf assert (vertical_slice budget_assertions)
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'perf-assert')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2.9.1
        timeout-minutes: 10
      - name: Install Mesa / llvmpipe + protobuf compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            protobuf-compiler

      - name: cargo test -p vertical_slice budget_assertions (TZE_HUD_PERF_ASSERT=1)
        run: |
          cargo test \
            -p vertical_slice \
            --test budget_assertions \
            -- --nocapture 2>&1 | tee /tmp/perf-assert-budget.log

      - name: Collect p99 JSON trend artifacts
        if: always()
        run: |
          mkdir -p test_results/perf-assert
          python3 - <<'EOF'
          import json, re, pathlib

          log = pathlib.Path("/tmp/perf-assert-budget.log").read_text(errors="replace")
          entries = []
          for line in log.splitlines():
              # Match PASS lines: "[PASS] metric p99=NNNus within budget=MMMus ..."
              m_pass = re.match(
                  r'\[PASS\]\s+(\S+)\s+p99=(\d+)us\s+within.*?budget=(\d+)us',
                  line,
              )
              if m_pass:
                  entries.append({
                      "status": "PASS",
                      "metric": m_pass.group(1),
                      "p99_us": int(m_pass.group(2)),
                      "budget_us": int(m_pass.group(3)),
                  })
                  continue
              # Match SKIP-TIMING lines: "[SKIP-TIMING] metric raw_p99=NNNus; ..."
              m_skip = re.match(r'\[SKIP-TIMING\]\s+(\S+)\s+raw_p99=(\d+)us', line)
              if m_skip:
                  entries.append({
                      "status": "SKIP-TIMING",
                      "metric": m_skip.group(1),
                      "p99_us": int(m_skip.group(2)),
                  })
                  continue
              # Match UNCALIBRATED lines: "[UNCALIBRATED] metric raw_p99=NNNus; ..."
              m_uncal = re.match(r'\[UNCALIBRATED\]\s+(\S+)\s+raw_p99=(\d+)us', line)
              if m_uncal:
                  entries.append({
                      "status": "UNCALIBRATED",
                      "metric": m_uncal.group(1),
                      "p99_us": int(m_uncal.group(2)),
                  })

          out = pathlib.Path("test_results/perf-assert/budget-p99.json")
          out.write_text(json.dumps({"entries": entries}, indent=2))
          print(f"Captured {len(entries)} p99 entries -> {out}")
          EOF

      - name: Upload p99 trend artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: perf-assert-budget-p99
          path: test_results/perf-assert/
          if-no-files-found: warn
