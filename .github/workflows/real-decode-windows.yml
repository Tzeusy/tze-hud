# .github/workflows/real-decode-windows.yml
# Windows D18 real-decode lane — RTX 3080 self-hosted GPU runner
#
# This workflow runs GStreamer-backed real-decode validation on the tzehouse-windows
# box (D18: NVIDIA GeForce RTX 3080, driver 595.97, CUDA 13.2) at parrot-hen.ts.net.
#
# ACTIVATION PREREQUISITES (all must be met before this workflow produces real results):
#   1. GStreamer 1.24.12 MSVC SDK installed on D18 runner (one-time; see runbook §3)
#   2. System-level env vars set on D18 (GSTREAMER_1_0_ROOT_MSVC_X86_64, PKG_CONFIG_PATH, PATH)
#   3. GitHub Actions self-hosted runner registered with labels [self-hosted, windows, gpu]
#   4. Repo label 'run-real-decode' created in GitHub (for label-gated PR runs)
#   5. Smoke-test: `cargo check -p tze_hud_compositor` passes from D18 runner
#
# DUAL-USE SCHEDULING POLICY (implemented — hud-0mo6n):
#   The tzehouse-windows box is also used for /user-test interactive overlay sessions.
#   Nightly real-decode jobs MUST NOT race interactive HUD sessions.
#
#   Policy: file-based GPU lock at %PROGRAMDATA%\tze_hud\gpu.lock.
#     - The pre-job "Check GPU lock" step below reads the lock file.
#     - If a live interactive session holds the lock, the job is skipped (exit 0 + warning).
#     - If the lock is stale (holding PID is dead), it is removed and the job proceeds.
#     - A final always-run "Release GPU lock" step cleans up after the job.
#
#   The nightly trigger is still set to 02:00 SGT (18:00 UTC) as defence-in-depth.
#   Design doc: docs/design/tzehouse-windows-gpu-scheduling.md
#   Runbook:    docs/ci/windows-d18-runner-setup.md §7
#
# GLASS-TO-GLASS LATENCY CAPTURE:
#   The D18 p50<=150ms / p99<=400ms glass-to-glass latency harness is tracked in
#   hud-ora8.1.28 and is NOT in scope for this workflow. Real-decode validation here
#   covers decode pipeline correctness, NOT external capture rig measurements.
#
# References:
#   docs/ci/windows-d18-runner-setup.md        — D18 runner setup runbook (hud-ora8.1.20)
#   docs/audits/gstreamer-windows-ci-bootstrap.md — GStreamer Windows CI audit (§4.1/§5)
#   .github/workflows/ci.yml                   — main CI conventions
#   Bead: hud-ora8.1.20

name: Windows D18 Real-Decode

on:
  # Manual dispatch — safe fallback; always available regardless of activation state.
  workflow_dispatch:
    inputs:
      gst_version:
        description: "GStreamer version on the D18 runner (informational; must match installed SDK)"
        required: false
        default: "1.24.12"
      decode_target:
        description: "Decode target: 'all', 'h264', 'vp9', or 'smoke'"
        required: false
        default: "smoke"

  # Label-gated PR trigger: add 'run-real-decode' label to a PR to request D18 validation.
  # This avoids running the self-hosted GPU runner on every PR — D18 is dual-use.
  pull_request:
    types: [labeled]

  # Nightly gate: 02:00 SGT = 18:00 UTC.
  # Chosen as defence-in-depth to reduce overlap with interactive /user-test sessions
  # (typically daytime SGT). The pre-job GPU lock check is the primary mutual-exclusion
  # mechanism; the time window is secondary. See docs/design/tzehouse-windows-gpu-scheduling.md.
  schedule:
    - cron: "0 18 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Do NOT set HEADLESS_FORCE_SOFTWARE here — the D18 runner has a real RTX 3080.
  # The GStreamer D3D11 and NVDEC paths require hardware GPU access.

jobs:
  # ── D18 real-decode validation ───────────────────────────────────────────────
  real-decode-windows:
    name: Real-decode (${{ github.event.inputs.decode_target || 'smoke' }}) — D18 RTX 3080
    # Self-hosted Windows runner on tzehouse-windows (parrot-hen.ts.net).
    # Labels: [self-hosted, windows, gpu]
    # GStreamer 1.24.12 MSVC SDK is pre-installed — no per-run download needed.
    # See docs/ci/windows-d18-runner-setup.md for provisioning.
    runs-on: [self-hosted, windows, gpu]

    # Trigger conditions:
    #   - workflow_dispatch: always run (manual override)
    #   - schedule (nightly): always run
    #   - pull_request labeled: only run when the label is 'run-real-decode'
    #
    # The label guard uses github.event.label.name which is only set for
    # pull_request[labeled] events; it is empty string for other event types,
    # so the condition correctly allows dispatch and schedule through.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-real-decode')

    # Track whether we acquired the GPU lock so the release step knows what to do.
    # Set in the "Check GPU lock" step; read in "Release GPU lock".
    env:
      GPU_LOCK_ACQUIRED: "false"

    steps:
      # ── GPU lock check (must be FIRST — before any GPU work) ───────────────
      # Checks %PROGRAMDATA%\tze_hud\gpu.lock for a live interactive session.
      # If a live session is found, the job is skipped (exit 0 + warning annotation).
      # If the lock is stale (PID dead), it is removed and we proceed.
      # Policy: docs/design/tzehouse-windows-gpu-scheduling.md
      - name: Check GPU lock
        id: gpu-lock-check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $LockDir  = "C:\ProgramData\tze_hud"
          $LockFile = "$LockDir\gpu.lock"
          $TmpFile  = "$LockDir\gpu.lock.tmp"
          $MyPid    = $PID

          function Write-LockLog([string]$msg) { Write-Host "[gpu-lock] $msg" }

          # Ensure the lock directory exists
          if (-not (Test-Path $LockDir)) {
            Write-LockLog "Creating lock directory: $LockDir"
            New-Item -ItemType Directory -Force -Path $LockDir | Out-Null
          }

          Write-LockLog "Checking $LockFile ..."

          if (Test-Path $LockFile) {
            $lines = @{}
            try {
              Get-Content $LockFile | ForEach-Object {
                $parts = $_ -split "=", 2
                if ($parts.Count -eq 2) { $lines[$parts[0].Trim()] = $parts[1].Trim() }
              }
            } catch {
              Write-LockLog "WARNING: Lock file unreadable. Treating as absent."
              Remove-Item -Force $LockFile -ErrorAction SilentlyContinue
              $lines = @{}
            }

            if ($lines.Count -gt 0) {
              $lockPid  = [int]($lines["PID"] ?? 0)
              $lockType = $lines["SESSION_TYPE"] ?? "unknown"
              $lockDesc = $lines["DESCRIPTION"] ?? ""
              $lockTime = $lines["STARTED_AT"] ?? "unknown"

              Write-LockLog "Found lock: SESSION_TYPE=$lockType PID=$lockPid STARTED_AT=$lockTime"
              if ($lockDesc) { Write-LockLog "Description: $lockDesc" }

              if ($lockPid -gt 0) {
                $proc = Get-Process -Id $lockPid -ErrorAction SilentlyContinue
                if ($proc) {
                  # Live interactive session — skip this job
                  Write-LockLog "Process $lockPid is alive ($($proc.ProcessName)). GPU is in use."
                  Write-LockLog "Skipping nightly real-decode job."
                  Write-LockLog "Re-run manually when the interactive session is complete."
                  Write-Host "::warning:: GPU lock held by $lockType session (PID=$lockPid, started=$lockTime). Nightly real-decode job skipped. See docs/design/tzehouse-windows-gpu-scheduling.md"
                  echo "GPU_LOCK_ACQUIRED=skipped" >> $env:GITHUB_ENV
                  exit 0
                } else {
                  Write-LockLog "Process $lockPid is no longer running. Lock is stale. Removing."
                  Remove-Item -Force $LockFile -ErrorAction SilentlyContinue
                }
              } else {
                Write-LockLog "WARNING: Lock file has no valid PID. Removing as stale."
                Remove-Item -Force $LockFile -ErrorAction SilentlyContinue
              }
            }
          }

          # Acquire the CI lock
          $startedAt = (Get-Date).ToUniversalTime().ToString("o")
          $runId = "${{ github.run_id }}"
          $content = @"
          SESSION_TYPE=ci
          PID=$MyPid
          STARTED_AT=$startedAt
          DESCRIPTION=real-decode-windows nightly run (github.run_id=$runId)
          "@
          # Strip leading whitespace from heredoc
          $content = ($content -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"

          try {
            Set-Content -Path $TmpFile -Value $content -Encoding UTF8
            Move-Item -Path $TmpFile -Destination $LockFile -Force
          } catch {
            Write-LockLog "ERROR: Failed to write lock file: $_"
            exit 2
          }

          Write-LockLog "Lock acquired (SESSION_TYPE=ci PID=$MyPid STARTED_AT=$startedAt)."
          echo "GPU_LOCK_ACQUIRED=true" >> $env:GITHUB_ENV

      # Skip the rest of the job if we were preempted by an interactive session.
      # Each subsequent step checks this output to decide whether to run.
      - name: Skip notice (interactive session active)
        if: env.GPU_LOCK_ACQUIRED == 'skipped'
        shell: pwsh
        run: |
          Write-Host "=== JOB SKIPPED ==="
          Write-Host "Reason: GPU is held by an active tze_hud interactive session."
          Write-Host "This job will not perform any GPU work."
          Write-Host "To run real-decode tests, cancel the interactive session and re-trigger this workflow."
          Write-Host "Policy: docs/design/tzehouse-windows-gpu-scheduling.md"

      # ── Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        if: env.GPU_LOCK_ACQUIRED == 'true'

      # ── Rust toolchain ─────────────────────────────────────────────────────
      # Use stable MSVC toolchain. The D18 box must have the MSVC toolchain
      # installed (Visual Studio Build Tools 2019+ or later).
      - uses: dtolnay/rust-toolchain@stable
        if: env.GPU_LOCK_ACQUIRED == 'true'
        with:
          toolchain: "1.88"
          # x86_64-pc-windows-msvc is the default on Windows; explicit for clarity.
          targets: x86_64-pc-windows-msvc

      # timeout-minutes caps cache-save hangs (see ci.yml — PR #606 incident).
      # v2.9.1 pins to a specific stable release rather than the floating v2 alias.
      - uses: Swatinem/rust-cache@v2.9.1
        if: env.GPU_LOCK_ACQUIRED == 'true'
        timeout-minutes: 10

      # ── Verify GStreamer SDK is present on D18 ──────────────────────────────
      # The SDK is pre-installed at provisioning time (see runbook §3).
      # This step fails fast if the environment is not configured correctly,
      # giving a clear error before Cargo build attempts.
      - name: Verify GStreamer SDK environment
        if: env.GPU_LOCK_ACQUIRED == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Check SDK root env var
          $gst_root = $env:GSTREAMER_1_0_ROOT_MSVC_X86_64
          if (-not $gst_root) {
            Write-Error "GSTREAMER_1_0_ROOT_MSVC_X86_64 is not set. GStreamer SDK is not provisioned on this runner."
            Write-Error "Follow docs/ci/windows-d18-runner-setup.md §3 to install the GStreamer 1.24.12 MSVC SDK."
            exit 1
          }
          Write-Host "GSTREAMER_1_0_ROOT_MSVC_X86_64 = ${gst_root}"

          # Check SDK directory exists
          if (-not (Test-Path $gst_root)) {
            Write-Error "GStreamer SDK directory does not exist: ${gst_root}"
            exit 1
          }

          # Check pkg-config.exe is in PATH and comes from GStreamer (not Chocolatey/MSYS2)
          $pkg_config = Get-Command pkg-config.exe -ErrorAction SilentlyContinue
          if (-not $pkg_config) {
            Write-Error "pkg-config.exe not found in PATH. Ensure ${gst_root}\bin is first in system PATH."
            exit 1
          }
          Write-Host "pkg-config.exe path: $($pkg_config.Source)"
          # Warn if this is not GStreamer's pkg-config — path ordering may be wrong
          if (-not $pkg_config.Source.StartsWith($gst_root, [System.StringComparison]::OrdinalIgnoreCase)) {
            Write-Warning "pkg-config.exe is NOT from GStreamer SDK. Build may fail due to path ordering."
            Write-Warning "Expected: ${gst_root}\bin\pkg-config.exe"
            Write-Warning "Got     : $($pkg_config.Source)"
            Write-Warning "See docs/audits/gstreamer-windows-ci-bootstrap.md §5.2"
          }

          # Verify pkg-config resolves gstreamer-1.0
          $gst_version_output = & pkg-config.exe --modversion gstreamer-1.0 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "pkg-config cannot resolve gstreamer-1.0. PKG_CONFIG_PATH may be misconfigured."
            Write-Error "PKG_CONFIG_PATH = $env:PKG_CONFIG_PATH"
            exit 1
          }
          Write-Host "GStreamer version (from pkg-config): ${gst_version_output}"

          # Sanity-check: gst-inspect-1.0 must be present and executable
          $gst_inspect = Join-Path $gst_root "bin\gst-inspect-1.0.exe"
          if (-not (Test-Path $gst_inspect)) {
            Write-Error "gst-inspect-1.0.exe not found at ${gst_inspect}. GStreamer runtime is incomplete."
            exit 1
          }
          Write-Host "GStreamer SDK verified: ${gst_version_output}"

      # ── Report runtime capabilities ─────────────────────────────────────────
      # Enumerate GPU and hardware decode elements. These are informational:
      # hardware decode elements may be absent on software-only runs, but this
      # workflow targets the D18 GPU box where they should be present.
      - name: Report GStreamer GPU capabilities
        if: env.GPU_LOCK_ACQUIRED == 'true'
        shell: pwsh
        run: |
          $gst_root = $env:GSTREAMER_1_0_ROOT_MSVC_X86_64
          $gst_inspect = Join-Path $gst_root "bin\gst-inspect-1.0.exe"

          Write-Host "=== GStreamer version ==="
          & $gst_inspect --version

          Write-Host ""
          Write-Host "=== Hardware decode elements (D3D11 + NVDEC) ==="
          # D3D11 decode — part of the complete MSVC install
          Write-Host "--- d3d11h264dec ---"
          & $gst_inspect d3d11h264dec 2>&1 | Select-Object -First 5
          Write-Host "--- d3d11vp9dec ---"
          & $gst_inspect d3d11vp9dec 2>&1 | Select-Object -First 5
          # NVDEC — available on RTX 3080 with driver >= 397.93 (D18: 595.97)
          Write-Host "--- nvh264dec ---"
          & $gst_inspect nvh264dec 2>&1 | Select-Object -First 5
          Write-Host "--- nvvp9dec ---"
          & $gst_inspect nvvp9dec 2>&1 | Select-Object -First 5

          Write-Host ""
          Write-Host "Runner: $env:COMPUTERNAME"
          Write-Host "Decode target: ${{ github.event.inputs.decode_target || 'smoke' }}"

          # Exit 0 regardless — capability reporting is informational
          exit 0

      # ── Cargo check (fast build gate) ──────────────────────────────────────
      # Validates compilation before running tests. Compositor depends on gstreamer-rs
      # which requires the SDK. This is the §8 "smoke-test" from the audit.
      - name: cargo check (compositor — validates GStreamer SDK linkage)
        if: env.GPU_LOCK_ACQUIRED == 'true'
        shell: pwsh
        run: |
          cargo check -p tze_hud_compositor 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cargo check -p tze_hud_compositor failed."
            Write-Error "This usually indicates GStreamer SDK is misconfigured (PKG_CONFIG_PATH, PATH ordering)."
            Write-Error "See docs/ci/windows-d18-runner-setup.md §4 and docs/audits/gstreamer-windows-ci-bootstrap.md §5.2."
            exit 1
          }
          Write-Host "cargo check passed — GStreamer SDK linkage confirmed."

      # ── Smoke decode test ───────────────────────────────────────────────────
      # PLACEHOLDER: Real decode tests live in crates/tze_hud_runtime or a
      # dedicated decode-validation crate. Uncomment and update the cargo test
      # invocation when the test target exists.
      #
      # Expected test target (to be implemented under hud-ora8.1 phase 1):
      #   cargo test -p tze_hud_runtime --test real_decode_windows -- --nocapture
      #
      # Until the test crate exists, this step emits a clear status message.
      - name: Real-decode tests (PLACEHOLDER — harness not yet implemented)
        if: env.GPU_LOCK_ACQUIRED == 'true'
        shell: pwsh
        run: |
          $decode_target = "${{ github.event.inputs.decode_target || 'smoke' }}"
          Write-Host "=== Real-Decode Windows — Status Report ==="
          Write-Host "Decode target   : ${decode_target}"
          Write-Host "Runner GPU      : NVIDIA GeForce RTX 3080 (D18)"
          Write-Host "GStreamer SDK   : $env:GSTREAMER_1_0_ROOT_MSVC_X86_64"
          Write-Host ""
          Write-Host "STUB: The real-decode test harness (tze_hud_runtime::real_decode_windows)"
          Write-Host "is not yet implemented. This placeholder exits 0 to validate the CI"
          Write-Host "plumbing (runner registration, GStreamer SDK linkage, cargo check)."
          Write-Host ""
          Write-Host "Glass-to-glass latency capture (D18 p50<=150ms / p99<=400ms) is tracked"
          Write-Host "separately in hud-ora8.1.28 and is NOT in scope for this workflow."
          Write-Host ""
          Write-Host "To activate real decode tests:"
          Write-Host "  1. Implement test target per hud-ora8.1 phase 1 scope"
          Write-Host "  2. Replace this step with: cargo test -p tze_hud_runtime --test real_decode_windows"
          Write-Host "  3. Remove the 'PLACEHOLDER' comment in this step name"
          exit 0

      # ── Run summary ─────────────────────────────────────────────────────────
      - name: Run summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Windows D18 Real-Decode Run Summary ==="
          Write-Host "Runner         : $env:COMPUTERNAME ($env:RUNNER_NAME)"
          Write-Host "Runner OS      : $env:RUNNER_OS"
          Write-Host "GStreamer SDK  : $($env:GSTREAMER_1_0_ROOT_MSVC_X86_64 ?? 'NOT SET')"
          Write-Host "Decode target  : ${{ github.event.inputs.decode_target || 'smoke' }}"
          Write-Host "Trigger        : ${{ github.event_name }}"
          Write-Host "Ref            : ${{ github.ref }}"
          Write-Host "GPU lock state : $env:GPU_LOCK_ACQUIRED"
          Write-Host ""
          if ($env:GPU_LOCK_ACQUIRED -eq "skipped") {
            Write-Host "Status: SKIPPED — GPU held by interactive tze_hud session."
            Write-Host "Policy: docs/design/tzehouse-windows-gpu-scheduling.md"
          } else {
            Write-Host "Status: STUB — see real-decode test placeholder step above."
          }
          Write-Host "Setup runbook : docs/ci/windows-d18-runner-setup.md"
          Write-Host "Audit source  : docs/audits/gstreamer-windows-ci-bootstrap.md §4.1/§5"
          Write-Host "Tracked by    : hud-ora8.1.20"

      # ── GPU lock release (always runs — cleanup even on failure) ────────────
      # Releases the lock acquired in "Check GPU lock".
      # Skipped if we never acquired the lock (interactive session was active).
      - name: Release GPU lock
        if: always() && env.GPU_LOCK_ACQUIRED == 'true'
        shell: pwsh
        run: |
          $LockFile = "C:\ProgramData\tze_hud\gpu.lock"
          $MyPid    = $PID

          function Write-LockLog([string]$msg) { Write-Host "[gpu-lock] $msg" }

          Write-LockLog "Releasing $LockFile ..."

          if (-not (Test-Path $LockFile)) {
            Write-LockLog "Lock file does not exist. Nothing to release."
            exit 0
          }

          $lines = @{}
          try {
            Get-Content $LockFile | ForEach-Object {
              $parts = $_ -split "=", 2
              if ($parts.Count -eq 2) { $lines[$parts[0].Trim()] = $parts[1].Trim() }
            }
          } catch {
            Write-LockLog "WARNING: Lock file unreadable. Removing."
            Remove-Item -Force $LockFile -ErrorAction SilentlyContinue
            exit 0
          }

          $lockPid = [int]($lines["PID"] ?? 0)
          Write-LockLog "Lock PID=$lockPid (this PID=$MyPid)"

          # Note: on Windows, the runner spawns a new powershell.exe for each step,
          # so $PID here is the release step's PID, not the acquire step's PID.
          # We compare against SESSION_TYPE=ci to confirm this is our lock.
          $lockType = $lines["SESSION_TYPE"] ?? "unknown"
          if ($lockType -ne "ci") {
            Write-LockLog "WARNING: Lock is type=$lockType, not 'ci'. Not releasing."
            exit 0
          }

          try {
            Remove-Item -Force $LockFile
            Write-LockLog "Lock released."
          } catch {
            Write-LockLog "ERROR: Failed to remove lock file: $_"
            exit 1
          }
