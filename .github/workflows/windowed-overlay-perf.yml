name: Windowed Overlay Performance

on:
  workflow_dispatch:
    inputs:
      frames:
        description: "Measured frames per mode"
        required: false
        default: "600"
      warmup_frames:
        description: "Warmup frames per mode"
        required: false
        default: "120"
      width:
        description: "Benchmark surface width"
        required: false
        default: "1920"
      height:
        description: "Benchmark surface height"
        required: false
        default: "1080"
      fail_on_budget:
        description: "Fail the job when overlay p99 delta exceeds +0.5 ms"
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  windowed-overlay-perf:
    name: Fullscreen vs overlay compositor delta
    runs-on: [self-hosted, windows, gpu]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: x86_64-pc-windows-msvc

      - name: Ensure protoc is available
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command protoc -ErrorAction SilentlyContinue)) {
            choco install protoc -y --no-progress
          }
          protoc --version

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Build windowed runtime
        shell: pwsh
        run: cargo build -p tze_hud_app --release

      - name: Run fullscreen vs overlay benchmark
        shell: pwsh
        env:
          TZE_HUD_LOG: "tze_hud_app=info,tze_hud_runtime=info,tze_hud_compositor=warn"
        run: |
          $ErrorActionPreference = "Stop"
          $args = @(
            "-ExePath", "target\release\tze_hud.exe",
            "-OutputDir", "artifacts\windowed-fullscreen-overlay-perf",
            "-Width", "${{ github.event.inputs.width || '1920' }}",
            "-Height", "${{ github.event.inputs.height || '1080' }}",
            "-Frames", "${{ github.event.inputs.frames || '600' }}",
            "-WarmupFrames", "${{ github.event.inputs.warmup_frames || '120' }}"
          )
          if ("${{ github.event.inputs.fail_on_budget || 'false' }}" -eq "true") {
            $args += "-FailOnBudget"
          }
          .\scripts\ci\windows\windowed-fullscreen-overlay-perf.ps1 @args

      - name: Upload performance artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windowed-fullscreen-overlay-perf
          path: artifacts/windowed-fullscreen-overlay-perf/
          if-no-files-found: error
