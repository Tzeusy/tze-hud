# .github/workflows/android-bootstrap.yml
# Pre-phase-3 validation: Android GStreamer SDK CI bootstrap gate
#
# This workflow validates the minimal build chain required before the phase 3
# Android implementation bead (D19 — Pixel aarch64) can open:
#
#   Gate 1 — GStreamer SDK static archives present (arm64)
#   Gate 2 — androidmedia plugin .so present
#   Gate 3 — cross-pkg-config resolves gstreamer-1.0
#   Gate 4 — cargo-ndk link probe (aarch64-linux-android)
#   Gate 5 — cargo-ndk link probe (x86_64-linux-android)
#   Gate 6 — HAVE_NDKMEDIA active in libgstandroidmedia.so (hud-04b00)
#
# Gating policy: manual dispatch + PRs touching android/* or docs/ci/*.
# Does NOT run on every push — the GStreamer SDK download is ~90s per ABI and
# CI minutes are expensive. This is a preflight lane, not a main CI gate.
#
# References:
#   docs/ci/android-gstreamer-bootstrap.md — full spike doc (hud-685ha, PR #539)
#   docs/reports/gstreamer-1.26-ndk-mediacodec-audit.md — NDK path audit (hud-fts60, PR #540)
#   .github/workflows/ci.yml               — main CI conventions

name: Android GStreamer Bootstrap

on:
  workflow_dispatch:
    inputs:
      gst_version:
        description: "GStreamer version (e.g. 1.24.12)"
        required: true
        default: "1.24.12"
  pull_request:
    paths:
      - "docs/ci/android-gstreamer-bootstrap.md"
      - ".github/workflows/android-bootstrap.yml"
      - "crates/**/build.rs"

env:
  # Pin at phase 3 kickoff; update via PR when bumping.
  # gst_version input overrides GST_VERSION on manual dispatch.
  GST_VERSION: ${{ github.event.inputs.gst_version || '1.24.12' }}
  # NDK r27 — recommended by GStreamer Cerbero CI (see spike doc §2.1).
  NDK_VERSION: "27.2.12479018"
  ANDROID_API_LEVEL: "28"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  android-gstreamer-bootstrap:
    name: Android GStreamer SDK bootstrap gate
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain + Android targets ─────────────────────────────────────
      # Pin to 1.88 — same as ci.yml — to avoid Cargo.lock conflicts.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: "aarch64-linux-android,x86_64-linux-android"

      - uses: Swatinem/rust-cache@v2

      # ── cargo-ndk ─────────────────────────────────────────────────────────────
      - name: Install cargo-ndk (>=3.5)
        run: |
          cargo install cargo-ndk --version ">=3.5" --locked
          cargo ndk --version

      # ── Android NDK via SDK manager ───────────────────────────────────────────
      - name: Install Android NDK r27
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"

      - name: Verify NDK installation
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          # ndk-build lives in the NDK root on some images, in build/ on others.
          $ANDROID_NDK_HOME/ndk-build --version 2>/dev/null || \
            $ANDROID_NDK_HOME/build/ndk-build --version 2>/dev/null || \
            grep Revision "$ANDROID_NDK_HOME/source.properties"

      # ── GStreamer Android SDK download + verify ───────────────────────────────
      - name: Cache GStreamer Android SDK
        id: cache-gst
        uses: actions/cache@v4
        with:
          path: /opt/gstreamer-android
          key: gstreamer-android-${{ env.GST_VERSION }}-arm64-x86_64

      - name: Download GStreamer Android SDK (arm64 + x86_64)
        if: steps.cache-gst.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/gstreamer-android-dl /opt/gstreamer-android

          GST_BASE="https://gstreamer.freedesktop.org/data/pkg/android/${{ env.GST_VERSION }}"

          for ABI in arm64 x86_64; do
            TARBALL="gstreamer-1.0-android-${ABI}-${{ env.GST_VERSION }}.tar.xz"
            echo "Downloading ${TARBALL}..."
            wget -q -P /opt/gstreamer-android-dl "${GST_BASE}/${TARBALL}"
            wget -q -P /opt/gstreamer-android-dl "${GST_BASE}/${TARBALL}.sha256sum"

            echo "Verifying checksum for ${TARBALL}..."
            cd /opt/gstreamer-android-dl
            sha256sum -c "${TARBALL}.sha256sum"

            echo "Extracting ${TARBALL}..."
            tar xf "${TARBALL}" -C /opt/gstreamer-android
          done

          ls /opt/gstreamer-android/

      - name: Set GSTREAMER_ROOT_ANDROID
        run: echo "GSTREAMER_ROOT_ANDROID=/opt/gstreamer-android" >> $GITHUB_ENV

      # ── Gate 1: GStreamer SDK static archives present ─────────────────────────
      - name: "Gate 1 — GStreamer SDK static archives present (arm64)"
        run: |
          COUNT=$(ls "$GSTREAMER_ROOT_ANDROID/arm64/lib/"*.a 2>/dev/null | wc -l)
          echo "arm64 static archives: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "FAIL: Expected >50 static archives in arm64/lib/, found $COUNT"
            exit 1
          fi
          echo "PASS: GStreamer arm64 SDK has $COUNT static archives"

      # ── Gate 2: androidmedia .so present ─────────────────────────────────────
      - name: "Gate 2 — androidmedia plugin .so present"
        run: |
          PLUGIN="$GSTREAMER_ROOT_ANDROID/arm64/lib/gstreamer-1.0/libgstandroidmedia.so"
          if [ ! -f "$PLUGIN" ]; then
            echo "FAIL: libgstandroidmedia.so not found at $PLUGIN"
            exit 1
          fi
          echo "PASS: libgstandroidmedia.so present"
          ls -lh "$PLUGIN"

      # ── Gate 3: cross-pkg-config resolves gstreamer-1.0 ──────────────────────
      - name: "Gate 3 — cross-pkg-config probe"
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH="$GSTREAMER_ROOT_ANDROID/arm64/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"

          VERSION=$(pkg-config --modversion gstreamer-1.0)
          echo "pkg-config resolved gstreamer-1.0: $VERSION"

          # Version must start with the pinned major.minor (e.g. "1.24")
          EXPECTED_PREFIX=$(echo "${{ env.GST_VERSION }}" | cut -d. -f1-2)
          if [[ "$VERSION" != "$EXPECTED_PREFIX"* ]]; then
            echo "FAIL: Expected gstreamer-1.0 ~$EXPECTED_PREFIX, got $VERSION"
            exit 1
          fi
          echo "PASS: gstreamer-1.0 $VERSION resolves correctly via cross-pkg-config"

      # ── Gate 4: cargo-ndk link probe (aarch64-linux-android) ─────────────────
      - name: "Gate 4 — cargo-ndk link probe (aarch64-linux-android)"
        run: |
          PROBE_DIR=$(mktemp -d)
          mkdir -p "$PROBE_DIR/src"

          cat > "$PROBE_DIR/Cargo.toml" << 'TOML'
          [package]
          name = "gst-link-probe"
          version = "0.1.0"
          edition = "2021"

          [lib]
          crate-type = ["cdylib"]
          TOML

          cat > "$PROBE_DIR/src/lib.rs" << 'RUST'
          // Minimal GStreamer link probe.
          // If this compiles for aarch64-linux-android, gstreamer-full is correctly linked.
          extern "C" {
              fn gst_version(major: *mut u32, minor: *mut u32, micro: *mut u32, nano: *mut u32);
          }

          #[no_mangle]
          pub extern "C" fn gst_probe_version() -> u32 {
              let (mut major, mut minor, mut micro, mut nano) = (0u32, 0u32, 0u32, 0u32);
              unsafe { gst_version(&mut major, &mut minor, &mut micro, &mut nano); }
              (major << 24) | (minor << 16) | (micro << 8) | nano
          }
          RUST

          cat > "$PROBE_DIR/build.rs" << 'BUILDRS'
          fn main() {
              let gst_root = std::env::var("GSTREAMER_ROOT_ANDROID")
                  .expect("GSTREAMER_ROOT_ANDROID required");
              // CARGO_NDK_ANDROID_TARGET is the Android ABI name (e.g. "arm64-v8a"), not the Rust triple.
              let abi = std::env::var("CARGO_NDK_ANDROID_TARGET")
                  .unwrap_or_else(|_| "arm64-v8a".to_string());
              let gst_abi = match abi.as_str() {
                  "arm64-v8a"   => "arm64",
                  "x86_64"      => "x86_64",
                  "armeabi-v7a" => "armv7",
                  "x86"         => "x86",
                  other         => panic!("Unsupported ABI: {other}"),
              };
              let lib_dir = format!("{}/{}/lib", gst_root, gst_abi);
              println!("cargo:rustc-link-search=native={}", lib_dir);
              println!("cargo:rustc-link-lib=static=gstreamer-full-1.0");
              println!("cargo:rustc-link-lib=dylib=android");
              println!("cargo:rustc-link-lib=dylib=log");
              println!("cargo:rustc-link-lib=dylib=z");
              println!("cargo:rerun-if-env-changed=GSTREAMER_ROOT_ANDROID");
              println!("cargo:rerun-if-env-changed=CARGO_NDK_ANDROID_TARGET");
          }
          BUILDRS

          echo "Running cargo ndk link probe (aarch64)..."
          cd "$PROBE_DIR"
          cargo ndk \
            --target aarch64-linux-android \
            --platform "${{ env.ANDROID_API_LEVEL }}" \
            build --release 2>&1 | tee /tmp/cargo-ndk-probe-arm64.log

          if grep -q "^error" /tmp/cargo-ndk-probe-arm64.log; then
            echo "FAIL: cargo-ndk arm64 link probe produced errors"
            cat /tmp/cargo-ndk-probe-arm64.log
            exit 1
          fi

          if ! grep -q "Finished release" /tmp/cargo-ndk-probe-arm64.log; then
            echo "FAIL: cargo-ndk arm64 link probe did not finish successfully"
            cat /tmp/cargo-ndk-probe-arm64.log
            exit 1
          fi

          echo "PASS: cargo-ndk linked gstreamer-full successfully for aarch64-linux-android"

      # ── Gate 5: cargo-ndk link probe (x86_64-linux-android) ──────────────────
      - name: "Gate 5 — cargo-ndk link probe (x86_64-linux-android)"
        run: |
          PROBE_DIR=$(mktemp -d)
          mkdir -p "$PROBE_DIR/src"

          cat > "$PROBE_DIR/Cargo.toml" << 'TOML'
          [package]
          name = "gst-link-probe-x86"
          version = "0.1.0"
          edition = "2021"

          [lib]
          crate-type = ["cdylib"]
          TOML

          cat > "$PROBE_DIR/src/lib.rs" << 'RUST'
          extern "C" {
              fn gst_version(major: *mut u32, minor: *mut u32, micro: *mut u32, nano: *mut u32);
          }

          #[no_mangle]
          pub extern "C" fn gst_probe_version() -> u32 {
              let (mut major, mut minor, mut micro, mut nano) = (0u32, 0u32, 0u32, 0u32);
              unsafe { gst_version(&mut major, &mut minor, &mut micro, &mut nano); }
              (major << 24) | (minor << 16) | (micro << 8) | nano
          }
          RUST

          cat > "$PROBE_DIR/build.rs" << 'BUILDRS'
          fn main() {
              let gst_root = std::env::var("GSTREAMER_ROOT_ANDROID")
                  .expect("GSTREAMER_ROOT_ANDROID required");
              let abi = std::env::var("CARGO_NDK_ANDROID_TARGET")
                  .unwrap_or_else(|_| "x86_64".to_string());
              let gst_abi = match abi.as_str() {
                  "arm64-v8a"   => "arm64",
                  "x86_64"      => "x86_64",
                  "armeabi-v7a" => "armv7",
                  "x86"         => "x86",
                  other         => panic!("Unsupported ABI: {other}"),
              };
              let lib_dir = format!("{}/{}/lib", gst_root, gst_abi);
              println!("cargo:rustc-link-search=native={}", lib_dir);
              println!("cargo:rustc-link-lib=static=gstreamer-full-1.0");
              println!("cargo:rustc-link-lib=dylib=android");
              println!("cargo:rustc-link-lib=dylib=log");
              println!("cargo:rustc-link-lib=dylib=z");
              println!("cargo:rerun-if-env-changed=GSTREAMER_ROOT_ANDROID");
              println!("cargo:rerun-if-env-changed=CARGO_NDK_ANDROID_TARGET");
          }
          BUILDRS

          echo "Running cargo ndk link probe (x86_64)..."
          cd "$PROBE_DIR"
          cargo ndk \
            --target x86_64-linux-android \
            --platform "${{ env.ANDROID_API_LEVEL }}" \
            build --release 2>&1 | tee /tmp/cargo-ndk-probe-x86.log

          if grep -q "^error" /tmp/cargo-ndk-probe-x86.log; then
            echo "FAIL: x86_64 link probe produced errors"
            cat /tmp/cargo-ndk-probe-x86.log
            exit 1
          fi

          if ! grep -q "Finished release" /tmp/cargo-ndk-probe-x86.log; then
            echo "FAIL: x86_64 link probe did not finish successfully"
            cat /tmp/cargo-ndk-probe-x86.log
            exit 1
          fi

          echo "PASS: cargo-ndk linked gstreamer-full for x86_64-linux-android"

      # ── Gate 6: HAVE_NDKMEDIA active in libgstandroidmedia.so ────────────────
      #
      # Strategy: inspect libgstandroidmedia.so for symbols that are compiled in
      # only when HAVE_NDKMEDIA=1 is defined at build time (from meson.build):
      #
      #   if cc.check_header('media/NdkMediaCodec.h')
      #     androidmedia_sources += ndk_sources
      #     extra_cargs += [ '-DHAVE_NDKMEDIA' ]
      #   endif
      #
      # The NDK path compiles gstamc-codec-ndk.c, which defines internal wrapper
      # functions like gst_amc_codec_ndk_new, gst_amc_codec_ndk_start, etc.
      # These symbols are present in the .so even though they are not exported
      # (they can be found via readelf -s or nm with the --defined-only flag).
      #
      # Additionally, since libmediandk.so is accessed via dlopen/dlsym, the
      # string "AMediaCodec_createCodecByName" appears in the .so's .rodata
      # section — a reliable secondary indicator that the NDK path is active.
      #
      # References:
      #   gstamc-codec-ndk.c: subprojects/gst-plugins-bad/sys/androidmedia/ndk/
      #   hud-fts60 audit: docs/reports/gstreamer-1.26-ndk-mediacodec-audit.md
      - name: "Gate 6 — HAVE_NDKMEDIA active in libgstandroidmedia.so"
        run: |
          PLUGIN="$GSTREAMER_ROOT_ANDROID/arm64/lib/gstreamer-1.0/libgstandroidmedia.so"

          echo "Inspecting $PLUGIN for HAVE_NDKMEDIA symbols..."

          # Primary check: look for NDK codec wrapper symbols from gstamc-codec-ndk.c.
          # These only exist when HAVE_NDKMEDIA=1 at build time.
          # We accept either the C name or the mangled form (T = defined text symbol).
          NDK_SYMS=$(readelf -s --wide "$PLUGIN" 2>/dev/null \
            | grep -E 'gst_amc_codec_ndk|gst_amc_format_ndk' | head -5 || true)

          if [ -n "$NDK_SYMS" ]; then
            echo "PASS (primary): NDK codec wrapper symbols found in libgstandroidmedia.so:"
            echo "$NDK_SYMS"
          else
            echo "Primary symbol check found no gst_amc_codec_ndk_* symbols."
            echo "Falling back to secondary check (dlsym string 'AMediaCodec_createCodecByName' in .rodata)..."

            # Secondary check: the dlsym target string is embedded in .rodata when
            # the NDK path is compiled in. strings(1) is available on ubuntu-latest.
            DLSYM_STR=$(strings "$PLUGIN" 2>/dev/null \
              | grep -F 'AMediaCodec_createCodecByName' || true)

            if [ -n "$DLSYM_STR" ]; then
              echo "PASS (secondary): dlsym string 'AMediaCodec_createCodecByName' found in binary."
              echo "  => HAVE_NDKMEDIA is active; per-frame NDK codec path is compiled in."
            else
              echo ""
              echo "FAIL: Neither NDK codec wrapper symbols nor the AMediaCodec_createCodecByName"
              echo "dlsym string were found in libgstandroidmedia.so."
              echo ""
              echo "This means HAVE_NDKMEDIA was NOT defined at build time:"
              echo "  - The prebuilt SDK may have been built without NdkMediaCodec.h in the NDK headers."
              echo "  - All MediaCodec operations will go through JNI, not the AMediaCodec* C API."
              echo "  - Per-frame JNI overhead reduction (MR #4115 / hud-fts60) is NOT active."
              echo ""
              echo "Resolution: verify GStreamer SDK version (must be >=1.24) and NDK API level"
              echo "(must be >=21, which provides <media/NdkMediaCodec.h>)."
              echo "See docs/reports/gstreamer-1.26-ndk-mediacodec-audit.md for details."
              exit 1
            fi
          fi

          echo ""
          echo "HAVE_NDKMEDIA verification complete."


      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Bootstrap gate summary
        run: |
          echo "=== Android GStreamer Bootstrap Gate Summary ==="
          echo "GStreamer version : ${{ env.GST_VERSION }}"
          echo "NDK version       : ${{ env.NDK_VERSION }}"
          echo "API level         : ${{ env.ANDROID_API_LEVEL }}"
          echo "All 6 gates passed — Android GStreamer CI bootstrap validated."
          echo "Gate 6 confirms HAVE_NDKMEDIA is active: per-frame NDK codec path enabled."
          echo "Pre-phase-3 gate is GREEN. Phase 3 Android bead may open."
