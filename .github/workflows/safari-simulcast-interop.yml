name: Safari Simulcast Interop

on:
  # Manual dispatch only until harness is ready.
  # Add schedule + pull_request triggers per docs/ci/safari-simulcast-interop-runner.md §7.2.
  workflow_dispatch:
    inputs:
      safari_target:
        description: "Safari target: 'system' (safaridriver) or 'stp' (Technology Preview)"
        required: false
        default: "system"
      codec_matrix:
        description: "Codec matrix to run: 'all', 'h264', or 'vp9'"
        required: false
        default: "all"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  safari-simulcast-interop:
    name: Safari simulcast interop (${{ github.event.inputs.safari_target || 'system' }})
    # Pin to macos-14 (Apple Silicon M1).
    # Do NOT use macos-latest — it is a floating alias that changes Safari version
    # without a PR. See docs/ci/safari-simulcast-interop-runner.md §2.3.
    runs-on: macos-14

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      # ── Safari / safaridriver setup ─────────────────────────────────────────
      - name: Enable safaridriver
        run: |
          sudo safaridriver --enable
          safaridriver --version

      - name: Report Safari version
        run: |
          /usr/bin/safaridriver --version || true
          # Log the Safari.app version for audit trail
          defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString || true

      - name: Install Safari Technology Preview (if requested)
        if: github.event.inputs.safari_target == 'stp'
        run: |
          # Install STP for informational comparison runs only.
          # STP results are non-blocking; see docs/ci/safari-simulcast-interop-runner.md §3.2.
          brew install --cask safari-technology-preview || true
          # Enable STP's safaridriver
          sudo /Applications/Safari\ Technology\ Preview.app/Contents/MacOS/safaridriver --enable || true

      # ── Node.js + Playwright setup ──────────────────────────────────────────
      # Playwright is used as an external subprocess (Approach A).
      # See docs/ci/safari-simulcast-interop-runner.md §4.3.1 and hud-mc3ka.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright
        run: |
          npm install -g playwright
          # Install the Playwright WebKit build (for Approach A subprocess bridge).
          # NOTE: Playwright's WebKit != system Safari. For real-Safari testing,
          # the harness uses safaridriver directly. See docs/ci/safari-simulcast-interop-runner.md §4.4.
          npx playwright install webkit
          npx playwright install-deps webkit || true

      # ── Protobuf compiler (required by tze_hud_protocol build script) ───────
      - name: Install protobuf compiler
        run: brew install protobuf

      # ── Build harness crate ─────────────────────────────────────────────────
      # PLACEHOLDER: crates/tze_hud_webrtc_interop/ does not yet exist.
      # This step is intentionally disabled until Phase 4 kickoff.
      # Uncomment and update when the harness crate lands.
      #
      # - name: Build simulcast interop harness (Safari feature)
      #   run: |
      #     cargo test \
      #       -p tze_hud_webrtc_interop \
      #       --test simulcast_safari \
      #       --features simulcast-interop \
      #       --no-run \
      #       -- --nocapture
      - name: Harness not yet implemented (stub gate)
        run: |
          echo "STUB: crates/tze_hud_webrtc_interop/ does not exist yet."
          echo "This workflow will be enabled at Phase 4 kickoff."
          echo "See docs/ci/safari-simulcast-interop-runner.md §7 for prerequisites."
          echo "Codec matrix requested: ${{ github.event.inputs.codec_matrix || 'all' }}"
          echo "Safari target requested: ${{ github.event.inputs.safari_target || 'system' }}"
          # Exit 0: stub passes until harness is activated.

      # ── Run H.264 simulcast tests ────────────────────────────────────────────
      # PLACEHOLDER: Uncomment when simulcast_safari.rs is implemented.
      #
      # - name: H.264 simulcast — system Safari (CONDITIONAL)
      #   if: |
      #     github.event.inputs.codec_matrix == 'all' ||
      #     github.event.inputs.codec_matrix == 'h264'
      #   run: |
      #     cargo test \
      #       -p tze_hud_webrtc_interop \
      #       --test simulcast_safari \
      #       --features simulcast-interop \
      #       -- h264 --nocapture
      #   env:
      #     SAFARI_TARGET: system
      #     SIMULCAST_CODEC: h264
      #   # H.264 Safari is CONDITIONAL per hud-fpq51 §6.2 — failure does not block 4b ship.
      #   continue-on-error: true

      # ── Run VP9 simulcast tests ──────────────────────────────────────────────
      # PLACEHOLDER: Uncomment when simulcast_safari.rs is implemented.
      #
      # - name: VP9 simulcast — system Safari (CONDITIONAL)
      #   if: |
      #     github.event.inputs.codec_matrix == 'all' ||
      #     github.event.inputs.codec_matrix == 'vp9'
      #   run: |
      #     cargo test \
      #       -p tze_hud_webrtc_interop \
      #       --test simulcast_safari \
      #       --features simulcast-interop \
      #       -- vp9 --nocapture
      #   env:
      #     SAFARI_TARGET: system
      #     SIMULCAST_CODEC: vp9
      #   # VP9 Safari simulcast is CONDITIONAL — experimental in Safari 16.4.
      #   continue-on-error: true

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Run summary
        if: always()
        run: |
          echo "=== Safari Simulcast Interop Run Summary ==="
          echo "Runner         : ${{ runner.os }} ${{ runner.arch }}"
          echo "Safari target  : ${{ github.event.inputs.safari_target || 'system' }}"
          echo "Codec matrix   : ${{ github.event.inputs.codec_matrix || 'all' }}"
          echo "Status         : STUB — harness not yet implemented"
          echo ""
          echo "This workflow will produce real results after Phase 4 kickoff."
          echo "See docs/ci/safari-simulcast-interop-runner.md for the full design."
          echo "Activation checklist: docs/ci/safari-simulcast-interop-runner.md §7.2"
